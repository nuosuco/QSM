# Nginx MIME类型修复 - 彝文字体显示
# 将此内容添加到 /etc/nginx/mime.types 文件末尾

font/ttf                                        ttf;
font/otf                                        otf;
application/font-woff                           woff;
application/font-woff2                          woff2;

