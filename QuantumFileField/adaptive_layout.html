<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QEntL自适应布局引擎 - 量子文件场</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .quantum-gene {
            font-family: 'Courier New', monospace;
            color: #00ff88;
            font-size: 14px;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .layout-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #00ff88;
        }

        .device-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .layout-preview {
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            min-height: 200px;
            display: grid;
            gap: 10px;
        }

        .preview-element {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            padding: 10px;
            text-align: center;
        }

        .btn {
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
        }

        .input-field {
            width: 100%;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .layout-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📐 QEntL自适应布局引擎</h1>
            <div class="quantum-gene">量子基因: QSM-ADPT-6105-K427 | 布局强度: 0.96</div>
            <p>智能响应式布局与设备适配系统</p>
        </div>

        <div class="layout-grid">
            <div class="layout-section">
                <div class="section-title">📱 设备信息</div>
                <div class="device-info">
                    <div class="info-item">
                        <div>设备类型</div>
                        <div id="deviceType">DESKTOP</div>
                    </div>
                    <div class="info-item">
                        <div>屏幕尺寸</div>
                        <div id="screenSize">1920x1080</div>
                    </div>
                    <div class="info-item">
                        <div>方向</div>
                        <div id="orientation">LANDSCAPE</div>
                    </div>
                    <div class="info-item">
                        <div>断点</div>
                        <div id="currentBreakpoint">MD</div>
                    </div>
                </div>
                <button class="btn" onclick="detectDevice()">检测设备</button>
            </div>

            <div class="layout-section">
                <div class="section-title">🎛️ 布局模式</div>
                <select class="input-field" id="layoutMode">
                    <option value="RESPONSIVE">响应式布局</option>
                    <option value="ADAPTIVE">自适应布局</option>
                    <option value="GRID">网格布局</option>
                    <option value="QUANTUM">量子布局</option>
                </select>
                <button class="btn" onclick="changeLayoutMode()">应用模式</button>
            </div>

            <div class="layout-section">
                <div class="section-title">📊 布局统计</div>
                <div class="device-info">
                    <div class="info-item">
                        <div>活跃元素</div>
                        <div id="activeElements">5</div>
                    </div>
                    <div class="info-item">
                        <div>约束数量</div>
                        <div id="constraintCount">0</div>
                    </div>
                    <div class="info-item">
                        <div>布局更新</div>
                        <div id="layoutUpdates">0</div>
                    </div>
                    <div class="info-item">
                        <div>性能指标</div>
                        <div id="performanceScore">100%</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="layout-section">
            <div class="section-title">👁️ 布局预览</div>
            <div class="layout-preview" id="layoutPreview">
                <div class="preview-element">头部区域</div>
                <div class="preview-element">导航区域</div>
                <div class="preview-element">内容区域</div>
                <div class="preview-element">侧边栏</div>
                <div class="preview-element">底部区域</div>
            </div>
        </div>
    </div>

    <script>
        class QuantumAdaptiveLayout {
            constructor() {
                this.quantumGene = 'QSM-ADPT-6105-K427';
                this.layoutStrength = 0.96;
                this.deviceInfo = {};
                this.breakpoints = {
                    xs: { minWidth: 0, maxWidth: 575 },
                    sm: { minWidth: 576, maxWidth: 767 },
                    md: { minWidth: 768, maxWidth: 991 },
                    lg: { minWidth: 992, maxWidth: 1199 },
                    xl: { minWidth: 1200, maxWidth: Infinity }
                };
                this.currentBreakpoint = 'md';
                this.layoutMode = 'ADAPTIVE';
                this.stats = {
                    activeElements: 5,
                    constraintCount: 0,
                    layoutUpdates: 0,
                    performanceScore: 100
                };
                this.init();
            }

            init() {
                this.detectDevice();
                this.setupResponsiveListeners();
                this.updateUI();
            }

            detectDevice() {
                this.deviceInfo = {
                    type: this.getDeviceType(),
                    width: window.innerWidth,
                    height: window.innerHeight,
                    orientation: window.innerWidth > window.innerHeight ? 'LANDSCAPE' : 'PORTRAIT',
                    pixelRatio: window.devicePixelRatio || 1
                };
                
                this.updateCurrentBreakpoint();
                this.updateDeviceUI();
            }

            getDeviceType() {
                const width = window.innerWidth;
                const userAgent = navigator.userAgent;
                
                if (/Mobile|Android|iPhone|iPad/.test(userAgent)) {
                    return width < 768 ? 'MOBILE' : 'TABLET';
                }
                return width < 1024 ? 'LAPTOP' : 'DESKTOP';
            }

            updateCurrentBreakpoint() {
                const width = this.deviceInfo.width;
                let newBreakpoint = 'xs';
                
                for (const [name, bp] of Object.entries(this.breakpoints)) {
                    if (width >= bp.minWidth && width <= bp.maxWidth) {
                        newBreakpoint = name;
                        break;
                    }
                }
                
                if (newBreakpoint !== this.currentBreakpoint) {
                    this.currentBreakpoint = newBreakpoint;
                    this.applyBreakpointLayout();
                    this.stats.layoutUpdates++;
                }
            }

            applyBreakpointLayout() {
                const preview = document.getElementById('layoutPreview');
                
                switch (this.currentBreakpoint) {
                    case 'xs':
                        preview.style.gridTemplateColumns = '1fr';
                        break;
                    case 'sm':
                        preview.style.gridTemplateColumns = '1fr 1fr';
                        break;
                    case 'md':
                        preview.style.gridTemplateColumns = '1fr 2fr 1fr';
                        break;
                    case 'lg':
                        preview.style.gridTemplateColumns = '200px 1fr 200px';
                        break;
                    case 'xl':
                        preview.style.gridTemplateColumns = '250px 1fr 250px';
                        break;
                }
            }

            setupResponsiveListeners() {
                window.addEventListener('resize', () => {
                    this.detectDevice();
                });
            }

            updateUI() {
                this.updateDeviceUI();
                this.updateStatsUI();
            }

            updateDeviceUI() {
                document.getElementById('deviceType').textContent = this.deviceInfo.type;
                document.getElementById('screenSize').textContent = 
                    `${this.deviceInfo.width}x${this.deviceInfo.height}`;
                document.getElementById('orientation').textContent = this.deviceInfo.orientation;
                document.getElementById('currentBreakpoint').textContent = 
                    this.currentBreakpoint.toUpperCase();
            }

            updateStatsUI() {
                document.getElementById('activeElements').textContent = this.stats.activeElements;
                document.getElementById('constraintCount').textContent = this.stats.constraintCount;
                document.getElementById('layoutUpdates').textContent = this.stats.layoutUpdates;
                document.getElementById('performanceScore').textContent = 
                    this.stats.performanceScore.toFixed(0) + '%';
            }
        }

        const layoutEngine = new QuantumAdaptiveLayout();

        function detectDevice() {
            layoutEngine.detectDevice();
        }

        function changeLayoutMode() {
            const mode = document.getElementById('layoutMode').value;
            layoutEngine.layoutMode = mode;
            layoutEngine.applyBreakpointLayout();
        }

        // 量子纠缠通信
        setInterval(() => {
            window.parent.postMessage({
                type: 'quantum-entanglement',
                source: 'adaptive-layout',
                gene: layoutEngine.quantumGene,
                message: '自适应布局引擎运行正常'
            }, '*');
        }, 5000);
    </script>
</body>
</html>
