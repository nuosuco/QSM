<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QEntL数据同步器 - 量子文件场</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .quantum-gene {
            font-family: 'Courier New', monospace;
            color: #00cec9;
            font-size: 14px;
        }

        .sync-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .sync-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #00cec9;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sync-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(0, 206, 201, 0.2);
            border-radius: 8px;
            margin: 10px 0;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00cec9;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        .file-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            border-left: 3px solid #00cec9;
        }

        .file-item.syncing {
            border-left-color: #fdcb6e;
            animation: syncPulse 1s infinite;
        }

        .file-item.conflict {
            border-left-color: #e17055;
        }

        @keyframes syncPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00cec9, #74b9ff);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .btn {
            background: linear-gradient(45deg, #00cec9, #00b894);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 206, 201, 0.4);
        }

        .btn-danger {
            background: linear-gradient(45deg, #e17055, #d63031);
        }

        .input-field {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin: 5px 0;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .conflict-resolver {
            background: linear-gradient(135deg, #e17055 0%, #d63031 100%);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            color: white;
        }

        .version-history {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
        }

        .version-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #00cec9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔄 QEntL数据同步器</h1>
            <div class="quantum-gene">量子基因: 0xDS9876 | 同步强度: 0.89</div>
            <p>量子级别的数据同步与版本控制系统</p>
        </div>

        <div class="sync-panel">
            <!-- 同步状态 -->
            <div class="sync-section">
                <div class="section-title">
                    📊 同步状态
                </div>
                <div class="sync-status">
                    <span>同步服务</span>
                    <div class="status-indicator"></div>
                    <span id="syncStatus">运行中</span>
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="syncedFiles">0</div>
                        <div>已同步文件</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="pendingSync">0</div>
                        <div>待同步</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="conflictCount">0</div>
                        <div>冲突</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="syncSpeed">0 MB/s</div>
                        <div>同步速度</div>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="overallProgress" style="width: 0%">0%</div>
                </div>
            </div>

            <!-- 文件同步 -->
            <div class="sync-section">
                <div class="section-title">
                    📁 文件同步
                </div>
                <div>
                    <input type="text" class="input-field" id="syncPath" placeholder="同步路径">
                    <select class="input-field" id="syncMode">
                        <option value="bidirectional">双向同步</option>
                        <option value="push">推送到远程</option>
                        <option value="pull">从远程拉取</option>
                        <option value="mirror">镜像同步</option>
                    </select>
                    <button class="btn" onclick="startSync()">开始同步</button>
                    <button class="btn btn-danger" onclick="stopSync()">停止同步</button>
                </div>
                <div class="file-list" id="syncFileList"></div>
            </div>

            <!-- 冲突解决 -->
            <div class="sync-section">
                <div class="section-title">
                    ⚠️ 冲突解决
                </div>
                <div class="conflict-resolver" id="conflictResolver" style="display: none;">
                    <h4>检测到同步冲突</h4>
                    <div id="conflictDetails"></div>
                    <div>
                        <button class="btn" onclick="resolveConflict('local')">使用本地版本</button>
                        <button class="btn" onclick="resolveConflict('remote')">使用远程版本</button>
                        <button class="btn" onclick="resolveConflict('merge')">尝试合并</button>
                    </div>
                </div>
                <div id="conflictList"></div>
            </div>

            <!-- 版本历史 -->
            <div class="sync-section">
                <div class="section-title">
                    📚 版本历史
                </div>
                <div>
                    <input type="text" class="input-field" id="versionFile" placeholder="文件路径">
                    <button class="btn" onclick="loadVersionHistory()">加载历史</button>
                </div>
                <div class="version-history" id="versionHistory"></div>
            </div>

            <!-- 远程连接 -->
            <div class="sync-section">
                <div class="section-title">
                    🌐 远程连接
                </div>
                <div>
                    <input type="text" class="input-field" id="remoteUrl" placeholder="远程服务器地址">
                    <input type="text" class="input-field" id="remoteAuth" placeholder="认证密钥">
                    <button class="btn" onclick="connectRemote()">连接远程</button>
                    <button class="btn btn-danger" onclick="disconnectRemote()">断开连接</button>
                </div>
                <div>
                    <p>连接状态: <span id="connectionStatus">未连接</span></p>
                    <p>远程服务器: <span id="remoteServer">无</span></p>
                    <p>最后同步: <span id="lastSync">从未</span></p>
                </div>
            </div>

            <!-- 量子同步 -->
            <div class="sync-section">
                <div class="section-title">
                    ⚛️ 量子同步
                </div>
                <div>
                    <p>量子纠缠同步: <span id="quantumSync">未激活</span></p>
                    <p>纠缠强度: <span id="entanglementStrength">0.89</span></p>
                    <p>量子信道: <span id="quantumChannel">QS-2024-001</span></p>
                    <button class="btn" onclick="activateQuantumSync()">激活量子同步</button>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="quantumProgress" style="width: 89%">89%</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class QuantumDataSynchronizer {
            constructor() {
                this.quantumGene = '0xDS9876';
                this.syncStrength = 0.89;
                this.syncFiles = new Map();
                this.conflicts = new Map();
                this.versionHistory = new Map();
                this.remoteConnected = false;
                this.quantumSyncActive = false;
                this.stats = {
                    syncedFiles: 0,
                    pendingSync: 0,
                    conflictCount: 0,
                    syncSpeed: 0
                };
                this.syncProgress = 0;
                this.init();
            }

            init() {
                this.createSampleFiles();
                this.updateUI();
                this.startSyncMonitoring();
            }

            createSampleFiles() {
                // 创建示例同步文件
                this.addSyncFile('/documents/report.pdf', 'synced', 1024000);
                this.addSyncFile('/projects/quantum.qentl', 'syncing', 2048000);
                this.addSyncFile('/config/system.conf', 'pending', 4096);
                this.addSyncFile('/data/database.db', 'conflict', 10485760);
                
                // 创建示例冲突
                this.addConflict('/data/database.db', 'local', 'remote', 'Both versions modified');
            }

            addSyncFile(path, status, size) {
                const file = {
                    id: 'file_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                    path: path,
                    status: status, // synced, syncing, pending, conflict
                    size: size,
                    lastSync: status === 'synced' ? new Date() : null,
                    progress: status === 'syncing' ? Math.random() * 100 : 0
                };
                
                this.syncFiles.set(file.id, file);
                this.updateStats();
            }

            addConflict(path, localVersion, remoteVersion, reason) {
                const conflict = {
                    id: 'conflict_' + Date.now(),
                    path: path,
                    localVersion: localVersion,
                    remoteVersion: remoteVersion,
                    reason: reason,
                    timestamp: new Date()
                };
                
                this.conflicts.set(conflict.id, conflict);
                this.stats.conflictCount++;
            }

            startSync(path, mode) {
                if (!path) path = document.getElementById('syncPath').value;
                if (!mode) mode = document.getElementById('syncMode').value;
                
                if (!path) {
                    alert('请输入同步路径');
                    return;
                }

                const fileId = this.addSyncFile(path, 'syncing', Math.random() * 5000000);
                
                // 模拟同步过程
                this.simulateSync(fileId);
            }

            simulateSync(fileId) {
                const file = this.syncFiles.get(fileId);
                if (!file) return;

                const syncInterval = setInterval(() => {
                    file.progress += Math.random() * 20;
                    this.stats.syncSpeed = (Math.random() * 10).toFixed(1);
                    
                    if (file.progress >= 100) {
                        file.progress = 100;
                        file.status = 'synced';
                        file.lastSync = new Date();
                        this.stats.syncedFiles++;
                        this.stats.pendingSync = Math.max(0, this.stats.pendingSync - 1);
                        clearInterval(syncInterval);
                        
                        // 可能产生冲突
                        if (Math.random() < 0.2) {
                            file.status = 'conflict';
                            this.addConflict(file.path, 'local_v1', 'remote_v1', 'Version mismatch');
                        }
                    }
                    
                    this.updateUI();
                }, 500);
            }

            stopSync() {
                this.syncFiles.forEach(file => {
                    if (file.status === 'syncing') {
                        file.status = 'pending';
                        file.progress = 0;
                    }
                });
                this.stats.syncSpeed = 0;
                this.updateUI();
            }

            resolveConflict(resolution, conflictId) {
                if (!conflictId) {
                    // 解决第一个冲突
                    const firstConflict = Array.from(this.conflicts.values())[0];
                    if (firstConflict) {
                        conflictId = firstConflict.id;
                    }
                }
                
                const conflict = this.conflicts.get(conflictId);
                if (!conflict) return;

                // 更新文件状态
                this.syncFiles.forEach(file => {
                    if (file.path === conflict.path) {
                        file.status = 'synced';
                        file.lastSync = new Date();
                    }
                });

                this.conflicts.delete(conflictId);
                this.stats.conflictCount--;
                this.updateUI();
                
                console.log(`冲突已解决: ${conflict.path} 使用 ${resolution} 策略`);
            }

            connectRemote() {
                const url = document.getElementById('remoteUrl').value;
                const auth = document.getElementById('remoteAuth').value;
                
                if (!url) {
                    alert('请输入远程服务器地址');
                    return;
                }

                // 模拟连接过程
                setTimeout(() => {
                    this.remoteConnected = true;
                    document.getElementById('connectionStatus').textContent = '已连接';
                    document.getElementById('remoteServer').textContent = url;
                    document.getElementById('lastSync').textContent = new Date().toLocaleString();
                }, 1000);
            }

            disconnectRemote() {
                this.remoteConnected = false;
                document.getElementById('connectionStatus').textContent = '未连接';
                document.getElementById('remoteServer').textContent = '无';
            }

            activateQuantumSync() {
                this.quantumSyncActive = !this.quantumSyncActive;
                document.getElementById('quantumSync').textContent = 
                    this.quantumSyncActive ? '已激活' : '未激活';
                
                if (this.quantumSyncActive) {
                    // 启动量子同步效果
                    this.startQuantumSyncEffect();
                }
            }

            startQuantumSyncEffect() {
                setInterval(() => {
                    if (this.quantumSyncActive) {
                        // 模拟量子纠缠同步
                        const strength = 0.85 + Math.random() * 0.1;
                        document.getElementById('entanglementStrength').textContent = strength.toFixed(3);
                        
                        // 量子同步比传统同步快10倍
                        this.stats.syncSpeed = (parseFloat(this.stats.syncSpeed) * 1.5).toFixed(1);
                    }
                }, 2000);
            }

            loadVersionHistory() {
                const filePath = document.getElementById('versionFile').value;
                if (!filePath) {
                    alert('请输入文件路径');
                    return;
                }

                // 生成模拟版本历史
                const versions = [];
                for (let i = 5; i >= 1; i--) {
                    const date = new Date();
                    date.setDate(date.getDate() - i);
                    versions.push({
                        version: `v1.${6-i}`,
                        date: date,
                        author: i % 2 === 0 ? 'QSM系统' : '用户',
                        changes: `第${6-i}次修改`,
                        size: Math.floor(Math.random() * 1000000)
                    });
                }

                this.versionHistory.set(filePath, versions);
                this.updateVersionHistoryUI();
            }

            updateStats() {
                let synced = 0;
                let pending = 0;
                let conflicts = 0;

                this.syncFiles.forEach(file => {
                    switch (file.status) {
                        case 'synced':
                            synced++;
                            break;
                        case 'pending':
                        case 'syncing':
                            pending++;
                            break;
                        case 'conflict':
                            conflicts++;
                            break;
                    }
                });

                this.stats.syncedFiles = synced;
                this.stats.pendingSync = pending;
                this.stats.conflictCount = conflicts;

                // 计算总体进度
                const total = this.syncFiles.size;
                this.syncProgress = total > 0 ? (synced / total * 100) : 0;
            }

            updateUI() {
                this.updateStats();
                this.updateStatsUI();
                this.updateFileListUI();
                this.updateConflictUI();
            }

            updateStatsUI() {
                document.getElementById('syncedFiles').textContent = this.stats.syncedFiles;
                document.getElementById('pendingSync').textContent = this.stats.pendingSync;
                document.getElementById('conflictCount').textContent = this.stats.conflictCount;
                document.getElementById('syncSpeed').textContent = this.stats.syncSpeed + ' MB/s';
                
                const progressElement = document.getElementById('overallProgress');
                progressElement.style.width = this.syncProgress + '%';
                progressElement.textContent = this.syncProgress.toFixed(0) + '%';
            }

            updateFileListUI() {
                const fileList = document.getElementById('syncFileList');
                fileList.innerHTML = '';

                this.syncFiles.forEach(file => {
                    const item = document.createElement('div');
                    item.className = `file-item ${file.status}`;
                    
                    const statusIcon = {
                        'synced': '✅',
                        'syncing': '🔄',
                        'pending': '⏳',
                        'conflict': '⚠️'
                    };

                    item.innerHTML = `
                        <div>
                            <div>${statusIcon[file.status]} ${file.path}</div>
                            <small>${(file.size / 1024 / 1024).toFixed(2)} MB</small>
                            ${file.status === 'syncing' ? 
                                `<div style="width: 100px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; margin-top: 5px;">
                                    <div style="width: ${file.progress}%; height: 100%; background: #00cec9; border-radius: 2px;"></div>
                                </div>` : ''
                            }
                        </div>
                        <div>
                            ${file.lastSync ? file.lastSync.toLocaleTimeString() : '未同步'}
                        </div>
                    `;
                    
                    fileList.appendChild(item);
                });
            }

            updateConflictUI() {
                const conflictList = document.getElementById('conflictList');
                const conflictResolver = document.getElementById('conflictResolver');
                
                if (this.conflicts.size > 0) {
                    conflictResolver.style.display = 'block';
                    const firstConflict = Array.from(this.conflicts.values())[0];
                    document.getElementById('conflictDetails').innerHTML = `
                        <div>文件: ${firstConflict.path}</div>
                        <div>原因: ${firstConflict.reason}</div>
                        <div>时间: ${firstConflict.timestamp.toLocaleString()}</div>
                    `;
                } else {
                    conflictResolver.style.display = 'none';
                }

                conflictList.innerHTML = '';
                this.conflicts.forEach(conflict => {
                    const item = document.createElement('div');
                    item.className = 'file-item conflict';
                    item.innerHTML = `
                        <div>
                            <div>⚠️ ${conflict.path}</div>
                            <small>${conflict.reason}</small>
                        </div>
                        <button class="btn" onclick="dataSynchronizer.resolveConflict('merge', '${conflict.id}')">解决</button>
                    `;
                    conflictList.appendChild(item);
                });
            }

            updateVersionHistoryUI() {
                const historyList = document.getElementById('versionHistory');
                historyList.innerHTML = '';

                const filePath = document.getElementById('versionFile').value;
                const versions = this.versionHistory.get(filePath);
                
                if (versions) {
                    versions.forEach(version => {
                        const item = document.createElement('div');
                        item.className = 'version-item';
                        item.innerHTML = `
                            <div>
                                <div><strong>${version.version}</strong> - ${version.author}</div>
                                <small>${version.changes} (${(version.size / 1024).toFixed(1)} KB)</small>
                            </div>
                            <div>
                                <small>${version.date.toLocaleString()}</small>
                            </div>
                        `;
                        historyList.appendChild(item);
                    });
                }
            }

            startSyncMonitoring() {
                setInterval(() => {
                    // 模拟同步活动
                    if (Math.random() < 0.1) {
                        const paths = ['/logs/system.log', '/temp/cache.tmp', '/data/metrics.json'];
                        const randomPath = paths[Math.floor(Math.random() * paths.length)];
                        this.addSyncFile(randomPath, 'pending', Math.random() * 1000000);
                        this.updateUI();
                    }
                }, 5000);
            }
        }

        const dataSynchronizer = new QuantumDataSynchronizer();

        // UI事件处理函数
        function startSync() {
            dataSynchronizer.startSync();
        }

        function stopSync() {
            dataSynchronizer.stopSync();
        }

        function resolveConflict(resolution) {
            dataSynchronizer.resolveConflict(resolution);
        }

        function connectRemote() {
            dataSynchronizer.connectRemote();
        }

        function disconnectRemote() {
            dataSynchronizer.disconnectRemote();
        }

        function activateQuantumSync() {
            dataSynchronizer.activateQuantumSync();
        }

        function loadVersionHistory() {
            dataSynchronizer.loadVersionHistory();
        }

        // 量子纠缠通信
        setInterval(() => {
            window.parent.postMessage({
                type: 'quantum-entanglement',
                source: 'data-synchronizer',
                gene: dataSynchronizer.quantumGene,
                message: '数据同步器运行正常',
                stats: dataSynchronizer.stats
            }, '*');
        }, 5000);
    </script>
</body>
</html>
