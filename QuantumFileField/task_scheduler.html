<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QEntL任务调度器 - 量子文件场</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .scheduler-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .scheduler-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #a29bfe;
        }

        .task-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            border-left: 3px solid #a29bfe;
        }

        .task-item.running {
            border-left-color: #00b894;
            animation: taskPulse 1s infinite;
        }

        .task-item.high-priority {
            border-left-color: #e17055;
        }

        @keyframes taskPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .btn {
            background: linear-gradient(45deg, #a29bfe, #6c5ce7);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
        }

        .input-field {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ QEntL任务调度器</h1>
            <div class="quantum-gene">量子基因: 0xTS4321 | 调度效率: 0.97</div>
            <p>智能任务管理与资源调度系统</p>
        </div>

        <div class="scheduler-panel">
            <div class="scheduler-section">
                <div class="section-title">📋 任务列表</div>
                <div class="task-list" id="taskList"></div>
                <button class="btn" onclick="addTask()">添加任务</button>
            </div>

            <div class="scheduler-section">
                <div class="section-title">📊 调度统计</div>
                <div>
                    <p>运行中任务: <span id="runningTasks">0</span></p>
                    <p>等待中任务: <span id="waitingTasks">0</span></p>
                    <p>已完成任务: <span id="completedTasks">0</span></p>
                    <p>CPU使用率: <span id="cpuUsage">0%</span></p>
                </div>
            </div>

            <div class="scheduler-section">
                <div class="section-title">⚛️ 量子调度</div>
                <p>量子并行处理: <span id="quantumParallel">未激活</span></p>
                <p>量子优先级算法: <span id="quantumPriority">关闭</span></p>
                <button class="btn" onclick="activateQuantumScheduling()">激活量子调度</button>
            </div>
        </div>
    </div>

    <script>
        class QuantumTaskScheduler {
            constructor() {
                this.quantumGene = '0xTS4321';
                this.schedulingEfficiency = 0.97;
                this.tasks = new Map();
                this.runningTasks = 0;
                this.waitingTasks = 0;
                this.completedTasks = 0;
                this.cpuUsage = 0;
                this.quantumMode = false;
                this.init();
            }

            init() {
                this.createSampleTasks();
                this.updateUI();
                this.startScheduling();
            }

            createSampleTasks() {
                this.addTask('系统扫描', 'HIGH', 5000);
                this.addTask('文件备份', 'NORMAL', 10000);
                this.addTask('缓存清理', 'LOW', 2000);
                this.addTask('量子计算', 'CRITICAL', 15000);
            }

            addTask(name, priority, duration) {
                const task = {
                    id: 'task_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                    name: name || '新任务',
                    priority: priority || 'NORMAL',
                    status: 'WAITING',
                    duration: duration || 5000,
                    progress: 0,
                    startTime: null,
                    endTime: null
                };
                
                this.tasks.set(task.id, task);
                this.waitingTasks++;
                this.updateUI();
                return task.id;
            }

            startTask(taskId) {
                const task = this.tasks.get(taskId);
                if (!task || task.status !== 'WAITING') return;

                task.status = 'RUNNING';
                task.startTime = new Date();
                this.runningTasks++;
                this.waitingTasks--;

                // 模拟任务执行
                const interval = setInterval(() => {
                    task.progress += Math.random() * 20;
                    this.cpuUsage = Math.min(100, this.cpuUsage + 10);
                    
                    if (task.progress >= 100) {
                        task.progress = 100;
                        task.status = 'COMPLETED';
                        task.endTime = new Date();
                        this.runningTasks--;
                        this.completedTasks++;
                        this.cpuUsage = Math.max(0, this.cpuUsage - 15);
                        clearInterval(interval);
                    }
                    
                    this.updateUI();
                }, task.duration / 10);
            }

            activateQuantumScheduling() {
                this.quantumMode = !this.quantumMode;
                document.getElementById('quantumParallel').textContent = 
                    this.quantumMode ? '已激活' : '未激活';
                document.getElementById('quantumPriority').textContent = 
                    this.quantumMode ? '开启' : '关闭';
                
                if (this.quantumMode) {
                    // 量子调度提升效率
                    this.schedulingEfficiency = 0.99;
                }
            }

            updateUI() {
                this.updateTaskList();
                this.updateStats();
            }

            updateTaskList() {
                const taskList = document.getElementById('taskList');
                taskList.innerHTML = '';

                this.tasks.forEach(task => {
                    const item = document.createElement('div');
                    item.className = `task-item ${task.status.toLowerCase()} ${task.priority.toLowerCase()}-priority`;
                    
                    const statusIcon = {
                        'WAITING': '⏳',
                        'RUNNING': '🔄',
                        'COMPLETED': '✅'
                    };

                    item.innerHTML = `
                        <div>
                            <div>${statusIcon[task.status]} ${task.name}</div>
                            <small>优先级: ${task.priority}</small>
                            ${task.status === 'RUNNING' ? 
                                `<div style="width: 100px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; margin-top: 5px;">
                                    <div style="width: ${task.progress}%; height: 100%; background: #a29bfe; border-radius: 2px;"></div>
                                </div>` : ''
                            }
                        </div>
                        <div>
                            ${task.status === 'WAITING' ? 
                                `<button class="btn" onclick="taskScheduler.startTask('${task.id}')">启动</button>` : 
                                task.endTime ? task.endTime.toLocaleTimeString() : '运行中'
                            }
                        </div>
                    `;
                    
                    taskList.appendChild(item);
                });
            }

            updateStats() {
                document.getElementById('runningTasks').textContent = this.runningTasks;
                document.getElementById('waitingTasks').textContent = this.waitingTasks;
                document.getElementById('completedTasks').textContent = this.completedTasks;
                document.getElementById('cpuUsage').textContent = this.cpuUsage.toFixed(0) + '%';
            }

            startScheduling() {
                setInterval(() => {
                    // 自动启动高优先级任务
                    this.tasks.forEach(task => {
                        if (task.status === 'WAITING' && 
                            (task.priority === 'CRITICAL' || task.priority === 'HIGH') &&
                            this.runningTasks < 3) {
                            this.startTask(task.id);
                        }
                    });

                    // 模拟CPU使用率变化
                    if (this.runningTasks === 0) {
                        this.cpuUsage = Math.max(0, this.cpuUsage - 5);
                    }
                    
                    this.updateUI();
                }, 2000);
            }
        }

        const taskScheduler = new QuantumTaskScheduler();

        function addTask() {
            const name = prompt('请输入任务名称:');
            if (name) {
                taskScheduler.addTask(name, 'NORMAL', Math.random() * 10000 + 2000);
            }
        }

        function activateQuantumScheduling() {
            taskScheduler.activateQuantumScheduling();
        }

        // 量子纠缠通信
        setInterval(() => {
            window.parent.postMessage({
                type: 'quantum-entanglement',
                source: 'task-scheduler',
                gene: taskScheduler.quantumGene,
                message: '任务调度器运行正常'
            }, '*');
        }, 5000);
    </script>
</body>
</html>
