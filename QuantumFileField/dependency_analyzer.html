<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QEntL量子依赖分析器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #00ff88;
            overflow: hidden;
            position: relative;
        }

        .quantum-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00ff88;
            border-radius: 50%;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 2;
            padding: 20px;
            height: 100vh;
            overflow-y: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 10px;
            position: relative;
        }

        .quantum-gene {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 12px;
            color: #00aaff;
            opacity: 0.8;
        }

        .title {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .subtitle {
            font-size: 1.2em;
            color: #88ffaa;
            margin-bottom: 20px;
        }

        .analysis-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .panel-section {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 20px;
            position: relative;
        }

        .section-title {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #00aaff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-icon {
            width: 20px;
            height: 20px;
            background: #00ff88;
            border-radius: 50%;
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .dependency-graph {
            width: 100%;
            height: 400px;
            border: 1px solid #333;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .graph-canvas {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .file-node {
            position: absolute;
            width: 120px;
            height: 60px;
            background: linear-gradient(45deg, #00ff88, #00aa66);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            padding: 5px;
        }

        .file-node:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.5);
        }

        .file-node.circular-dependency {
            background: linear-gradient(45deg, #ff6b6b, #ff5252);
            animation: warning-pulse 1s infinite;
        }

        @keyframes warning-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .dependency-line {
            position: absolute;
            height: 2px;
            background: #00aaff;
            transform-origin: left center;
            opacity: 0.7;
        }

        .dependency-line.circular {
            background: #ff6b6b;
            animation: warning-pulse 1s infinite;
        }

        .dependency-list {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #333;
            border-radius: 5px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .dependency-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            margin: 5px 0;
            background: rgba(0, 255, 136, 0.05);
            border-radius: 4px;
            transition: background 0.3s ease;
        }

        .dependency-item:hover {
            background: rgba(0, 255, 136, 0.15);
        }

        .dependency-path {
            color: #00ff88;
            font-weight: bold;
        }

        .dependency-type {
            color: #00aaff;
            font-size: 12px;
            background: rgba(0, 170, 255, 0.2);
            padding: 2px 6px;
            border-radius: 10px;
        }

        .dependency-importance {
            color: #ffaa00;
            font-size: 12px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(45deg, #00ff88, #00aa66);
            color: #000;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
        }

        .btn.danger {
            background: linear-gradient(45deg, #ff6b6b, #ff5252);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: rgba(0, 255, 136, 0.05);
            border-radius: 8px;
            border: 1px solid #00ff88;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #00ff88;
            display: block;
        }

        .stat-label {
            font-size: 0.9em;
            color: #88ffaa;
            margin-top: 5px;
        }

        .circular-warning {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            color: #ff6b6b;
        }

        .circular-warning h3 {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .circular-path {
            background: rgba(255, 107, 107, 0.2);
            padding: 8px;
            border-radius: 4px;
            margin: 5px 0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .entanglement-channel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            animation: pulse 2s infinite;
            z-index: 1000;
        }

        .entanglement-channel:hover {
            background: rgba(0, 255, 136, 0.2);
            transform: scale(1.1);
        }

        .file-input {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 5px;
            padding: 10px;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            width: 100%;
            margin-bottom: 15px;
        }

        .file-input:focus {
            outline: none;
            border-color: #00aaff;
            box-shadow: 0 0 10px rgba(0, 170, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="quantum-particles" id="particles"></div>
    
    <div class="container">
        <div class="header">
            <div class="quantum-gene">量子基因: 0xDEP7B2</div>
            <h1 class="title">量子依赖分析器</h1>
            <p class="subtitle">QEntL Dependency Analyzer - 分析文件间的依赖关系与循环依赖</p>
        </div>

        <div class="analysis-panel">
            <div class="panel-section">
                <h3 class="section-title">
                    <div class="section-icon"></div>
                    依赖关系图谱
                </h3>
                <div class="dependency-graph" id="dependencyGraph">
                    <canvas class="graph-canvas" id="graphCanvas"></canvas>
                </div>
            </div>

            <div class="panel-section">
                <h3 class="section-title">
                    <div class="section-icon"></div>
                    文件依赖列表
                </h3>
                <input type="text" class="file-input" id="filePathInput" 
                       placeholder="输入文件路径进行分析...">
                <div class="dependency-list" id="dependencyList">
                    <div class="dependency-item">
                        <span class="dependency-path">./models/qsm_model.qentl</span>
                        <div>
                            <span class="dependency-type">import</span>
                            <span class="dependency-importance">0.85</span>
                        </div>
                    </div>
                    <div class="dependency-item">
                        <span class="dependency-path">./system/quantum_bridge.qentl</span>
                        <div>
                            <span class="dependency-type">require</span>
                            <span class="dependency-importance">0.92</span>
                        </div>
                    </div>
                    <div class="dependency-item">
                        <span class="dependency-path">./utils/logger.qentl</span>
                        <div>
                            <span class="dependency-type">import</span>
                            <span class="dependency-importance">0.65</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="circular-warning" id="circularWarning" style="display: none;">
            <h3>⚠️ 检测到循环依赖</h3>
            <div id="circularPaths"></div>
        </div>

        <div class="controls">
            <button class="btn" onclick="analyzeFile()">分析文件</button>
            <button class="btn" onclick="analyzeAll()">分析全部</button>
            <button class="btn" onclick="detectCircular()">检测循环依赖</button>
            <button class="btn danger" onclick="clearCache()">清除缓存</button>
            <button class="btn" onclick="exportDependencies()">导出依赖</button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-value" id="totalFiles">47</span>
                <div class="stat-label">已分析文件</div>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="totalDependencies">156</span>
                <div class="stat-label">依赖关系数</div>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="circularCount">2</span>
                <div class="stat-label">循环依赖数</div>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="cacheHits">89%</span>
                <div class="stat-label">缓存命中率</div>
            </div>
        </div>
    </div>

    <div class="entanglement-channel" onclick="toggleEntanglement()" title="量子纠缠信道">
        🔗
    </div>

    <script>
        // 量子基因编码
        const QUANTUM_GENE = '0xDEP7B2';
        
        // 依赖分析器状态
        const dependencyState = {
            initialized: false,
            dependencyCache: new Map(),
            currentAnalyzing: [],
            circularDependencies: [],
            statistics: {
                totalFiles: 47,
                totalDependencies: 156,
                circularCount: 2,
                cacheHits: 89
            },
            nodes: [],
            edges: []
        };

        // 示例依赖数据
        const sampleDependencies = [
            {
                source: './src/quantum_bridge.qentl',
                dependencies: [
                    { path: './models/qsm_model.qentl', type: 'import', importance: 0.85 },
                    { path: './utils/logger.qentl', type: 'import', importance: 0.65 },
                    { path: './system/kernel_loader.qentl', type: 'require', importance: 0.92 }
                ]
            },
            {
                source: './models/qsm_model.qentl',
                dependencies: [
                    { path: './models/neural_network.qentl', type: 'import', importance: 0.95 },
                    { path: './utils/quantum_utils.qentl', type: 'import', importance: 0.78 }
                ]
            },
            {
                source: './system/kernel_loader.qentl',
                dependencies: [
                    { path: './src/quantum_bridge.qentl', type: 'import', importance: 0.88 }
                ]
            }
        ];

        // 初始化量子粒子背景
        function initQuantumParticles() {
            const container = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (3 + Math.random() * 6) + 's';
                container.appendChild(particle);
            }
        }

        // 初始化依赖分析器
        function initializeDependencyAnalyzer() {
            if (dependencyState.initialized) return true;
            
            console.log('[QEntL依赖分析器] 正在初始化...');
            
            dependencyState.initialized = true;
            dependencyState.dependencyCache = new Map();
            dependencyState.currentAnalyzing = [];
            dependencyState.circularDependencies = [];
            
            // 加载示例数据
            sampleDependencies.forEach(dep => {
                dependencyState.dependencyCache.set(dep.source, dep);
            });
            
            // 初始化图形
            initializeDependencyGraph();
            
            console.log('[QEntL依赖分析器] 初始化完成');
            return true;
        }

        // 初始化依赖关系图
        function initializeDependencyGraph() {
            const canvas = document.getElementById('graphCanvas');
            const ctx = canvas.getContext('2d');
            
            // 设置画布大小
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            // 生成节点位置
            generateNodes();
            
            // 绘制图形
            drawDependencyGraph();
        }

        // 生成节点
        function generateNodes() {
            const files = [
                'quantum_bridge.qentl',
                'qsm_model.qentl',
                'kernel_loader.qentl',
                'neural_network.qentl',
                'quantum_utils.qentl',
                'logger.qentl'
            ];
            
            dependencyState.nodes = files.map((file, index) => ({
                id: file,
                x: 100 + (index % 3) * 150,
                y: 100 + Math.floor(index / 3) * 120,
                radius: 40,
                color: '#00ff88',
                isCircular: false
            }));
            
            // 生成边
            dependencyState.edges = [
                { from: 'quantum_bridge.qentl', to: 'qsm_model.qentl', type: 'import' },
                { from: 'quantum_bridge.qentl', to: 'logger.qentl', type: 'import' },
                { from: 'quantum_bridge.qentl', to: 'kernel_loader.qentl', type: 'require' },
                { from: 'qsm_model.qentl', to: 'neural_network.qentl', type: 'import' },
                { from: 'qsm_model.qentl', to: 'quantum_utils.qentl', type: 'import' },
                { from: 'kernel_loader.qentl', to: 'quantum_bridge.qentl', type: 'import' }
            ];
        }

        // 绘制依赖关系图
        function drawDependencyGraph() {
            const canvas = document.getElementById('graphCanvas');
            const ctx = canvas.getContext('2d');
            
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制边
            dependencyState.edges.forEach(edge => {
                const fromNode = dependencyState.nodes.find(n => n.id === edge.from);
                const toNode = dependencyState.nodes.find(n => n.id === edge.to);
                
                if (fromNode && toNode) {
                    ctx.beginPath();
                    ctx.moveTo(fromNode.x, fromNode.y);
                    ctx.lineTo(toNode.x, toNode.y);
                    ctx.strokeStyle = edge.type === 'import' ? '#00aaff' : '#ffaa00';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // 绘制箭头
                    drawArrow(ctx, fromNode.x, fromNode.y, toNode.x, toNode.y);
                }
            });
            
            // 绘制节点
            dependencyState.nodes.forEach(node => {
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, 2 * Math.PI);
                ctx.fillStyle = node.isCircular ? '#ff6b6b' : node.color;
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 绘制文本
                ctx.fillStyle = '#000';
                ctx.font = '12px Courier New';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                const text = node.id.replace('.qentl', '');
                const lines = text.split('_');
                lines.forEach((line, index) => {
                    ctx.fillText(line, node.x, node.y + (index - lines.length/2 + 0.5) * 15);
                });
            });
        }

        // 绘制箭头
        function drawArrow(ctx, fromX, fromY, toX, toY) {
            const angle = Math.atan2(toY - fromY, toX - fromX);
            const headLength = 10;
            
            ctx.beginPath();
            ctx.moveTo(toX - headLength * Math.cos(angle - Math.PI/6), 
                       toY - headLength * Math.sin(angle - Math.PI/6));
            ctx.lineTo(toX, toY);
            ctx.lineTo(toX - headLength * Math.cos(angle + Math.PI/6), 
                       toY - headLength * Math.sin(angle + Math.PI/6));
            ctx.stroke();
        }

        // 分析文件依赖
        function analyzeFile() {
            const filePath = document.getElementById('filePathInput').value.trim();
            
            if (!filePath) {
                alert('请输入文件路径');
                return;
            }
            
            console.log(`[QEntL依赖分析器] 正在分析文件: ${filePath}`);
            
            // 模拟分析过程
            setTimeout(() => {
                const dependencies = generateMockDependencies(filePath);
                updateDependencyList(dependencies);
                
                // 更新统计
                dependencyState.statistics.totalFiles++;
                dependencyState.statistics.totalDependencies += dependencies.length;
                updateStatistics();
                
                sendQuantumEntanglementMessage('file_analyzed', {
                    filePath: filePath,
                    dependencyCount: dependencies.length
                });
                
                console.log(`[QEntL依赖分析器] 文件分析完成: ${filePath}`);
            }, 1000);
        }

        // 生成模拟依赖
        function generateMockDependencies(filePath) {
            const mockDeps = [
                { path: './models/qsm_model.qentl', type: 'import', importance: 0.85 },
                { path: './utils/logger.qentl', type: 'import', importance: 0.65 },
                { path: './system/quantum_bridge.qentl', type: 'require', importance: 0.92 },
                { path: './kernel/microkernel_core.qentl', type: 'import', importance: 0.78 }
            ];
            
            return mockDeps.slice(0, Math.floor(Math.random() * 4) + 1);
        }

        // 更新依赖列表显示
        function updateDependencyList(dependencies) {
            const listContainer = document.getElementById('dependencyList');
            listContainer.innerHTML = '';
            
            dependencies.forEach(dep => {
                const item = document.createElement('div');
                item.className = 'dependency-item';
                item.innerHTML = `
                    <span class="dependency-path">${dep.path}</span>
                    <div>
                        <span class="dependency-type">${dep.type}</span>
                        <span class="dependency-importance">${dep.importance}</span>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        // 分析全部文件
        function analyzeAll() {
            console.log('[QEntL依赖分析器] 正在分析全部文件...');
            
            // 模拟批量分析
            const totalFiles = 47;
            let analyzedCount = 0;
            
            const analyzeNext = () => {
                if (analyzedCount < totalFiles) {
                    analyzedCount++;
                    
                    // 更新统计
                    dependencyState.statistics.totalFiles = analyzedCount;
                    dependencyState.statistics.totalDependencies = analyzedCount * 3 + Math.floor(Math.random() * 10);
                    updateStatistics();
                    
                    setTimeout(analyzeNext, 50);
                } else {
                    console.log('[QEntL依赖分析器] 全部文件分析完成');
                    
                    sendQuantumEntanglementMessage('all_files_analyzed', {
                        totalFiles: totalFiles,
                        totalDependencies: dependencyState.statistics.totalDependencies
                    });
                }
            };
            
            analyzeNext();
        }

        // 检测循环依赖
        function detectCircular() {
            console.log('[QEntL依赖分析器] 正在检测循环依赖...');
            
            // 模拟检测过程
            setTimeout(() => {
                const circularPaths = [
                    ['quantum_bridge.qentl', 'kernel_loader.qentl', 'quantum_bridge.qentl'],
                    ['qsm_model.qentl', 'neural_network.qentl', 'som_model.qentl', 'qsm_model.qentl']
                ];
                
                if (circularPaths.length > 0) {
                    showCircularWarning(circularPaths);
                    
                    // 标记循环依赖节点
                    dependencyState.nodes.forEach(node => {
                        node.isCircular = circularPaths.some(path => 
                            path.includes(node.id));
                    });
                    
                    drawDependencyGraph();
                    
                    dependencyState.statistics.circularCount = circularPaths.length;
                    updateStatistics();
                }
                
                console.log('[QEntL依赖分析器] 循环依赖检测完成');
            }, 1500);
        }

        // 显示循环依赖警告
        function showCircularWarning(circularPaths) {
            const warningDiv = document.getElementById('circularWarning');
            const pathsDiv = document.getElementById('circularPaths');
            
            pathsDiv.innerHTML = '';
            circularPaths.forEach(path => {
                const pathDiv = document.createElement('div');
                pathDiv.className = 'circular-path';
                pathDiv.textContent = path.join(' → ');
                pathsDiv.appendChild(pathDiv);
            });
            
            warningDiv.style.display = 'block';
        }

        // 清除缓存
        function clearCache() {
            dependencyState.dependencyCache.clear();
            dependencyState.circularDependencies = [];
            
            document.getElementById('circularWarning').style.display = 'none';
            
            // 重置节点颜色
            dependencyState.nodes.forEach(node => {
                node.isCircular = false;
            });
            
            drawDependencyGraph();
            
            console.log('[QEntL依赖分析器] 缓存已清除');
        }

        // 导出依赖关系
        function exportDependencies() {
            const dependencyData = {
                timestamp: Date.now(),
                quantumGene: QUANTUM_GENE,
                dependencies: Array.from(dependencyState.dependencyCache.entries()),
                circularDependencies: dependencyState.circularDependencies,
                statistics: dependencyState.statistics
            };
            
            const dataStr = JSON.stringify(dependencyData, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            
            const link = document.createElement('a');
            link.href = URL.createObjectURL(dataBlob);
            link.download = `quantum_dependencies_${Date.now()}.json`;
            link.click();
            
            console.log('[QEntL依赖分析器] 依赖数据已导出');
        }

        // 更新统计显示
        function updateStatistics() {
            document.getElementById('totalFiles').textContent = dependencyState.statistics.totalFiles;
            document.getElementById('totalDependencies').textContent = dependencyState.statistics.totalDependencies;
            document.getElementById('circularCount').textContent = dependencyState.statistics.circularCount;
            document.getElementById('cacheHits').textContent = dependencyState.statistics.cacheHits + '%';
        }

        // 量子纠缠信道通信
        function sendQuantumEntanglementMessage(type, data) {
            const message = {
                source: 'dependency_analyzer',
                type: type,
                quantumGene: QUANTUM_GENE,
                timestamp: Date.now(),
                data: data
            };
            
            window.postMessage(message, '*');
            console.log('[量子纠缠信道] 消息已发送:', message);
        }

        // 切换量子纠缠信道
        function toggleEntanglement() {
            const channel = document.querySelector('.entanglement-channel');
            channel.style.animation = 'none';
            channel.style.transform = 'scale(1.5)';
            channel.style.background = 'rgba(255, 170, 0, 0.3)';
            
            setTimeout(() => {
                channel.style.animation = 'pulse 2s infinite';
                channel.style.transform = 'scale(1)';
                channel.style.background = 'rgba(0, 255, 136, 0.1)';
            }, 500);
            
            sendQuantumEntanglementMessage('entanglement_toggle', {
                status: 'activated'
            });
        }

        // 监听量子纠缠消息
        window.addEventListener('message', (event) => {
            const message = event.data;
            if (message && message.source && message.source !== 'dependency_analyzer') {
                console.log('[量子纠缠信道] 收到消息:', message);
                
                if (message.type === 'file_opened') {
                    // 自动分析新打开的文件
                    document.getElementById('filePathInput').value = message.data.path;
                    analyzeFile();
                }
            }
        });

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            initQuantumParticles();
            initializeDependencyAnalyzer();
            
            // 监听窗口大小变化
            window.addEventListener('resize', () => {
                setTimeout(initializeDependencyGraph, 100);
            });
            
            console.log('[QEntL依赖分析器] 系统就绪');
        });

        // 页面标题动态效果
        let titleIndex = 0;
        const titleStates = [
            'QEntL量子依赖分析器',
            'QEntL量子依赖分析器 🔗',
            'QEntL量子依赖分析器 📊',
            'QEntL量子依赖分析器 ⚡'
        ];
        
        setInterval(() => {
            titleIndex = (titleIndex + 1) % titleStates.length;
            document.title = titleStates[titleIndex];
        }, 2000);
    </script>
</body>
