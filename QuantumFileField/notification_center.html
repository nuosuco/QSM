<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QEntL通知中心 - 量子文件场</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #333;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .quantum-gene {
            font-family: 'Courier New', monospace;
            color: #e74c3c;
            font-size: 14px;
        }

        .notification-panel {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-section {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #e74c3c;
        }

        .notification-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f8f9fa;
        }

        .notification-item {
            display: flex;
            align-items: flex-start;
            padding: 15px;
            border-bottom: 1px solid #eee;
            transition: all 0.3s ease;
        }

        .notification-item:hover {
            background: #e3f2fd;
        }

        .notification-item.unread {
            border-left: 4px solid #e74c3c;
            background: #fff3e0;
        }

        .notification-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .notification-message {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .notification-time {
            font-size: 12px;
            color: #999;
        }

        .notification-actions {
            display: flex;
            gap: 5px;
            margin-left: 10px;
        }

        .btn {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #95a5a6, #7f8c8d);
        }

        .input-field {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 5px 0;
        }

        .priority-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .priority-low { background: #2ecc71; }
        .priority-normal { background: #3498db; }
        .priority-high { background: #f39c12; }
        .priority-urgent { background: #e74c3c; }
        .priority-critical { background: #8e44ad; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }

        .stat-item {
            background: rgba(231, 76, 60, 0.1);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #e74c3c;
        }

        .filter-section {
            margin: 15px 0;
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin: 10px 0;
        }

        .filter-tag {
            background: #e74c3c;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
        }

        .filter-tag.active {
            background: #c0392b;
        }

        @media (max-width: 768px) {
            .notification-panel {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔔 QEntL通知中心</h1>
            <div class="quantum-gene">量子基因: QSM-NOTF-3456-N765 | 通知强度: 0.91</div>
            <p>智能通知管理与分发系统</p>
        </div>

        <div class="notification-panel">
            <!-- 控制面板 -->
            <div class="control-section">
                <div class="section-title">📊 通知统计</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="totalNotifications">0</div>
                        <div>总通知</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="unreadCount">0</div>
                        <div>未读</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="urgentCount">0</div>
                        <div>紧急</div>
                    </div>
                </div>

                <div class="section-title">🎯 发送通知</div>
                <input type="text" class="input-field" id="notificationTitle" placeholder="通知标题">
                <textarea class="input-field" id="notificationMessage" placeholder="通知内容" rows="3"></textarea>
                <select class="input-field" id="notificationPriority">
                    <option value="LOW">低优先级</option>
                    <option value="NORMAL" selected>正常优先级</option>
                    <option value="HIGH">高优先级</option>
                    <option value="URGENT">紧急优先级</option>
                    <option value="CRITICAL">关键优先级</option>
                </select>
                <select class="input-field" id="notificationType">
                    <option value="SYSTEM">系统通知</option>
                    <option value="APPLICATION">应用通知</option>
                    <option value="USER">用户通知</option>
                    <option value="SECURITY">安全通知</option>
                    <option value="QUANTUM">量子事件</option>
                </select>
                <button class="btn" onclick="sendNotification()">发送通知</button>

                <div class="section-title">🔍 过滤器</div>
                <div class="filter-section">
                    <div class="filter-tags">
                        <div class="filter-tag active" onclick="toggleFilter('all')">全部</div>
                        <div class="filter-tag" onclick="toggleFilter('unread')">未读</div>
                        <div class="filter-tag" onclick="toggleFilter('urgent')">紧急</div>
                        <div class="filter-tag" onclick="toggleFilter('system')">系统</div>
                        <div class="filter-tag" onclick="toggleFilter('quantum')">量子</div>
                    </div>
                </div>

                <div class="section-title">⚙️ 操作</div>
                <button class="btn" onclick="markAllAsRead()">全部标记已读</button>
                <button class="btn btn-secondary" onclick="clearDismissed()">清除已忽略</button>
            </div>

            <!-- 通知列表 -->
            <div class="control-section">
                <div class="section-title">📋 通知列表</div>
                <div class="notification-list" id="notificationList"></div>
            </div>
        </div>
    </div>

    <script>
        class QuantumNotificationCenter {
            constructor() {
                this.quantumGene = 'QSM-NOTF-3456-N765';
                this.notificationStrength = 0.91;
                this.notifications = new Map();
                this.groups = new Map();
                this.currentFilter = 'all';
                this.stats = {
                    totalNotifications: 0,
                    unreadCount: 0,
                    urgentCount: 0
                };
                this.init();
            }

            init() {
                this.createSystemNotifications();
                this.updateUI();
                this.startNotificationMonitoring();
            }

            createSystemNotifications() {
                // 创建一些示例通知
                this.sendNotification({
                    title: '系统启动完成',
                    message: 'QEntL量子操作系统已成功启动',
                    type: 'SYSTEM',
                    priority: 'NORMAL'
                });

                this.sendNotification({
                    title: '量子纠缠信道激活',
                    message: '量子纠缠通信信道已建立，系统间通信正常',
                    type: 'QUANTUM',
                    priority: 'HIGH'
                });

                this.sendNotification({
                    title: '安全扫描完成',
                    message: '系统安全扫描已完成，未发现威胁',
                    type: 'SECURITY',
                    priority: 'LOW'
                });
            }

            sendNotification(notificationData) {
                const notification = {
                    id: 'notif_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                    title: notificationData.title,
                    message: notificationData.message,
                    type: notificationData.type || 'SYSTEM',
                    priority: notificationData.priority || 'NORMAL',
                    status: 'UNREAD',
                    timestamp: new Date(),
                    sourceApp: notificationData.sourceApp || 'QEntL系统',
                    actions: this.generateActions(notificationData.type, notificationData.priority),
                    metadata: notificationData.metadata || {}
                };

                this.notifications.set(notification.id, notification);
                this.updateStats();
                this.updateNotificationList();
                
                // 播放通知声音（模拟）
                this.playNotificationSound(notification.priority);
                
                return notification.id;
            }

            generateActions(type, priority) {
                const actions = [
                    {
                        id: 'dismiss',
                        label: '忽略',
                        primary: false,
                        destructive: false
                    }
                ];

                if (priority === 'URGENT' || priority === 'CRITICAL') {
                    actions.unshift({
                        id: 'view',
                        label: '查看',
                        primary: true,
                        destructive: false
                    });
                }

                if (type === 'SECURITY') {
                    actions.push({
                        id: 'investigate',
                        label: '调查',
                        primary: false,
                        destructive: false
                    });
                }

                return actions;
            }

            markAsRead(notificationId) {
                const notification = this.notifications.get(notificationId);
                if (notification && notification.status === 'UNREAD') {
                    notification.status = 'READ';
                    this.updateStats();
                    this.updateNotificationList();
                }
            }

            dismissNotification(notificationId) {
                const notification = this.notifications.get(notificationId);
                if (notification) {
                    notification.status = 'DISMISSED';
                    this.updateStats();
                    this.updateNotificationList();
                }
            }

            executeAction(notificationId, actionId) {
                const notification = this.notifications.get(notificationId);
                if (!notification) return;

                switch (actionId) {
                    case 'dismiss':
                        this.dismissNotification(notificationId);
                        break;
                    case 'view':
                        this.markAsRead(notificationId);
                        alert(`查看通知: ${notification.title}`);
                        break;
                    case 'investigate':
                        this.markAsRead(notificationId);
                        alert(`正在调查安全事件: ${notification.title}`);
                        break;
                }
            }

            updateStats() {
                let totalNotifications = 0;
                let unreadCount = 0;
                let urgentCount = 0;

                this.notifications.forEach(notification => {
                    if (notification.status !== 'DISMISSED') {
                        totalNotifications++;
                    }
                    if (notification.status === 'UNREAD') {
                        unreadCount++;
                    }
                    if (notification.priority === 'URGENT' || notification.priority === 'CRITICAL') {
                        urgentCount++;
                    }
                });

                this.stats = { totalNotifications, unreadCount, urgentCount };
                this.updateStatsUI();
            }

            updateStatsUI() {
                document.getElementById('totalNotifications').textContent = this.stats.totalNotifications;
                document.getElementById('unreadCount').textContent = this.stats.unreadCount;
                document.getElementById('urgentCount').textContent = this.stats.urgentCount;
            }

            updateNotificationList() {
                const list = document.getElementById('notificationList');
                list.innerHTML = '';

                const filteredNotifications = this.getFilteredNotifications();
                
                filteredNotifications.forEach(notification => {
                    const item = document.createElement('div');
                    item.className = `notification-item ${notification.status.toLowerCase()}`;
                    
                    const priorityClass = `priority-${notification.priority.toLowerCase()}`;
                    const typeIcon = this.getTypeIcon(notification.type);
                    
                    item.innerHTML = `
                        <div class="notification-icon">
                            ${typeIcon}
                        </div>
                        <div class="notification-content">
                            <div class="notification-title">
                                <div class="priority-indicator ${priorityClass}"></div>
                                ${notification.title}
                            </div>
                            <div class="notification-message">${notification.message}</div>
                            <div class="notification-time">${notification.timestamp.toLocaleString()}</div>
                        </div>
                        <div class="notification-actions">
                            ${notification.actions.map(action => 
                                `<button class="btn ${action.primary ? '' : 'btn-secondary'}" 
                                 onclick="notificationCenter.executeAction('${notification.id}', '${action.id}')">
                                 ${action.label}
                                 </button>`
                            ).join('')}
                        </div>
                    `;
                    
                    list.appendChild(item);
                });
            }

            getTypeIcon(type) {
                const icons = {
                    'SYSTEM': '⚙️',
                    'APPLICATION': '📱',
                    'USER': '👤',
                    'SECURITY': '🔒',
                    'PROCESS': '⚡',
                    'UPDATE': '🔄',
                    'QUANTUM': '⚛️',
                    'CUSTOM': '📝'
                };
                return icons[type] || '📢';
            }

            getFilteredNotifications() {
                const notifications = Array.from(this.notifications.values())
                    .filter(n => n.status !== 'DISMISSED')
                    .sort((a, b) => b.timestamp - a.timestamp);

                switch (this.currentFilter) {
                    case 'unread':
                        return notifications.filter(n => n.status === 'UNREAD');
                    case 'urgent':
                        return notifications.filter(n => n.priority === 'URGENT' || n.priority === 'CRITICAL');
                    case 'system':
                        return notifications.filter(n => n.type === 'SYSTEM');
                    case 'quantum':
                        return notifications.filter(n => n.type === 'QUANTUM');
                    default:
                        return notifications;
                }
            }

            setFilter(filter) {
                this.currentFilter = filter;
                this.updateNotificationList();
            }

            markAllAsRead() {
                this.notifications.forEach(notification => {
                    if (notification.status === 'UNREAD') {
                        notification.status = 'READ';
                    }
                });
                this.updateStats();
                this.updateNotificationList();
            }

            clearDismissed() {
                const dismissedIds = [];
                this.notifications.forEach((notification, id) => {
                    if (notification.status === 'DISMISSED') {
                        dismissedIds.push(id);
                    }
                });
                dismissedIds.forEach(id => this.notifications.delete(id));
                this.updateStats();
                this.updateNotificationList();
            }

            playNotificationSound(priority) {
                // 模拟播放通知声音
                console.log(`播放${priority}优先级通知声音`);
            }

            startNotificationMonitoring() {
                // 定期生成系统通知
                setInterval(() => {
                    if (Math.random() < 0.1) { // 10%概率生成通知
                        const types = ['SYSTEM', 'APPLICATION', 'QUANTUM', 'SECURITY'];
                        const priorities = ['LOW', 'NORMAL', 'HIGH'];
                        const messages = [
                            '量子处理器状态更新',
                            '文件系统优化完成',
                            '内存清理已执行',
                            '网络连接状态变化',
                            '量子纠缠信道同步'
                        ];
                        
                        this.sendNotification({
                            title: '系统通知',
                            message: messages[Math.floor(Math.random() * messages.length)],
                            type: types[Math.floor(Math.random() * types.length)],
                            priority: priorities[Math.floor(Math.random() * priorities.length)]
                        });
                    }
                }, 10000);
            }

            updateUI() {
                this.updateStats();
                this.updateNotificationList();
            }
        }

        const notificationCenter = new QuantumNotificationCenter();

        // UI事件处理函数
        function sendNotification() {
            const title = document.getElementById('notificationTitle').value;
            const message = document.getElementById('notificationMessage').value;
            const priority = document.getElementById('notificationPriority').value;
            const type = document.getElementById('notificationType').value;
            
            if (title && message) {
                notificationCenter.sendNotification({
                    title: title,
                    message: message,
                    priority: priority,
                    type: type
                });
                
                // 清空输入框
                document.getElementById('notificationTitle').value = '';
                document.getElementById('notificationMessage').value = '';
            }
        }

        function toggleFilter(filter) {
            // 更新过滤标签样式
            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.classList.remove('active');
            });
            event.target.classList.add('active');
            
            notificationCenter.setFilter(filter);
        }

        function markAllAsRead() {
            notificationCenter.markAllAsRead();
        }

        function clearDismissed() {
            notificationCenter.clearDismissed();
        }

        // 量子纠缠通信
        setInterval(() => {
            window.parent.postMessage({
                type: 'quantum-entanglement',
                source: 'notification-center',
                gene: notificationCenter.quantumGene,
                message: '通知中心运行正常',
                stats: notificationCenter.stats
            }, '*');
        }, 5000);
    </script>
</body>
</html>
