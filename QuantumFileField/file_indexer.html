<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QEntL文件索引器 - 量子文件场</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .quantum-gene {
            font-family: 'Courier New', monospace;
            color: #fd79a8;
            font-size: 14px;
        }

        .indexer-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .indexer-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #fd79a8;
        }

        .index-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #fd79a8;
        }

        .btn {
            background: linear-gradient(45deg, #6c5ce7, #a29bfe);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
        }

        .input-field {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin: 5px 0;
        }

        .search-results {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            border-left: 3px solid #fd79a8;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 QEntL文件索引器</h1>
            <div class="quantum-gene">量子基因: 0xFI6789 | 索引效率: 0.96</div>
            <p>智能文件索引与高速搜索系统</p>
        </div>

        <div class="indexer-panel">
            <div class="indexer-section">
                <div class="section-title">📊 索引统计</div>
                <div class="index-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="indexedFiles">0</div>
                        <div>已索引文件</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="indexSize">0MB</div>
                        <div>索引大小</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="searchSpeed">0ms</div>
                        <div>平均搜索时间</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="indexProgress">0%</div>
                        <div>索引进度</div>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="indexProgressBar" style="width: 0%"></div>
                </div>
            </div>

            <div class="indexer-section">
                <div class="section-title">🔎 智能搜索</div>
                <input type="text" class="input-field" id="searchQuery" placeholder="输入搜索关键词">
                <button class="btn" onclick="performSearch()">搜索</button>
                <button class="btn" onclick="advancedSearch()">高级搜索</button>
                <div class="search-results" id="searchResults"></div>
            </div>

            <div class="indexer-section">
                <div class="section-title">⚙️ 索引管理</div>
                <button class="btn" onclick="startIndexing()">开始索引</button>
                <button class="btn" onclick="rebuildIndex()">重建索引</button>
                <button class="btn" onclick="optimizeIndex()">优化索引</button>
                <div>
                    <p>索引状态: <span id="indexStatus">就绪</span></p>
                    <p>最后更新: <span id="lastUpdate">从未</span></p>
                </div>
            </div>

            <div class="indexer-section">
                <div class="section-title">⚛️ 量子索引</div>
                <p>量子搜索算法: <span id="quantumSearch">未激活</span></p>
                <p>量子并行索引: <span id="quantumParallel">关闭</span></p>
                <p>量子相关性: <span id="quantumRelevance">0.96</span></p>
                <button class="btn" onclick="activateQuantumIndex()">激活量子索引</button>
            </div>
        </div>
    </div>

    <script>
        class QuantumFileIndexer {
            constructor() {
                this.quantumGene = '0xFI6789';
                this.indexEfficiency = 0.96;
                this.fileIndex = new Map();
                this.stats = {
                    indexedFiles: 0,
                    indexSize: 0,
                    searchSpeed: 0,
                    indexProgress: 0
                };
                this.quantumMode = false;
                this.init();
            }

            init() {
                this.createSampleIndex();
                this.updateUI();
                this.startIndexMonitoring();
            }

            createSampleIndex() {
                const sampleFiles = [
                    '/documents/报告.pdf',
                    '/projects/quantum.qentl',
                    '/config/system.conf',
                    '/data/database.db',
                    '/logs/system.log',
                    '/media/video.mp4',
                    '/scripts/backup.sh',
                    '/temp/cache.tmp'
                ];

                sampleFiles.forEach(path => {
                    this.addToIndex(path, {
                        size: Math.random() * 10000000,
                        modified: new Date(),
                        type: path.split('.').pop(),
                        content: '示例文件内容...'
                    });
                });
            }

            addToIndex(path, metadata) {
                this.fileIndex.set(path, {
                    path: path,
                    metadata: metadata,
                    indexed: new Date(),
                    searchTerms: this.extractSearchTerms(path, metadata.content)
                });
                
                this.stats.indexedFiles++;
                this.stats.indexSize += metadata.size / 1024 / 1024;
            }

            extractSearchTerms(path, content) {
                const terms = [];
                
                // 从路径提取关键词
                const pathParts = path.split('/').join(' ').split('.');
                terms.push(...pathParts);
                
                // 从内容提取关键词（简化版）
                if (content) {
                    const words = content.split(/\s+/);
                    terms.push(...words.slice(0, 10));
                }
                
                return terms.filter(term => term.length > 1);
            }

            performSearch(query) {
                if (!query) query = document.getElementById('searchQuery').value;
                if (!query) return;

                const startTime = Date.now();
                const results = [];
                
                this.fileIndex.forEach((file, path) => {
                    let relevance = 0;
                    
                    // 路径匹配
                    if (path.toLowerCase().includes(query.toLowerCase())) {
                        relevance += 0.8;
                    }
                    
                    // 搜索词匹配
                    file.searchTerms.forEach(term => {
                        if (term.toLowerCase().includes(query.toLowerCase())) {
                            relevance += 0.3;
                        }
                    });
                    
                    // 量子相关性增强
                    if (this.quantumMode) {
                        relevance *= this.indexEfficiency;
                    }
                    
                    if (relevance > 0.1) {
                        results.push({
                            path: path,
                            relevance: relevance,
                            file: file
                        });
                    }
                });
                
                const searchTime = Date.now() - startTime;
                this.stats.searchSpeed = searchTime;
                
                // 按相关性排序
                results.sort((a, b) => b.relevance - a.relevance);
                
                this.displaySearchResults(results.slice(0, 10));
                this.updateUI();
            }

            displaySearchResults(results) {
                const resultsContainer = document.getElementById('searchResults');
                resultsContainer.innerHTML = '';
                
                if (results.length === 0) {
                    resultsContainer.innerHTML = '<div class="result-item">未找到匹配的文件</div>';
                    return;
                }
                
                results.forEach(result => {
                    const item = document.createElement('div');
                    item.className = 'result-item';
                    item.innerHTML = `
                        <div>
                            <div><strong>${result.path}</strong></div>
                            <small>相关性: ${(result.relevance * 100).toFixed(1)}% | 
                                   大小: ${(result.file.metadata.size / 1024).toFixed(1)}KB</small>
                        </div>
                        <div>
                            <small>${result.file.metadata.modified.toLocaleDateString()}</small>
                        </div>
                    `;
                    resultsContainer.appendChild(item);
                });
            }

            startIndexing() {
                document.getElementById('indexStatus').textContent = '索引中...';
                this.stats.indexProgress = 0;
                
                const indexInterval = setInterval(() => {
                    this.stats.indexProgress += Math.random() * 10;
                    
                    if (this.stats.indexProgress >= 100) {
                        this.stats.indexProgress = 100;
                        document.getElementById('indexStatus').textContent = '完成';
                        document.getElementById('lastUpdate').textContent = new Date().toLocaleString();
                        clearInterval(indexInterval);
                    }
                    
                    this.updateUI();
                }, 500);
            }

            rebuildIndex() {
                this.fileIndex.clear();
                this.stats.indexedFiles = 0;
                this.stats.indexSize = 0;
                this.createSampleIndex();
                this.startIndexing();
            }

            optimizeIndex() {
                document.getElementById('indexStatus').textContent = '优化中...';
                
                setTimeout(() => {
                    this.stats.indexSize *= 0.8; // 压缩索引
                    this.indexEfficiency = Math.min(0.99, this.indexEfficiency + 0.02);
                    document.getElementById('indexStatus').textContent = '优化完成';
                    this.updateUI();
                }, 2000);
            }

            activateQuantumIndex() {
                this.quantumMode = !this.quantumMode;
                document.getElementById('quantumSearch').textContent = 
                    this.quantumMode ? '已激活' : '未激活';
                document.getElementById('quantumParallel').textContent = 
                    this.quantumMode ? '开启' : '关闭';
                
                if (this.quantumMode) {
                    this.indexEfficiency = 0.99;
                    document.getElementById('quantumRelevance').textContent = '0.99';
                }
            }

            advancedSearch() {
                const query = document.getElementById('searchQuery').value;
                if (!query) return;
                
                // 高级搜索逻辑（模拟）
                console.log('执行高级搜索:', query);
                this.performSearch(query);
            }

            updateUI() {
                document.getElementById('indexedFiles').textContent = this.stats.indexedFiles;
                document.getElementById('indexSize').textContent = this.stats.indexSize.toFixed(1) + 'MB';
                document.getElementById('searchSpeed').textContent = this.stats.searchSpeed + 'ms';
                document.getElementById('indexProgress').textContent = this.stats.indexProgress.toFixed(0) + '%';
                
                const progressBar = document.getElementById('indexProgressBar');
                progressBar.style.width = this.stats.indexProgress + '%';
            }

            startIndexMonitoring() {
                setInterval(() => {
                    // 模拟新文件添加
                    if (Math.random() < 0.1) {
                        const newFile = `/temp/file_${Date.now()}.tmp`;
                        this.addToIndex(newFile, {
                            size: Math.random() * 1000000,
                            modified: new Date(),
                            type: 'tmp',
                            content: '自动生成的临时文件'
                        });
                        this.updateUI();
                    }
                }, 5000);
            }
        }

        const fileIndexer = new QuantumFileIndexer();

        function performSearch() {
            fileIndexer.performSearch();
        }

        function advancedSearch() {
            fileIndexer.advancedSearch();
        }

        function startIndexing() {
            fileIndexer.startIndexing();
        }

        function rebuildIndex() {
            fileIndexer.rebuildIndex();
        }

        function optimizeIndex() {
            fileIndexer.optimizeIndex();
        }

        function activateQuantumIndex() {
            fileIndexer.activateQuantumIndex();
        }

        // 搜索框回车事件
        document.getElementById('searchQuery').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // 量子纠缠通信
        setInterval(() => {
            window.parent.postMessage({
                type: 'quantum-entanglement',
                source: 'file-indexer',
                gene: fileIndexer.quantumGene,
                message: '文件索引器运行正常',
                stats: fileIndexer.stats
            }, '*');
        }, 5000);
    </script>
</body>
</html>
