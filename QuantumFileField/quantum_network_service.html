<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QEntL量子网络服务 - 量子通信中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667db6 0%, #0082c8 50%, #667db6 100%);
            background-size: 400% 400%;
            animation: networkFlow 15s ease infinite;
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        @keyframes networkFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .quantum-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00bfff;
            border-radius: 50%;
            animation: networkPulse 4s infinite ease-in-out;
        }

        @keyframes networkPulse {
            0%, 100% { 
                transform: scale(1) rotate(0deg); 
                opacity: 0.6; 
                box-shadow: 0 0 8px #00bfff;
            }
            25% { 
                transform: scale(1.5) rotate(90deg); 
                opacity: 1; 
                box-shadow: 0 0 16px #00bfff;
            }
            50% { 
                transform: scale(2) rotate(180deg); 
                opacity: 0.8; 
                box-shadow: 0 0 12px #00bfff;
            }
            75% { 
                transform: scale(1.5) rotate(270deg); 
                opacity: 1; 
                box-shadow: 0 0 16px #00bfff;
            }
        }

        .quantum-container {
            position: relative;
            z-index: 2;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .quantum-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 25px;
            background: rgba(0, 191, 255, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(0, 191, 255, 0.3);
            backdrop-filter: blur(15px);
        }

        .quantum-title {
            font-size: 2.8em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00bfff, #1e90ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 191, 255, 0.5);
        }

        .quantum-gene {
            font-family: 'Courier New', monospace;
            color: #00bfff;
            font-size: 1.1em;
            margin: 10px 0;
        }

        .network-dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        .network-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(0, 191, 255, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .network-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 191, 255, 0.3);
            border-color: rgba(0, 191, 255, 0.5);
        }

        .panel-title {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #00bfff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topology-canvas {
            width: 100%;
            height: 300px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(0, 191, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .network-node {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #00bfff;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: nodePulse 3s infinite;
        }

        .network-node:hover {
            transform: scale(1.5);
            box-shadow: 0 0 20px #00bfff;
        }

        .network-node.local {
            background: #32cd32;
            animation: localNodePulse 2s infinite;
        }

        .network-node.relay {
            background: #ffd700;
        }

        .network-node.endpoint {
            background: #ff6b6b;
        }

        @keyframes nodePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes localNodePulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 15px #32cd32; }
            50% { opacity: 0.8; box-shadow: 0 0 25px #32cd32; }
        }

        .network-link {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, #00bfff, transparent, #00bfff);
            border-radius: 1px;
            animation: dataFlow 2s infinite;
        }

        @keyframes dataFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .node-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            margin: 8px 0;
            background: rgba(0, 191, 255, 0.1);
            border-radius: 8px;
            border-left: 3px solid #00bfff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .node-item:hover {
            background: rgba(0, 191, 255, 0.2);
            transform: translateX(5px);
        }

        .node-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .node-id {
            font-family: 'Courier New', monospace;
            color: #00bfff;
            font-weight: bold;
        }

        .node-type {
            color: #ccc;
            font-size: 0.9em;
        }

        .node-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-online {
            background: #32cd32;
            color: #000;
            animation: onlinePulse 2s infinite;
        }

        .status-offline {
            background: #ff6b6b;
            color: #fff;
        }

        .status-connecting {
            background: #ffd93d;
            color: #000;
            animation: connectingBlink 1s infinite;
        }

        @keyframes onlinePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes connectingBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .quantum-controls {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .quantum-button {
            padding: 12px 25px;
            background: linear-gradient(45deg, #00bfff, #1e90ff);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .quantum-button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 191, 255, 0.4);
        }

        .quantum-button:active {
            transform: scale(0.95);
        }

        .network-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            text-align: center;
            padding: 20px;
            background: rgba(0, 191, 255, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(0, 191, 255, 0.2);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 191, 255, 0.2);
        }

        .stat-value {
            font-size: 2.2em;
            font-weight: bold;
            color: #00bfff;
            display: block;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #ccc;
            font-size: 0.9em;
        }

        .entanglement-list {
            max-height: 250px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .entanglement-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            margin: 8px 0;
            background: rgba(0, 191, 255, 0.1);
            border-radius: 8px;
            border-left: 3px solid #00bfff;
            animation: entanglementGlow 4s infinite;
        }

        @keyframes entanglementGlow {
            0%, 100% { border-left-color: #00bfff; }
            50% { border-left-color: #32cd32; }
        }

        .entanglement-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .entanglement-id {
            font-family: 'Courier New', monospace;
            color: #00bfff;
            font-size: 0.9em;
        }

        .entanglement-fidelity {
            color: #32cd32;
            font-size: 0.8em;
        }

        .log-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgba(0, 191, 255, 0.2);
            max-height: 300px;
            overflow-y: auto;
        }

        .log-entry {
            margin: 5px 0;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .log-info { color: #00bfff; }
        .log-success { color: #32cd32; background: rgba(50, 205, 50, 0.1); }
        .log-warning { color: #ffd93d; background: rgba(255, 217, 61, 0.1); }
        .log-error { color: #ff6b6b; background: rgba(255, 107, 107, 0.1); }
        .log-network { color: #1e90ff; background: rgba(30, 144, 255, 0.1); }

        @media (max-width: 768px) {
            .quantum-container {
                padding: 10px;
            }
            
            .quantum-title {
                font-size: 2.2em;
            }
            
            .network-dashboard {
                grid-template-columns: 1fr;
            }
            
            .network-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="quantum-particles" id="particles"></div>
    
    <div class="quantum-container">
        <div class="quantum-header">
            <h1 class="quantum-title">QEntL量子网络服务</h1>
            <div class="quantum-gene">量子基因: QG-QUANTUM-NETWORK-N5P6-1714135100</div>
            <div class="quantum-gene">纠缠强度: 1.0 | 量子通信中心</div>
        </div>

        <div class="network-stats">
            <div class="stat-card">
                <span class="stat-value" id="nodeCount">0</span>
                <div class="stat-label">网络节点</div>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="connectionCount">0</span>
                <div class="stat-label">活跃连接</div>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="entanglementCount">0</span>
                <div class="stat-label">量子纠缠</div>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="dataTransferred">0KB</span>
                <div class="stat-label">数据传输</div>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="networkLatency">0ms</span>
                <div class="stat-label">网络延迟</div>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="fidelityAvg">0.00</span>
                <div class="stat-label">平均保真度</div>
            </div>
        </div>

        <div class="quantum-controls">
            <button class="quantum-button" onclick="initializeNetwork()">初始化网络</button>
            <button class="quantum-button" onclick="discoverNodes()">发现节点</button>
            <button class="quantum-button" onclick="createEntanglement()">创建纠缠</button>
            <button class="quantum-button" onclick="sendQuantumData()">量子传输</button>
            <button class="quantum-button" onclick="optimizeRouting()">路由优化</button>
        </div>

        <div class="network-dashboard">
            <div class="network-panel">
                <div class="panel-title">
                    <span>🌐</span> 网络拓扑
                </div>
                <div class="topology-canvas" id="topologyCanvas">
                    <!-- 网络拓扑图将在这里动态生成 -->
                </div>
            </div>

            <div class="network-panel">
                <div class="panel-title">
                    <span>📡</span> 网络节点
                </div>
                <div id="nodeList">
                    <!-- 节点列表将在这里动态生成 -->
                </div>
            </div>

            <div class="network-panel">
                <div class="panel-title">
                    <span>🔗</span> 量子纠缠
                </div>
                <div class="entanglement-list" id="entanglementList">
                    <!-- 纠缠列表将在这里动态生成 -->
                </div>
            </div>
        </div>

        <div class="log-panel">
            <div style="color: #00bfff; font-weight: bold; margin-bottom: 10px;">量子网络服务日志</div>
            <div id="logOutput">
                <div class="log-entry log-info">[系统] QEntL量子网络服务已加载</div>
                <div class="log-entry log-info">[网络] 等待初始化...</div>
            </div>
        </div>
    </div>

    <script>
        // QEntL量子网络服务量子组件
        class QuantumNetworkService {
            constructor() {
                this.quantumGene = "QG-QUANTUM-NETWORK-N5P6-1714135100";
                this.entanglementStrength = 1.0;
                this.initialized = false;
                
                this.localNode = {
                    id: "",
                    type: "ENDPOINT",
                    name: "QEntL-Node",
                    status: "OFFLINE",
                    connections: 0,
                    qubits: { total: 1024, available: 1024, entangled: 0 },
                    startTime: 0,
                    position: { x: 50, y: 50 }
                };
                
                this.remoteNodes = new Map();
                this.activeConnections = new Map();
                this.entanglements = new Map();
                this.routingTable = new Map();
                
                this.nodeTypes = {
                    RELAY: "relay",
                    ENDPOINT: "endpoint", 
                    CONTROLLER: "controller",
                    REPEATER: "repeater",
                    ROUTER: "router",
                    BRIDGE: "bridge"
                };
                
                this.nodeStatus = {
                    ONLINE: "online",
                    OFFLINE: "offline",
                    CONNECTING: "connecting",
                    DEGRADED: "degraded",
                    ERROR: "error"
                };
                
                this.config = {
                    localNode: {
                        maxConnections: 64,
                        maxQubits: 1024,
                        maxEntanglements: 512
                    },
                    network: {
                        domain: "qentl.network",
                        discoveryPort: 9600,
                        dataPort: 9601,
                        controlPort: 9602,
                        useTLS: true,
                        enableQuantumEncryption: true
                    },
                    entanglement: {
                        minFidelity: 0.90,
                        purificationThreshold: 0.95,
                        maxPurificationRounds: 3,
                        entanglementTimeout: 60000,
                        reserveBuffer: 0.2
                    }
                };
                
                this.stats = {
                    nodeCount: 0,
                    connectionCount: 0,
                    entanglementCount: 0,
                    dataTransferred: 0,
                    networkLatency: 0,
                    averageFidelity: 0.0
                };
            }

            initialize() {
                this.log("正在初始化量子网络服务...", "info");
                
                // 生成本地节点ID
                this.localNode.id = this.generateNodeId();
                this.localNode.status = "ONLINE";
                this.localNode.startTime = Date.now();
                
                this.log(`量子网络服务初始化成功，节点ID: ${this.localNode.id}`, "success");
                
                // 模拟发现网络节点
                this.simulateNodeDiscovery();
                
                // 启动网络监控
                this.startNetworkMonitoring();
                
                this.initialized = true;
                this.updateDisplay();
                this.renderTopology();
                
                return true;
            }

            generateNodeId() {
                return 'QN-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            }

            simulateNodeDiscovery() {
                const nodeConfigs = [
                    { type: 'RELAY', name: '量子中继站-Alpha', status: 'ONLINE' },
                    { type: 'CONTROLLER', name: '网络控制器-Beta', status: 'ONLINE' },
                    { type: 'ENDPOINT', name: '终端节点-Gamma', status: 'CONNECTING' },
                    { type: 'REPEATER', name: '信号放大器-Delta', status: 'ONLINE' },
                    { type: 'ROUTER', name: '量子路由器-Epsilon', status: 'DEGRADED' }
                ];

                nodeConfigs.forEach((config, index) => {
                    setTimeout(() => {
                        this.addRemoteNode(config);
                    }, (index + 1) * 1000);
                });
            }

            addRemoteNode(config) {
                const nodeId = this.generateNodeId();
                const node = {
                    id: nodeId,
                    type: config.type,
                    name: config.name,
                    status: config.status,
                    connections: Math.floor(Math.random() * 10),
                    qubits: {
                        total: Math.floor(Math.random() * 512) + 256,
                        available: 0,
                        entangled: 0
                    },
                    discoveredAt: Date.now(),
                    position: {
                        x: Math.random() * 80 + 10,
                        y: Math.random() * 80 + 10
                    },
                    latency: Math.floor(Math.random() * 50) + 5
                };
                
                node.qubits.available = Math.floor(node.qubits.total * 0.7);
                node.qubits.entangled = node.qubits.total - node.qubits.available;

                this.remoteNodes.set(nodeId, node);
                this.stats.nodeCount++;
                
                if (config.status === 'ONLINE') {
                    this.establishConnection(nodeId);
                }

                this.log(`发现网络节点: ${config.name} (${nodeId})`, "network");
                this.updateDisplay();
                this.renderTopology();
            }

            establishConnection(nodeId) {
                const node = this.remoteNodes.get(nodeId);
                if (!node) return;

                const connectionId = 'CONN-' + Date.now() + '-' + Math.random().toString(36).substr(2, 4);
                const connection = {
                    id: connectionId,
                    localNodeId: this.localNode.id,
                    remoteNodeId: nodeId,
                    status: 'ACTIVE',
                    establishedAt: Date.now(),
                    dataTransferred: 0,
                    latency: node.latency
                };

                this.activeConnections.set(connectionId, connection);
                this.stats.connectionCount++;
                this.localNode.connections++;

                this.log(`建立连接: ${node.name} (延迟: ${node.latency}ms)`, "success");
                this.updateDisplay();
            }

            createEntanglement() {
                if (this.remoteNodes.size === 0) {
                    this.log("没有可用的远程节点创建纠缠", "warning");
                    return;
                }

                const onlineNodes = Array.from(this.remoteNodes.values())
                    .filter(node => node.status === 'ONLINE' && node.qubits.available > 0);

                if (onlineNodes.length === 0) {
                    this.log("没有在线节点可创建纠缠", "warning");
                    return;
                }

                const targetNode = onlineNodes[Math.floor(Math.random() * onlineNodes.length)];
                const entanglementId = 'ENT-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
                
                const fidelity = 0.90 + Math.random() * 0.09; // 0.90 - 0.99
                
                const entanglement = {
                    id: entanglementId,
                    localNodeId: this.localNode.id,
                    remoteNodeId: targetNode.id,
                    fidelity: fidelity,
                    createdAt: Date.now(),
                    status: 'ACTIVE',
                    usageCount: 0
                };

                this.entanglements.set(entanglementId, entanglement);
                this.stats.entanglementCount++;
                
                // 更新量子比特状态
                this.localNode.qubits.available--;
                this.localNode.qubits.entangled++;
                targetNode.qubits.available--;
                targetNode.qubits.entangled++;

                this.updateAverageFidelity();
                this.log(`创建量子纠缠: ${targetNode.name} (保真度: ${fidelity.toFixed(3)})`, "success");
                this.updateDisplay();
            }

            sendQuantumData() {
                if (this.entanglements.size === 0) {
                    this.log("没有可用的量子纠缠进行数据传输", "warning");
                    return;
                }

                const activeEntanglements = Array.from(this.entanglements.values())
                    .filter(ent => ent.status === 'ACTIVE');

                if (activeEntanglements.length === 0) {
                    this.log("没有活跃的量子纠缠", "warning");
                    return;
                }

                const entanglement = activeEntanglements[Math.floor(Math.random() * activeEntanglements.length)];
                const dataSize = Math.floor(Math.random() * 1024) + 256; // 256B - 1.25KB
                
                entanglement.usageCount++;
                this.stats.dataTransferred += dataSize;

                const targetNode = this.remoteNodes.get(entanglement.remoteNodeId);
                this.log(`量子数据传输: ${dataSize}B 发送至 ${targetNode.name}`, "network");
                
                // 模拟传输延迟
                setTimeout(() => {
                    this.log(`量子数据传输完成: ${dataSize}B`, "success");
                    this.updateDisplay();
                }, targetNode.latency);
            }

            discoverNodes() {
                this.log("开始节点发现...", "info");
                
                setTimeout(() => {
                    const newNodeTypes = ['BRIDGE', 'ENDPOINT', 'RELAY'];
                    const randomType = newNodeTypes[Math.floor(Math.random() * newNodeTypes.length)];
                    
                    this.addRemoteNode({
                        type: randomType,
                        name: `动态节点-${Date.now().toString(36).toUpperCase()}`,
                        status: 'ONLINE'
                    });
                    
                    this.log("节点发现完成", "success");
                }, 1500);
            }

            optimizeRouting() {
                this.log("执行路由优化...", "info");
                
                // 模拟路由优化过程
                setTimeout(() => {
                    // 优化网络延迟
                    this.remoteNodes.forEach(node => {
                        if (node.status === 'ONLINE') {
                            node.latency = Math.max(1, node.latency - Math.floor(Math.random() * 10));
                        }
                    });
                    
                    this.updateNetworkLatency();
                    this.log("路由优化完成，网络性能提升", "success");
                    this.updateDisplay();
                }, 2000);
            }

            startNetworkMonitoring() {
                // 定期更新网络状态
                setInterval(() => {
                    this.updateNetworkLatency();
                    this.simulateNetworkActivity();
                }, 3000);
                
                // 定期清理过期纠缠
                setInterval(() => {
                    this.cleanupExpiredEntanglements();
                }, 10000);
            }

            updateNetworkLatency() {
                const onlineNodes = Array.from(this.remoteNodes.values())
                    .filter(node => node.status === 'ONLINE');
                
                if (onlineNodes.length > 0) {
                    const totalLatency = onlineNodes.reduce((sum, node) => sum + node.latency, 0);
                    this.stats.networkLatency = Math.round(totalLatency / onlineNodes.length);
                }
            }

            updateAverageFidelity() {
                const activeEntanglements = Array.from(this.entanglements.values())
                    .filter(ent => ent.status === 'ACTIVE');
                
                if (activeEntanglements.length > 0) {
                    const totalFidelity = activeEntanglements.reduce((sum, ent) => sum + ent.fidelity, 0);
                    this.stats.averageFidelity = totalFidelity / activeEntanglements.length;
                }
            }

            simulateNetworkActivity() {
                // 随机改变节点状态
                this.remoteNodes.forEach(node => {
                    if (Math.random() < 0.1) { // 10% 概率状态变化
                        const statuses = ['ONLINE', 'DEGRADED', 'CONNECTING'];
                        node.status = statuses[Math.floor(Math.random() * statuses.length)];
                    }
                });
                
                this.updateDisplay();
            }

            cleanupExpiredEntanglements() {
                const now = Date.now();
                const timeout = this.config.entanglement.entanglementTimeout;
                
                this.entanglements.forEach((entanglement, id) => {
                    if (now - entanglement.createdAt > timeout) {
                        this.entanglements.delete(id);
                        this.stats.entanglementCount--;
                        this.log(`量子纠缠过期: ${id}`, "warning");
                    }
                });
                
                this.updateAverageFidelity();
                this.updateDisplay();
            }

            updateDisplay() {
                document.getElementById('nodeCount').textContent = this.stats.nodeCount + 1; // +1 for local node
                document.getElementById('connectionCount').textContent = this.stats.connectionCount;
                document.getElementById('entanglementCount').textContent = this.stats.entanglementCount;
                document.getElementById('dataTransferred').textContent = Math.round(this.stats.dataTransferred / 1024) + 'KB';
                document.getElementById('networkLatency').textContent = this.stats.networkLatency + 'ms';
                document.getElementById('fidelityAvg').textContent = this.stats.averageFidelity.toFixed(3);

                this.updateNodeList();
                this.updateEntanglementList();
            }

            updateNodeList() {
                const nodeList = document.getElementById('nodeList');
                nodeList.innerHTML = '';

                // 添加本地节点
                const localItem = document.createElement('div');
                localItem.className = 'node-item';
                localItem.innerHTML = `
                    <div class="node-info">
                        <div class="node-id">${this.localNode.id}</div>
                        <div class="node-type">本地节点 (${this.localNode.type})</div>
                    </div>
                    <div class="node-status status-online">ONLINE</div>
                `;
                nodeList.appendChild(localItem);

                // 添加远程节点
                this.remoteNodes.forEach((node, nodeId) => {
                    const nodeItem = document.createElement('div');
                    nodeItem.className = 'node-item';
                    nodeItem.onclick = () => this.showNodeDetails(nodeId);
                    
                    nodeItem.innerHTML = `
                        <div class="node-info">
                            <div class="node-id">${node.id}</div>
                            <div class="node-type">${node.name} (${node.type})</div>
                        </div>
                        <div class="node-status status-${node.status.toLowerCase()}">${node.status}</div>
                    `;
                    
                    nodeList.appendChild(nodeItem);
                });
            }

            updateEntanglementList() {
                const entanglementList = document.getElementById('entanglementList');
                entanglementList.innerHTML = '';

                if (this.entanglements.size === 0) {
                    entanglementList.innerHTML = '<div style="text-align: center; color: #666; padding: 20px;">暂无量子纠缠</div>';
                    return;
                }

                this.entanglements.forEach((entanglement, entId) => {
                    const targetNode = this.remoteNodes.get(entanglement.remoteNodeId);
                    const entItem = document.createElement('div');
                    entItem.className = 'entanglement-item';
                    entItem.onclick = () => this.showEntanglementDetails(entId);
                    
                    entItem.innerHTML = `
                        <div class="entanglement-info">
                            <div class="entanglement-id">${entId}</div>
                            <div class="entanglement-fidelity">保真度: ${entanglement.fidelity.toFixed(3)}</div>
                        </div>
                        <div class="node-status status-${entanglement.status.toLowerCase()}">${entanglement.status}</div>
                    `;
                    
                    entanglementList.appendChild(entItem);
                });
            }

            renderTopology() {
                const canvas = document.getElementById('topologyCanvas');
                canvas.innerHTML = '';

                // 添加本地节点
                const localNodeElement = document.createElement('div');
                localNodeElement.className = 'network-node local';
                localNodeElement.style.left = this.localNode.position.x + '%';
                localNodeElement.style.top = this.localNode.position.y + '%';
                localNodeElement.title = `本地节点: ${this.localNode.id}`;
                canvas.appendChild(localNodeElement);

                // 添加远程节点
                this.remoteNodes.forEach((node, nodeId) => {
                    const nodeElement = document.createElement('div');
                    nodeElement.className = `network-node ${node.type.toLowerCase()}`;
                    nodeElement.style.left = node.position.x + '%';
                    nodeElement.style.top = node.position.y + '%';
                    nodeElement.title = `${node.name}: ${node.id}`;
                    nodeElement.onclick = () => this.showNodeDetails(nodeId);
                    canvas.appendChild(nodeElement);

                    // 如果有连接，绘制连接线
                    const hasConnection = Array.from(this.activeConnections.values())
                        .some(conn => conn.remoteNodeId === nodeId);
                    
                    if (hasConnection) {
                        this.drawConnection(canvas, this.localNode.position, node.position);
                    }
                });
            }

            drawConnection(canvas, fromPos, toPos) {
                const link = document.createElement('div');
                link.className = 'network-link';
                
                const deltaX = toPos.x - fromPos.x;
                const deltaY = toPos.y - fromPos.y;
                const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                const angle = Math.atan2(deltaY, deltaX) * 180 / Math.PI;
                
                link.style.width = distance + '%';
                link.style.left = fromPos.x + '%';
                link.style.top = fromPos.y + '%';
                link.style.transform = `rotate(${angle}deg)`;
                link.style.transformOrigin = '0 50%';
                
                canvas.appendChild(link);
            }

            showNodeDetails(nodeId) {
                const node = this.remoteNodes.get(nodeId);
                if (node) {
                    this.log(`节点详情: ${node.name} - ${node.type} (延迟: ${node.latency}ms)`, "info");
                }
            }

            showEntanglementDetails(entId) {
                const entanglement = this.entanglements.get(entId);
                if (entanglement) {
                    this.log(`纠缠详情: ${entId} - 保真度: ${entanglement.fidelity.toFixed(3)}`, "info");
                }
            }

            log(message, type = "info") {
                const logOutput = document.getElementById('logOutput');
                const logEntry = document.createElement('div');
                logEntry.className = `log-entry log-${type}`;
                logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
                logOutput.appendChild(logEntry);
                logOutput.scrollTop = logOutput.scrollHeight;
            }

            // 量子纠缠通信
            sendQuantumMessage(targetGene, message) {
                const entangledMessage = {
                    from: this.quantumGene,
                    to: targetGene,
                    message: message,
                    timestamp: Date.now(),
                    entanglementStrength: this.entanglementStrength,
                    networkPath: this.localNode.id
                };

                window.postMessage({
                    type: 'QUANTUM_ENTANGLEMENT',
                    data: entangledMessage
                }, '*');

                this.log(`量子消息发送至 ${targetGene}`, "network");
            }
        }

        // 全局量子网络服务实例
        const quantumNetworkService = new QuantumNetworkService();

        // 界面控制函数
        function initializeNetwork() {
            quantumNetworkService.initialize();
        }

        function discoverNodes() {
            quantumNetworkService.discoverNodes();
        }

        function createEntanglement() {
            quantumNetworkService.createEntanglement();
        }

        function sendQuantumData() {
            quantumNetworkService.sendQuantumData();
        }

        function optimizeRouting() {
            quantumNetworkService.optimizeRouting();
        }

        // 创建量子粒子效果
        function createQuantumParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 80;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 4 + 's';
                particle.style.animationDuration = (Math.random() * 2 + 2) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // 监听量子纠缠消息
        window.addEventListener('message', (event) => {
            if (event.data.type === 'QUANTUM_ENTANGLEMENT') {
                const data = event.data.data;
                if (data.to === quantumNetworkService.quantumGene) {
                    quantumNetworkService.log(`收到量子纠缠消息: ${data.message}`, "network");
                }
            }
        });

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            createQuantumParticles();
            quantumNetworkService.log("QEntL量子网络服务已加载", "info");
            
            // 定期更新显示
            setInterval(() => {
                quantumNetworkService.updateDisplay();
            }, 5000);
        });

        // 导出到全局作用域
        window.QuantumNetworkService = quantumNetworkService;
    </script>
</body>
