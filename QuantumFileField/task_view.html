<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QEntL 任务视图 - Task View</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: #ffffff;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .quantum-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .quantum-gene {
            font-family: 'Courier New', monospace;
            color: #00ff88;
            margin-bottom: 10px;
        }

        .task-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .view-modes {
            display: flex;
            gap: 10px;
        }

        .view-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .view-btn.active {
            background: linear-gradient(45deg, #00ff88, #0088ff);
        }

        .view-btn:hover {
            transform: translateY(-2px);
        }

        .task-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .task-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .task-list {
            display: grid;
            gap: 10px;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            border-left: 4px solid #00ff88;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        .task-item.running {
            border-left-color: #3498db;
            animation: pulse 2s infinite;
        }

        .task-item.completed {
            border-left-color: #2ecc71;
            opacity: 0.7;
        }

        .task-item.failed {
            border-left-color: #e74c3c;
        }

        .task-item.quantum {
            border-left-color: #9b59b6;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.1), rgba(155, 89, 182, 0.2));
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .task-name {
            font-weight: bold;
            font-size: 16px;
        }

        .task-status {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-pending { background: #3498db; }
        .status-running { background: #2ecc71; }
        .status-paused { background: #f39c12; }
        .status-completed { background: #27ae60; }
        .status-failed { background: #e74c3c; }
        .status-quantum { background: #9b59b6; }

        .task-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 10px;
            font-size: 12px;
        }

        .task-detail {
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #0088ff);
            transition: width 0.3s ease;
        }

        .task-actions {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .action-btn {
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 11px;
            transition: background 0.3s ease;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .quantum-entanglement {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #00ff88;
            z-index: 1000;
        }

        .filter-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        .filter-select {
            padding: 5px 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            color: white;
        }

        .search-box {
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            color: white;
            width: 200px;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="quantum-entanglement">
        <div style="color: #00ff88; font-weight: bold;">量子纠缠状态</div>
        <div id="entanglement-status">ACTIVE</div>
        <div style="font-size: 12px; margin-top: 5px;">
            任务同步: <span id="task-sync">ON</span>
        </div>
    </div>

    <div class="container">
        <div class="quantum-header">
            <div class="quantum-gene">QSM-TASK-4321-L987</div>
            <h1>QEntL 任务视图系统</h1>
            <h2>Quantum Task Management & Visualization</h2>
            <p>量子任务管理、可视化和交互控制中心</p>
        </div>

        <div class="task-stats">
            <div class="stat-card">
                <div class="stat-value" id="totalTasks">0</div>
                <div class="stat-label">总任务数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="runningTasks">0</div>
                <div class="stat-label">运行中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completedTasks">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="quantumTasks">0</div>
                <div class="stat-label">量子任务</div>
            </div>
        </div>

        <div class="task-controls">
            <div class="view-modes">
                <button class="view-btn active" onclick="setViewMode('list')">列表视图</button>
                <button class="view-btn" onclick="setViewMode('card')">卡片视图</button>
                <button class="view-btn" onclick="setViewMode('timeline')">时间线</button>
                <button class="view-btn" onclick="setViewMode('quantum')">量子维度</button>
            </div>
            <div>
                <input type="text" class="search-box" placeholder="搜索任务..." id="searchBox">
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-group">
                <label>状态筛选:</label>
                <select class="filter-select" id="statusFilter">
                    <option value="">全部状态</option>
                    <option value="PENDING">待处理</option>
                    <option value="RUNNING">运行中</option>
                    <option value="COMPLETED">已完成</option>
                    <option value="FAILED">失败</option>
                    <option value="QUANTUM_PROCESSING">量子处理</option>
                </select>

                <label>类型筛选:</label>
                <select class="filter-select" id="typeFilter">
                    <option value="">全部类型</option>
                    <option value="SYSTEM">系统任务</option>
                    <option value="USER">用户任务</option>
                    <option value="QUANTUM">量子任务</option>
                    <option value="BACKGROUND">后台任务</option>
                </select>

                <label>优先级:</label>
                <select class="filter-select" id="priorityFilter">
                    <option value="">全部优先级</option>
                    <option value="CRITICAL">关键</option>
                    <option value="HIGH">高</option>
                    <option value="NORMAL">普通</option>
                    <option value="LOW">低</option>
                </select>
            </div>
        </div>

        <div class="task-container">
            <h3>任务列表</h3>
            <div class="task-list" id="taskList">
                <!-- 任务项将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>

    <script>
        let taskViewState = {
            currentViewMode: 'list',
            tasks: new Map(),
            filters: {
                status: '',
                type: '',
                priority: '',
                search: ''
            },
            stats: {
                total: 0,
                running: 0,
                completed: 0,
                quantum: 0
            },
            quantumGenes: 'QSM-TASK-4321-L987'
        };

        // 任务状态枚举
        const TaskStatus = {
            PENDING: 'PENDING',
            RUNNING: 'RUNNING',
            PAUSED: 'PAUSED',
            COMPLETED: 'COMPLETED',
            FAILED: 'FAILED',
            QUANTUM_PROCESSING: 'QUANTUM_PROCESSING'
        };

        const TaskType = {
            SYSTEM: 'SYSTEM',
            USER: 'USER',
            QUANTUM: 'QUANTUM',
            BACKGROUND: 'BACKGROUND'
        };

        const TaskPriority = {
            CRITICAL: 'CRITICAL',
            HIGH: 'HIGH',
            NORMAL: 'NORMAL',
            LOW: 'LOW'
        };

        // 初始化示例任务
        function initSampleTasks() {
            const sampleTasks = [
                {
                    id: 'task-001',
                    name: 'QSM神经网络训练',
                    type: TaskType.QUANTUM,
                    status: TaskStatus.RUNNING,
                    priority: TaskPriority.HIGH,
                    progress: 65,
                    cpuUsage: 85.2,
                    memoryUsage: 2048,
                    createTime: new Date(Date.now() - 3600000),
                    description: '量子叠加态神经网络深度学习训练'
                },
                {
                    id: 'task-002',
                    name: '量子纠缠通信测试',
                    type: TaskType.QUANTUM,
                    status: TaskStatus.QUANTUM_PROCESSING,
                    priority: TaskPriority.CRITICAL,
                    progress: 42,
                    cpuUsage: 92.1,
                    memoryUsage: 4096,
                    createTime: new Date(Date.now() - 1800000),
                    description: '测试量子纠缠信道通信协议'
                },
                {
                    id: 'task-003',
                    name: '系统内核更新',
                    type: TaskType.SYSTEM,
                    status: TaskStatus.COMPLETED,
                    priority: TaskPriority.NORMAL,
                    progress: 100,
                    cpuUsage: 0,
                    memoryUsage: 0,
                    createTime: new Date(Date.now() - 7200000),
                    description: 'QEntL内核模块更新升级'
                },
                {
                    id: 'task-004',
                    name: 'Claude AI知识同步',
                    type: TaskType.USER,
                    status: TaskStatus.RUNNING,
                    priority: TaskPriority.HIGH,
                    progress: 78,
                    cpuUsage: 45.3,
                    memoryUsage: 1024,
                    createTime: new Date(Date.now() - 900000),
                    description: '与Claude AI进行知识库同步更新'
                },
                {
                    id: 'task-005',
                    name: '后台数据备份',
                    type: TaskType.BACKGROUND,
                    status: TaskStatus.PENDING,
                    priority: TaskPriority.LOW,
                    progress: 0,
                    cpuUsage: 0,
                    memoryUsage: 0,
                    createTime: new Date(),
                    description: '定期数据备份任务'
                }
            ];

            sampleTasks.forEach(task => {
                taskViewState.tasks.set(task.id, task);
            });

            updateStats();
            renderTasks();
        }

        // 更新统计信息
        function updateStats() {
            const tasks = Array.from(taskViewState.tasks.values());
            taskViewState.stats.total = tasks.length;
            taskViewState.stats.running = tasks.filter(t => t.status === TaskStatus.RUNNING || t.status === TaskStatus.QUANTUM_PROCESSING).length;
            taskViewState.stats.completed = tasks.filter(t => t.status === TaskStatus.COMPLETED).length;
            taskViewState.stats.quantum = tasks.filter(t => t.type === TaskType.QUANTUM).length;

            document.getElementById('totalTasks').textContent = taskViewState.stats.total;
            document.getElementById('runningTasks').textContent = taskViewState.stats.running;
            document.getElementById('completedTasks').textContent = taskViewState.stats.completed;
            document.getElementById('quantumTasks').textContent = taskViewState.stats.quantum;
        }

        // 渲染任务列表
        function renderTasks() {
            const taskList = document.getElementById('taskList');
            taskList.innerHTML = '';

            const filteredTasks = filterTasks();

            filteredTasks.forEach(task => {
                const taskElement = createTaskElement(task);
                taskList.appendChild(taskElement);
            });
        }

        // 过滤任务
        function filterTasks() {
            const tasks = Array.from(taskViewState.tasks.values());
            return tasks.filter(task => {
                const statusMatch = !taskViewState.filters.status || task.status === taskViewState.filters.status;
                const typeMatch = !taskViewState.filters.type || task.type === taskViewState.filters.type;
                const priorityMatch = !taskViewState.filters.priority || task.priority === taskViewState.filters.priority;
                const searchMatch = !taskViewState.filters.search || 
                    task.name.toLowerCase().includes(taskViewState.filters.search.toLowerCase()) ||
                    task.description.toLowerCase().includes(taskViewState.filters.search.toLowerCase());

                return statusMatch && typeMatch && priorityMatch && searchMatch;
            });
        }

        // 创建任务元素
        function createTaskElement(task) {
            const taskDiv = document.createElement('div');
            taskDiv.className = `task-item ${task.status.toLowerCase()} ${task.type.toLowerCase()}`;
            taskDiv.onclick = () => selectTask(task.id);

            const statusClass = `status-${task.status.toLowerCase()}`;
            const statusText = getStatusText(task.status);

            taskDiv.innerHTML = `
                <div class="task-header">
                    <div class="task-name">${task.name}</div>
                    <div class="task-status ${statusClass}">${statusText}</div>
                </div>
                <div style="font-size: 12px; color: rgba(255,255,255,0.8); margin-bottom: 10px;">
                    ${task.description}
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${task.progress}%"></div>
                </div>
                <div class="task-details">
                    <div class="task-detail">
                        <span>类型:</span>
                        <span>${getTypeText(task.type)}</span>
                    </div>
                    <div class="task-detail">
                        <span>优先级:</span>
                        <span>${getPriorityText(task.priority)}</span>
                    </div>
                    <div class="task-detail">
                        <span>进度:</span>
                        <span>${task.progress}%</span>
                    </div>
                    <div class="task-detail">
                        <span>CPU:</span>
                        <span>${task.cpuUsage.toFixed(1)}%</span>
                    </div>
                    <div class="task-detail">
                        <span>内存:</span>
                        <span>${task.memoryUsage}KB</span>
                    </div>
                    <div class="task-detail">
                        <span>创建时间:</span>
                        <span>${task.createTime.toLocaleTimeString()}</span>
                    </div>
                </div>
                <div class="task-actions">
                    <button class="action-btn" onclick="pauseTask('${task.id}'); event.stopPropagation();">暂停</button>
                    <button class="action-btn" onclick="resumeTask('${task.id}'); event.stopPropagation();">恢复</button>
                    <button class="action-btn" onclick="cancelTask('${task.id}'); event.stopPropagation();">取消</button>
                    <button class="action-btn" onclick="viewTaskDetails('${task.id}'); event.stopPropagation();">详情</button>
                </div>
            `;

            return taskDiv;
        }

        // 获取状态文本
        function getStatusText(status) {
            const statusMap = {
                'PENDING': '待处理',
                'RUNNING': '运行中',
                'PAUSED': '已暂停',
                'COMPLETED': '已完成',
                'FAILED': '已失败',
                'QUANTUM_PROCESSING': '量子处理'
            };
            return statusMap[status] || status;
        }

        // 获取类型文本
        function getTypeText(type) {
            const typeMap = {
                'SYSTEM': '系统',
                'USER': '用户',
                'QUANTUM': '量子',
                'BACKGROUND': '后台'
            };
            return typeMap[type] || type;
        }

        // 获取优先级文本
        function getPriorityText(priority) {
            const priorityMap = {
                'CRITICAL': '关键',
                'HIGH': '高',
                'NORMAL': '普通',
                'LOW': '低'
            };
            return priorityMap[priority] || priority;
        }

        // 设置视图模式
        function setViewMode(mode) {
            taskViewState.currentViewMode = mode;
            
            // 更新按钮状态
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // 重新渲染任务
            renderTasks();
        }

        // 任务操作函数
        function selectTask(taskId) {
            console.log('选中任务:', taskId);
        }

        function pauseTask(taskId) {
            const task = taskViewState.tasks.get(taskId);
            if (task && task.status === TaskStatus.RUNNING) {
                task.status = TaskStatus.PAUSED;
                updateStats();
                renderTasks();
            }
        }

        function resumeTask(taskId) {
            const task = taskViewState.tasks.get(taskId);
            if (task && task.status === TaskStatus.PAUSED) {
                task.status = TaskStatus.RUNNING;
                updateStats();
                renderTasks();
            }
        }

        function cancelTask(taskId) {
            if (confirm('确定要取消这个任务吗？')) {
                taskViewState.tasks.delete(taskId);
                updateStats();
                renderTasks();
            }
        }

        function viewTaskDetails(taskId) {
            const task = taskViewState.tasks.get(taskId);
            if (task) {
                alert(`任务详情:\n名称: ${task.name}\n状态: ${getStatusText(task.status)}\n描述: ${task.description}`);
            }
        }

        // 模拟任务进度更新
        function simulateTaskProgress() {
            taskViewState.tasks.forEach(task => {
                if (task.status === TaskStatus.RUNNING || task.status === TaskStatus.QUANTUM_PROCESSING) {
                    if (task.progress < 100) {
                        task.progress = Math.min(100, task.progress + Math.random() * 2);
                        task.cpuUsage = Math.max(0, task.cpuUsage + (Math.random() - 0.5) * 10);
                        
                        if (task.progress >= 100) {
                            task.status = TaskStatus.COMPLETED;
                            task.cpuUsage = 0;
                        }
                    }
                }
            });

            updateStats();
            renderTasks();
        }

        // 量子纠缠通信
        function sendQuantumMessage(type, data) {
            const message = {
                type: type,
                source: 'task_view.html',
                quantumGenes: taskViewState.quantumGenes,
                timestamp: Date.now(),
                data: data
            };

            if (window.parent !== window) {
                window.parent.postMessage(message, '*');
            }

            if (typeof BroadcastChannel !== 'undefined') {
                const channel = new BroadcastChannel('quantum-entanglement');
                channel.postMessage(message);
            }
        }

        function receiveQuantumMessage(event) {
            if (event.data && event.data.quantumGenes && event.data.source !== 'task_view.html') {
                console.log('收到量子纠缠消息:', event.data);
                
                if (event.data.type === 'NEW_TASK') {
                    // 添加新任务
                    const newTask = event.data.data;
                    taskViewState.tasks.set(newTask.id, newTask);
                    updateStats();
                    renderTasks();
                }
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initSampleTasks();

            // 设置过滤器事件监听
            document.getElementById('statusFilter').addEventListener('change', (e) => {
                taskViewState.filters.status = e.target.value;
                renderTasks();
            });

            document.getElementById('typeFilter').addEventListener('change', (e) => {
                taskViewState.filters.type = e.target.value;
                renderTasks();
            });

            document.getElementById('priorityFilter').addEventListener('change', (e) => {
                taskViewState.filters.priority = e.target.value;
                renderTasks();
            });

            document.getElementById('searchBox').addEventListener('input', (e) => {
                taskViewState.filters.search = e.target.value;
                renderTasks();
            });

            // 设置消息监听
            window.addEventListener('message', receiveQuantumMessage);
            
            if (typeof BroadcastChannel !== 'undefined') {
                const channel = new BroadcastChannel('quantum-entanglement');
                channel.onmessage = receiveQuantumMessage;
            }

            // 定期更新任务进度
            setInterval(simulateTaskProgress, 3000);

            // 发送初始化完成消息
            setTimeout(() => {
                sendQuantumMessage('COMPONENT_READY', {
                    component: 'task_view',
                    capabilities: ['task_management', 'visualization', 'filtering']
                });
            }, 1000);
        });
    </script>
</body>
</html>
