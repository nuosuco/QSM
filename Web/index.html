<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QEntL量子操作系统</title>
    <link rel="stylesheet" href="/fonts/yi-fonts.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'YiTongyong', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .yi-text { font-family: 'YiTongyong', sans-serif !important; }
        .desktop {
            width: 100vw;
            height: calc(100vh - 48px);
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 100px);
            grid-template-rows: repeat(auto-fill, 100px);
            gap: 20px;
            align-content: start;
        }
        .desktop-icon {
            width: 90px; height: 90px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; border-radius: 10px;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.05);
            border: 1px solid transparent;
        }
        .desktop-icon:hover {
            background: rgba(138,135,255,0.2);
            border-color: rgba(138,135,255,0.5);
            transform: scale(1.05);
        }
        .desktop-icon .icon { font-size: 40px; margin-bottom: 8px; }
        .desktop-icon .label { font-size: 12px; color: #fff; text-align: center; }
        .taskbar {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 48px;
            background: rgba(10,10,26,0.95);
            border-top: 1px solid rgba(138,135,255,0.3);
            display: flex; align-items: center;
            padding: 0 10px; z-index: 1000;
        }
        .start-btn {
            width: 40px; height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, #8a87ff, #6c63ff);
            border: none; cursor: pointer;
            font-size: 20px; color: #fff;
        }
        .start-btn:hover { transform: scale(1.1); }
        .lang-switch { display: flex; gap: 5px; margin-left: 10px; }
        .lang-btn {
            padding: 5px 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px; color: #fff;
            font-size: 12px; cursor: pointer;
        }
        .lang-btn:hover, .lang-btn.active { background: rgba(138,135,255,0.3); }
        .system-tray { display: flex; align-items: center; gap: 15px; padding: 0 10px; margin-left: auto; }
        .quantum-indicator {
            display: flex; align-items: center; gap: 5px;
            padding: 5px 10px;
            background: rgba(138,135,255,0.2);
            border-radius: 15px; font-size: 12px; color: #8a87ff;
        }
        .quantum-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #4ecdc4;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .clock { font-size: 12px; color: #fff; text-align: right; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="desktop" id="desktop"></div>
    <div class="taskbar">
        <button class="start-btn" onclick="alert('QEntL v0.3.0\n量子叠加态操作系统')">⚛</button>
        <div class="lang-switch">
            <button class="lang-btn active" onclick="setLang('zh')">中文</button>
            <button class="lang-btn" onclick="setLang('en')">EN</button>
            <button class="lang-btn yi-text" onclick="setLang('yi')">彝文</button>
        </div>
        <div class="system-tray">
            <div class="quantum-indicator"><div class="quantum-dot"></div><span id="qstat">量子态运行</span></div>
            <div class="clock" id="clock"></div>
        </div>
    </div>
    <script>
        // 滇川黔贵通用彝文应用名称
        const apps = [
            {id:'qvm',icon:'⚛️',zh:'量子虚拟机',en:'Quantum VM',yi:'量子VM',url:'/apps/qvm/'},
            {id:'compiler',icon:'🔧',zh:'编译器',en:'Compiler',yi:'编译器',url:'/apps/compiler/'},
            {id:'files',icon:'📁',zh:'文件管理',en:'Files',yi:'文件管理',url:'/apps/files/'},
            {id:'terminal',icon:'💻',zh:'终端',en:'Terminal',yi:'终端',url:'/apps/terminal/'},
            {id:'settings',icon:'⚙️',zh:'设置',en:'Settings',yi:'设置',url:'/apps/settings/'},
            {id:'economy',icon:'💰',zh:'经济系统',en:'Economy',yi:'经济系统',url:'/apps/economy/'},
            {id:'social',icon:'💬',zh:'社交网络',en:'Social',yi:'社交网络',url:'/apps/social/'},
            {id:'monitor',icon:'🪞',zh:'系统监控',en:'Monitor',yi:'系统监控',url:'/apps/monitor/'},
            {id:'store',icon:'🏪',zh:'应用商店',en:'Store',yi:'应用商店',url:'/apps/store/'},
            {id:'help',icon:'📖',zh:'帮助',en:'Help',yi:'帮助',url:'/apps/help/'}
        ];
        let lang='zh';
        
        function render() {
            const d=document.getElementById('desktop');
            d.innerHTML=apps.map(a=>{
                const label = a[lang];
                return `<div class="desktop-icon" ondblclick="openApp('${a.id}')"><div class="icon">${a.icon}</div><div class="label">${label}</div></div>`;
            }).join('');
        }
        
        function openApp(id) {
            const a=apps.find(x=>x.id===id);
            if(a) window.open(a.url,'_blank');
        }
        
        function setLang(l) {
            lang=l;
            document.querySelectorAll('.lang-btn').forEach((b,i)=>{
                b.classList.toggle('active', (l==='zh' && i===0) || (l==='en' && i===1) || (l==='yi' && i===2));
            });
            render();
            localStorage.setItem('qentl-lang',l);
        }
        
        function clock() {
            const n=new Date();
            document.getElementById('clock').innerHTML=n.toLocaleTimeString()+'<br>'+n.toLocaleDateString();
        }
        
        const savedLang=localStorage.getItem('qentl-lang');
        if(savedLang) setLang(savedLang);
        render();clock();setInterval(clock,1000);
    </script>
</body>
</html>
