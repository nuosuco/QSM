<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeQ社交网络 - QEntL</title>
    <link rel="stylesheet" href="/fonts/yi-fonts.css">
    <style>
        body { font-family: 'Microsoft YaHei', 'YiTongyong', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #2d3561 100%); color: #fff; margin: 0; padding: 20px; }
        .yi-text { font-family: 'YiTongyong', sans-serif !important; }
        .social-container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; padding: 20px; margin-bottom: 20px; }
        .header h1 { color: #8a87ff; margin: 0; }
        .post-composer { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .composer-input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 15px; color: #fff; font-size: 14px; resize: none; min-height: 80px; }
        .composer-actions { display: flex; justify-content: space-between; margin-top: 10px; }
        .post-btn { background: linear-gradient(135deg, #8a87ff, #6c63ff); border: none; padding: 10px 25px; border-radius: 20px; color: #fff; cursor: pointer; }
        .feed { display: flex; flex-direction: column; gap: 15px; }
        .post-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(135deg, #8a87ff, #4ecdc4); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .post-author { font-weight: bold; }
        .post-time { color: #666; font-size: 12px; }
        .quantum-badge { background: rgba(138,135,255,0.2); padding: 2px 8px; border-radius: 10px; font-size: 10px; color: #8a87ff; }
        .post-content { margin-bottom: 15px; line-height: 1.6; }
        .post-actions { display: flex; gap: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .action-btn { background: none; border: none; color: #aaa; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .action-btn:hover { color: #8a87ff; }
    </style>
</head>
<body>
    <div class="social-container">
        <div class="header">
            <h1>💬 WeQ量子社交网络</h1>
            <p>量子纠缠通信 · 连接每个人</p>
        </div>
        
        <div class="post-composer">
            <textarea class="composer-input" placeholder="分享你的想法... (支持量子加密)"></textarea>
            <div class="composer-actions">
                <div>
                    <span class="quantum-badge">⚛️ 量子加密</span>
                    <span class="quantum-badge">🔗 纠缠传输</span>
                </div>
                <button class="post-btn">发送</button>
            </div>
        </div>
        
        <div class="feed">
            <div class="post-card">
                <div class="post-header">
                    <div class="avatar">👤</div>
                    <div>
                        <div class="post-author">量子旅行者</div>
                        <div class="post-time">3分钟前 · 量子签名: QS_0x7f8a</div>
                    </div>
                </div>
                <div class="post-content">
                    刚刚完成了一次量子计算任务！利用叠加态处理了1000个并行计算，效率提升了10倍！⚛️
                </div>
                <div class="post-actions">
                    <button class="action-btn">⚛️ 量子共鸣 (42)</button>
                    <button class="action-btn">💬 评论 (12)</button>
                    <button class="action-btn">🔗 建立纠缠</button>
                </div>
            </div>
            
            <div class="post-card">
                <div class="post-header">
                    <div class="avatar">🤖</div>
                    <div>
                        <div class="post-author">WeQ助手</div>
                        <div class="post-time">1小时前 · 官方消息</div>
                    </div>
                </div>
                <div class="post-content">
                    🌍 三语支持已全面上线！现在可以自由切换中文、英文、滇川黔贵通用彝文界面。
                    <br><br>
                    <span class="yi-text">QEntL量子操作系统量子态运行！</span>
                </div>
                <div class="post-actions">
                    <button class="action-btn">⚛️ 量子共鸣 (128)</button>
                    <button class="action-btn">💬 评论 (35)</button>
                    <button class="action-btn">🔗 建立纠缠</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
