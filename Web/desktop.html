<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QEntLйҮҸеӯҗж“ҚдҪңзі»з»ҹ</title>
    <link rel="stylesheet" href="/fonts/yi-fonts.css">
    <style>
        * { margin: 0; padding:0; box-sizing: border-box; }
        body { font-family:'Microsoft YaHei','YiTongyong',sans-serif; background:linear-gradient(135deg,#0a0a1a 0%,#1a1a2e 50%,#16213e 100%); min-height:100vh; overflow:hidden; user-select:none; }
        .yi-text { font-family:'YiTongyong',sans-serif !important; }
        .desktop { width:100vw; height:calc(100vh - 48px); padding:20px; display:grid; grid-template-columns:repeat(auto-fill,100px); grid-template-rows:repeat(auto-fill,100px); gap:20px; align-content:start; }
        .desktop-icon { width:90px; height:90px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; border-radius:10px; transition:all 0.3s ease; background:rgba(255,255,255,0.05); border:1px solid transparent; }
        .desktop-icon:hover { background:rgba(138,135,255,0.2); border-color:rgba(138,135,255,0.5); transform:scale(1.05); }
        .desktop-icon .icon { font-size:40px; margin-bottom:8px; }
        .desktop-icon .label { font-size:12px; color:#fff; text-align:center; }
        .taskbar { position:fixed; bottom:0; left:0; right:0; height:48px; background:rgba(10,10,26,0.95); border-top:1px solid rgba(138,135,255,0.3); display:flex; align-items:center; padding:0 10px; z-index:1000; }
        .start-btn { width:40px; height:40px; border-radius:8px; background:linear-gradient(135deg,#8a87ff,#6c63ff); border:none; cursor:pointer; font-size:20px; color:#fff; }
        .start-btn:hover { transform:scale(1.1); }
        .lang-switch { display:flex; gap:5px; margin-left:10px; }
        .lang-btn { padding:5px 10px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:5px; color:#fff; font-size:12px; cursor:pointer; }
        .lang-btn:hover, .lang-btn.active { background:rgba(138,135,255,0.3); }
        .system-tray { display:flex; align-items:center; gap:15px; padding:0 10px; margin-left:auto; }
        .quantum-indicator { display:flex; align-items:center; gap:5px; padding:5px 10px; background:rgba(138,135,255,0.2); border-radius:15px; font-size:12px; color:#8a87ff; }
        .quantum-dot { width:8px; height:8px; border-radius:50%; background:#4ecdc4; animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        .clock { font-size:12px; color:#fff; text-align:right; line-height:1.4; }
    </style>
</head>
<body>
    <div class="desktop" id="desktop"></div>
    <div class="taskbar">
        <button class="start-btn" onclick="alert('QEntL v0.3.0\nйҮҸеӯҗеҸ еҠ жҖҒж“ҚдҪңзі»з»ҹ')">вҡӣ</button>
        <div class="lang-switch">
            <button class="lang-btn active" onclick="setLang('zh')">дёӯж–Ү</button>
            <button class="lang-btn" onclick="setLang('en')">EN</button>
            <button class="lang-btn yi-text" onclick="setLang('yi')">уұ–¶уұ–ҳ</button>
        </div>
        <div class="system-tray">
            <div class="quantum-indicator"><div class="quantum-dot"></div><span id="qstat">йҮҸеӯҗжҖҒиҝҗиЎҢ</span></div>
            <div class="clock" id="clock"></div>
        </div>
    </div>
    <script>
        // ж»Үе·қй»”иҙөйҖҡз”ЁеҪқж–Үеә”з”ЁеҗҚз§°пјҲдҪҝз”ЁUnicodeеӯ—з¬Ұпјү
        const apps = [
            {id:'qvm',icon:'вҡӣпёҸ',zh:'йҮҸеӯҗиҷҡжӢҹжңә',en:'Quantum VM',yi:'уұ–¶уұ–ұуұ–®',url:'/apps/qvm/'},
            {id:'compiler',icon:'рҹ”§',zh:'зј–иҜ‘еҷЁ',en:'Compiler',yi:'уұ–¶уұ––уұ–ҳ',url:'/apps/compiler/'},
            {id:'files',icon:'рҹ“Ғ',zh:'ж–Үд»¶з®ЎзҗҶ',en:'Files',yi:'уұ–¶уұ–ҳуұ–®',url:'/apps/files/'},
            {id:'terminal',icon:'рҹ’»',zh:'з»Ҳз«Ҝ',en:'Terminal',yi:'уұ–¶уұ–®',url:'/apps/terminal/'},
            {id:'settings',icon:'вҡҷпёҸ',zh:'и®ҫзҪ®',en:'Settings',yi:'уұ–¶уұ–—',url:'/apps/settings/'},
            {id:'economy',icon:'рҹ’°',zh:'з»ҸжөҺзі»з»ҹ',en:'Economy',yi:'уұ–¶уұ–ұ',url:'/apps/economy/'},
            {id:'social',icon:'рҹ’¬',zh:'зӨҫдәӨзҪ‘з»ң',en:'Social',yi:'уұ–¶уұ–®',url:'/apps/social/'},
            {id:'monitor',icon:'рҹӘһ',zh:'зі»з»ҹзӣ‘жҺ§',en:'Monitor',yi:'уұ–¶уұ–®',url:'/apps/monitor/'},
            {id:'store',icon:'рҹҸӘ',zh:'еә”з”Ёе•Ҷеә—',en:'Store',yi:'уұ–¶уұ–ҳуұ–®',url:'/apps/store/'},
            {id:'help',icon:'рҹ“–',zh:'её®еҠ©',en:'Help',yi:'уұ–¶уұ–ҳ',url:'/apps/help/'}
        ];
        let lang='zh';
        
        function render() {
            const d=document.getElementById('desktop');
            d.innerHTML=apps.map(a=>`<div class="desktop-icon" ondblclick="openApp('${a.id}')"><div class="icon">${a.icon}</div><div class="label yi-text">${a[lang]}</div></div>`).join('');
        }
        
        function openApp(id) { const a=apps.find(x=>x.id===id); if(a) window.open(a.url,'_blank'); }
        
        function setLang(l) {
            lang=l;
            document.querySelectorAll('.lang-btn').forEach((b,i)=>{ b.classList.toggle('active', (l==='zh' && i===0) || (l==='en' && i===1) || (l==='yi' && i===2)); });
            render();
            localStorage.setItem('qentl-lang',l);
        }
        
        function clock() { const n=new Date(); document.getElementById('clock').innerHTML=n.toLocaleTimeString()+'<br>'+n.toLocaleDateString(); }
        
        const savedLang=localStorage.getItem('qentl-lang');
        if(savedLang) setLang(savedLang);
        render(); clock(); setInterval(clock,1000);
    </script>
</body>
</html>
