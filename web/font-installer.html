<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滇川黔贵通用彝文字体安装</title>
    <style>
        @font-face {
            font-family: 'YiTongyong';
            src: url('/fonts/lingyi.ttf') format('truetype');
            font-display: swap;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 30px auto;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 { color: #4ecdc4; text-align: center; margin-bottom: 10px; }
        h2 { color: #ffe66d; font-size: 16px; text-align: center; margin-top: 0; }
        .yi-demo {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: rgba(255,230,109,0.1);
            border-radius: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .yi-char {
            font-family: 'YiTongyong', sans-serif;
            font-size: 48px;
            color: #4ecdc4;
            padding: 10px;
        }
        .step {
            background: rgba(78,205,196,0.1);
            border-left: 4px solid #4ecdc4;
            padding: 15px;
            margin: 15px 0;
            border-radius: 0 10px 10px 0;
        }
        .step-number {
            background: #4ecdc4;
            color: #1a1a2e;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: #fff;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            margin: 10px 5px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(78,205,196,0.3);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #ffe66d, #ff6b6b);
            color: #1a1a2e;
        }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
            font-weight: bold;
        }
        .status.success { background: rgba(76,175,80,0.2); color: #4caf50; }
        .status.error { background: rgba(244,67,54,0.2); color: #f44367; }
        .status.info { background: rgba(33,150,243,0.2); color: #2196f3; }
        .note {
            background: rgba(255,230,109,0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>滇川黔贵通用彝文字体</h1>
        <h2>YiTongyong (lingyi.ttf)</h2>
        
        <div class="yi-demo">
            <span class="yi-char">&#xF000;&#xF001;&#xF002;</span>
        </div>
        
        <div id="status" class="status info">正在检测字体状态...</div>
        
        <div class="note">
            <strong>提示：</strong>如果彝文字符显示为方框或空白，请下载并安装字体后刷新页面。
        </div>
        
        <div class="step">
            <span class="step-number">1</span>
            <strong>Windows系统：</strong><br>
            下载字体 → 右键字体文件 → "为所有用户安装"
        </div>
        
        <div class="step">
            <span class="step-number">2</span>
            <strong>Android手机：</strong><br>
            使用"爱字体"、"字体管家"等APP安装下载的字体
        </div>
        
        <div class="step">
            <span class="step-number">3</span>
            <strong>iOS设备：</strong><br>
            下载后需通过描述文件安装，或使用AnyFont等APP
        </div>
        
        <div class="step">
            <span class="step-number">4</span>
            <strong>Mac系统：</strong><br>
            双击字体文件 → 点击"安装字体"
        </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <a href="/fonts/lingyi.ttf" class="btn" download>📥 下载字体文件</a>
            <a href="/" class="btn btn-secondary">返回主页</a>
        </div>
    </div>
    
    <script>
    function checkFont() {
        var statusEl = document.getElementById('status');
        
        if (document.fonts) {
            document.fonts.ready.then(function() {
                var loaded = document.fonts.check('48px YiTongyong');
                if (loaded) {
                    statusEl.className = 'status success';
                    statusEl.innerHTML = '✅ 字体已安装！彝文可以正常显示';
                } else {
                    statusEl.className = 'status error';
                    statusEl.innerHTML = '❌ 字体未安装，请下载并安装字体后刷新页面';
                }
            });
        } else {
            statusEl.className = 'status error';
            statusEl.innerHTML = '⚠️ 浏览器不支持字体检测，请手动安装字体';
        }
    }
    
    window.addEventListener('load', function() {
        setTimeout(checkFont, 500);
    });
    </script>
</body>
</html>
