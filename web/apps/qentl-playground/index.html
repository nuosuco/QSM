<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QEntL 量子操作系统 — 在线编程</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a3e,#2a1a4e);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #6a0dad}
.header h1{font-size:20px;color:#c0a0ff}
.header h1 span{color:#8060c0;font-size:13px;margin-left:8px}
.stats{display:flex;gap:14px;font-size:11px;color:#a0a0c0}
.stats b{color:#c0a0ff}
.container{display:flex;height:calc(100vh - 52px)}
.editor{flex:1;display:flex;flex-direction:column;padding:10px;border-right:1px solid #222}
.output{flex:1;display:flex;flex-direction:column;padding:10px}
.toolbar{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.btn{padding:5px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:bold;transition:all .15s}
.btn-run{background:#6a0dad;color:#fff}.btn-run:hover{background:#8a2be2}
.btn-clear{background:#222;color:#999;border:1px solid #333}.btn-clear:hover{background:#333;color:#ccc}
.examples{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.ex-btn{padding:2px 7px;background:#1a1a2a;border:1px solid #333;border-radius:3px;color:#888;font-size:10px;cursor:pointer;transition:all .15s}
.ex-btn:hover{background:#2a2a4a;color:#c0a0ff;border-color:#6a0dad}
textarea{flex:1;background:#0d0d1a;border:1px solid #2a2a3a;border-radius:5px;color:#0f0;font-family:'Courier New',monospace;font-size:12px;padding:10px;resize:none;outline:none;line-height:1.5}
textarea:focus{border-color:#6a0dad;box-shadow:0 0 6px rgba(106,13,173,.2)}
.result-box{flex:1;background:#0d0d1a;border:1px solid #2a2a3a;border-radius:5px;padding:10px;overflow:auto;font-family:'Courier New',monospace;font-size:12px;white-space:pre-wrap;line-height:1.5}
.ok{color:#0f0}.err{color:#f44}.info{color:#666}
.features{margin-top:6px;padding:6px;background:#111;border-radius:3px;font-size:10px;color:#666;line-height:1.5}
.features b{color:#c0a0ff}
</style>
</head>
<body>
<div class="header">
<h1>🐾 QEntL V2.0<span>33/33✅ | 39内建函数</span></h1>
<div class="stats">指令: <b id="si">0</b> | 函数: <b id="sf">0</b> | <b id="ss">就绪</b></div>
</div>
<div class="container">
<div class="editor">
<div class="toolbar">
<button class="btn btn-run" onclick="run()">▶ 运行</button>
<button class="btn btn-clear" onclick="clr()">✕ 清空</button>
</div>
<div class="examples">
<button class="ex-btn" onclick="load('hello')">你好</button>
<button class="ex-btn" onclick="load('fib')">斐波那契</button>
<button class="ex-btn" onclick="load('oop')">类方法</button>
<button class="ex-btn" onclick="load('dict')">字典</button>
<button class="ex-btn" onclick="load('match')">匹配</button>
<button class="ex-btn" onclick="load('ternary')">三元</button>
<button class="ex-btn" onclick="load('logic')">逻辑</button>
<button class="ex-btn" onclick="load('sort')">排序</button>
<button class="ex-btn" onclick="load('err')">异常</button>
<button class="ex-btn" onclick="load('fs')">文件系统</button>
 <button class="ex-btn" onclick="load('format')">格式化</button>
 <button class="ex-btn" onclick="load('global')">全局变量</button>
 <button class="ex-btn" onclick="load('foreach')">遍历</button>
 <button class="ex-btn" onclick="load('grades')">成绩单</button> <button class="ex-btn" onclick="load('fileio')">文件IO</button> <button class="ex-btn" onclick="load('system')">系统</button>
</div>
<textarea id="code" spellcheck="false">主函数: 函数() {
    让 score = 85
    让 grade = score >= 90 ? "优秀" : score >= 60 ? "及格" : "不及格"
    打印("分数: " + score + " → " + grade)
    
    让 d = {"name": "量子", "level": 5}
    打印(键(d))
    打印(值(d))
}</textarea>
<div class="features"><b>QEntL V2.0:</b> 字典{key:val} | 三元?: | 逻辑(且/或) | 匹配/情况 | 遍历 | 39内建函数(键/值/合并/排序/去重...) | Ctrl+Enter运行</div>
</div>
<div class="output">
<div style="margin-bottom:6px;font-weight:bold;color:#c0a0ff;font-size:13px">📊 输出</div>
<div id="result" class="result-box"><span class="info">点击 ▶ 运行 或 Ctrl+Enter</span></div>
</div>
</div>
<script>
const API='/api/qentl/run';
const EX={
hello:'主函数: 函数() {\n    打印("你好量子世界!")\n    打印("1+2=" + (1+2))\n}',
fib:'斐波那契: 函数(n) {\n    如果 n <= 1 { 返回 n }\n    返回 斐波那契(n-1) + 斐波那契(n-2)\n}\n\n主函数: 函数() {\n    循环 i 在 0 到 11 {\n        打印("fib(" + i + ") = " + 斐波那契(i))\n    }\n}',
oop:'quantum_class 计算器 { 值: 整数 }\n\n增加: 函数(self, n) {\n    self.值 = self.值 + n\n    返回 self.值\n}\n\n翻倍: 函数(self) {\n    self.值 = self.值 * 2\n    返回 self.值\n}\n\n主函数: 函数() {\n    让 c = 计算器()\n    c.值 = 10\n    打印("初始: " + c.值)\n    打印("+5 = " + c.增加(5))\n    打印("×2 = " + c.翻倍())\n}',
dict:'主函数: 函数() {\n    让 user = {"name": "量子", "age": 20, "role": "助手"}\n    打印("名字: " + user["name"])\n    打印("年龄: " + user["age"])\n    \n    user["status"] = "在线"\n    打印("键: " + 键(user))\n    \n    让 base = {"x": 1}\n    让 extra = {"y": 2, "z": 3}\n    打印("合并: " + 合并(base, extra))\n}',
match:'quantum_enum 季节 { 春, 夏, 秋, 冬 }\n\n季节名: 函数(s) {\n    匹配 s {\n        情况 季节.春 { 返回 "春天🌸" }\n        情况 季节.夏 { 返回 "夏天☀️" }\n        情况 季节.秋 { 返回 "秋天🍂" }\n        情况 季节.冬 { 返回 "冬天❄️" }\n        默认 { 返回 "未知" }\n    }\n}\n\n主函数: 函数() {\n    循环 s 在 0 到 4 {\n        打印(季节名(s))\n    }\n}',
ternary:'主函数: 函数() {\n    让 scores = [95, 80, 65, 45]\n    循环 score 在 scores {\n        让 grade = score >= 90 ? "优秀" : score >= 80 ? "良好" : score >= 60 ? "及格" : "不及格"\n        打印(score + " → " + grade)\n    }\n}',
logic:'主函数: 函数() {\n    让 age = 20\n    让 has_id = 1\n    \n    如果 age >= 18 且 has_id {\n        打印("可以进入")\n    }\n    \n    如果 age < 18 或 !has_id {\n        打印("不可进入")\n    } 否则 {\n        打印("欢迎！")\n    }\n    \n    打印("1且1=" + (1 且 1))\n    打印("0或1=" + (0 或 1))\n}',
sort:'冒泡排序: 函数(arr) {\n    让 n = 长度(arr)\n    循环 i 在 0 到 n {\n        循环 j 在 0 到 n - i - 1 {\n            如果 arr[j] > arr[j+1] {\n                让 t = arr[j]\n                让 arr[j] = arr[j+1]\n                让 arr[j+1] = t\n            }\n        }\n    }\n    返回 arr\n}\n\n主函数: 函数() {\n    让 arr = [64, 34, 25, 12, 22, 11, 90]\n    打印("原始: " + arr)\n    打印("排序: " + 排序(arr))\n    打印("去重: " + 去重([1,2,2,3,3,4]))\n}',
err:'主函数: 函数() {\n    尝试 {\n        打印("正常执行")\n        抛出 "自定义错误"\n        打印("不会到达")\n    } 捕获(e) {\n        打印("捕获: " + e)\n    }\n    打印("恢复执行")\n    \n    尝试 {\n        让 x = 10 / 0\n    } 捕获(e) {\n        打印("除零: " + e)\n    }\n}',
format:'主函数: 函数() {\n 打印(格式("{}+{}={}", 1, 2, 3))\n 打印(格式("你好, {}", "世界"))\n 打印(格式("{}×{}={}", 5, 6, 30))\n}\n\n// 格式化支持多个{}占位符',
global:'全局 counter\n让 counter = 0\n\n递增: 函数() {\n counter = counter + 1\n 返回 counter\n}\n\n主函数: 函数() {\n 打印(递增())\n 打印(递增())\n 打印(递增())\n 打印("最终: " + counter)\n}\n\n// 全局变量跨函数共享',
foreach:'主函数: 函数() {\n 让 fruits = ["苹果", "香蕉", "橘子"]\n 循环 f 在 fruits {\n 打印("水果: " + f)\n }\n\n 让 scores = [85, 92, 78, 96]\n 让 total = 0\n 循环 s 在 scores {\n total = total + s\n }\n 打印("平均: " + (total / 长度(scores)))\n}\n\n// 遍历循环 + 数组操作',
grades:'quantum_class 成绩单 { 名称: 字符串; 分数: 整数 }\n\n等级: 函数(self) {\n 返回 self.分数 >= 90 ? \"A\" : self.分数 >= 80 ? \"B\" : self.分数 >= 60 ? \"C\" : \"F\"\n}\n\n信息: 函数(self) {\n 返回 格式(\"{}: {}分({})\", self.名称, self.分数, self.等级())\n}\n\n主函数: 函数() {\n 让 s1 = 成绩单()\n s1.名称 = \"张三\"\n s1.分数 = 95\n 打印(s1.信息())\n\n 让 avg = 78.667\n 打印(格式(\"班级平均: {:.1f}\", avg))\n}\n\n// 格式规范 {:.1f} + 三元运算符 + 类方法',\nfs:'quantum_class 节点 { name: 字符串; kind: 整数; size: 整数 }\n\n获取类型: 函数(self) {\n    匹配 self.kind {\n        情况 0 { 返回 "文件" }\n        情况 1 { 返回 "目录" }\n        默认 { 返回 "链接" }\n    }\n}\n\n信息: 函数(self) {\n    返回 "[" + self.获取类型() + "] " + self.name + " (" + self.size + "B)"\n}\n\n主函数: 函数() {\n    让 a = 节点()\n    a.name = "quantum.qentl"\n    a.kind = 0\n    a.size = 2048\n    让 b = 节点()\n    b.name = "home"\n    b.kind = 1\n    b.size = 0\n    打印(a.信息())\n    打印(b.信息())\n}'
};
function load(n){document.getElementById('code').value=EX[n]||'';document.querySelectorAll('.ex-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active')}
async function run(){
    const code=document.getElementById('code').value;
    const r=document.getElementById('result');
    document.getElementById('ss').textContent='运行中...';
    r.innerHTML='<span class="info">⏳ 编译运行中...</span>';
    try{
        const resp=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code,func:'主函数',max_steps:50000})});
        const data=await resp.json();
        if(data.success){
            let h='';
            (data.output||[]).forEach(l=>{h+='<div class="ok">'+esc(l)+'</div>'});
            const fns=Object.keys(data.functions||{});
            h+='<div class="info" style="margin-top:6px">── '+data.instruction_count+'指令 | '+fns.length+'函数 ──</div>';
            r.innerHTML=h;
            document.getElementById('si').textContent=data.instruction_count;
            document.getElementById('sf').textContent=fns.length;
            document.getElementById('ss').textContent='✓';
        }else{
            r.innerHTML='<div class="err">❌ '+esc(data.error||'未知错误')+'</div>';
            document.getElementById('ss').textContent='✗';
        }
    }catch(e){
        r.innerHTML='<div class="err">❌ '+esc(e.message)+'</div>';
        document.getElementById('ss').textContent='✗';
    }
}
function clr(){document.getElementById('result').innerHTML='<span class="info">已清空</span>';document.getElementById('ss').textContent='就绪'}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
document.getElementById('code').addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='Enter'){e.preventDefault();run()}});
</script>
</body>
</html>
