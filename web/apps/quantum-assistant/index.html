<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>量子计算器 - QEntL 量子操作系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0a0a1a,#1a1a2e,#16213e);min-height:100vh;color:#fff}
.app-header{background:rgba(10,10,30,0.9);border-bottom:1px solid rgba(138,135,255,0.3);padding:12px 20px;display:flex;align-items:center;gap:15px}
.app-header a{color:#8a87ff;text-decoration:none;font-size:14px}
.app-header a:hover{text-decoration:underline}
.app-header h1{font-size:18px;color:#4ecdc4}
.app-header .version{margin-left:auto;font-size:12px;color:#576574}
.container{max-width:900px;margin:20px auto;padding:0 15px}

/* Tabs */
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab-btn{padding:8px 18px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#ccc;cursor:pointer;font-size:13px;transition:all 0.2s}
.tab-btn:hover{background:rgba(138,135,255,0.15);color:#fff}
.tab-btn.active{background:rgba(138,135,255,0.3);border-color:#8a87ff;color:#fff}
.tab-content{display:none}
.tab-content.active{display:block}

/* Calculator Panel */
.calc-panel{background:rgba(255,255,255,0.05);border:1px solid rgba(138,135,255,0.2);border-radius:16px;padding:25px;margin-bottom:20px}
.calc-panel h2{color:#8a87ff;font-size:18px;margin-bottom:15px;display:flex;align-items:center;gap:8px}

/* Display */
.calc-display{background:rgba(0,0,0,0.4);border:1px solid rgba(138,135,255,0.3);border-radius:12px;padding:15px 20px;margin-bottom:15px;text-align:right;min-height:80px;display:flex;flex-direction:column;justify-content:flex-end}
.calc-expression{color:#7f8fa6;font-size:14px;min-height:20px;word-break:break-all}
.calc-result{color:#4ecdc4;font-size:32px;font-weight:bold;margin-top:5px;font-family:monospace}

/* Buttons Grid */
.btn-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:15px}
.calc-btn{padding:14px;border:1px solid rgba(138,135,255,0.2);border-radius:10px;background:rgba(255,255,255,0.06);color:#fff;font-size:16px;cursor:pointer;transition:all 0.15s;font-family:monospace}
.calc-btn:hover{background:rgba(138,135,255,0.2);transform:scale(1.02)}
.calc-btn:active{transform:scale(0.98)}
.calc-btn.op{background:rgba(138,135,255,0.15);color:#8a87ff}
.calc-btn.eq{background:linear-gradient(135deg,#8a87ff,#6c63ff);color:#fff;font-weight:bold}
.calc-btn.clear{background:rgba(255,100,100,0.15);color:#ff6b6b}
.calc-btn.span2{grid-column:span 2}

/* Quantum Calculator Specific */
.qc-input-group{margin-bottom:15px}
.qc-input-group label{display:block;color:#7f8fa6;font-size:13px;margin-bottom:5px}
.qc-input-group input,.qc-input-group select{width:100%;padding:10px 14px;background:rgba(0,0,0,0.3);border:1px solid rgba(138,135,255,0.3);border-radius:8px;color:#fff;font-size:14px;font-family:monospace}
.qc-input-group input:focus,.qc-input-group select:focus{outline:none;border-color:#8a87ff}
.qc-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.qc-result{background:rgba(0,0,0,0.3);border:1px solid rgba(78,205,196,0.3);border-radius:10px;padding:15px;margin-top:15px}
.qc-result h3{color:#4ecdc4;font-size:14px;margin-bottom:10px}
.qc-result pre{color:#e0e0e0;font-size:13px;white-space:pre-wrap;font-family:monospace;line-height:1.6}
.qc-result .highlight{color:#8a87ff;font-weight:bold}
.qc-result .prob{color:#ffe66d}

/* Amplitude bars */
.amplitude-bars{margin-top:10px}
.amp-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.amp-bar .label{width:30px;font-size:12px;color:#7f8fa6;text-align:right}
.amp-bar .bar-bg{flex:1;height:16px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden}
.amp-bar .bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease}
.amp-bar .bar-val{width:50px;font-size:11px;color:#4ecdc4}

/* History */
.history-list{max-height:200px;overflow-y:auto}
.history-item{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px;display:flex;justify-content:space-between}
.history-item .expr{color:#7f8fa6}
.history-item .result{color:#4ecdc4;font-family:monospace}

/* State Viz */
.state-viz{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:15px}
.state-viz canvas{width:100%;border-radius:8px;background:rgba(0,0,0,0.3)}
.state-info{background:rgba(0,0,0,0.3);border-radius:8px;padding:12px;font-size:12px;line-height:1.8}
.state-info .row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.state-info .row .key{color:#7f8fa6}
.state-info .row .val{color:#4ecdc4;font-family:monospace}
</style>
</head>
<body>
<div class="app-header">
<a href="/">← QEntL 量子操作系统</a>
<h1>🧮 量子计算器</h1>
<span class="version">v0.4.0 | som.top</span>
</div>

<div class="container">
<div class="tabs">
<button class="tab-btn active" onclick="switchTab('basic')">🔢 基础计算</button>
<button class="tab-btn" onclick="switchTab('quantum')">⚛️ 量子计算</button>
<button class="tab-btn" onclick="switchTab('bloch')">🌐 布洛赫球</button>
<button class="tab-btn" onclick="switchTab('history')">📋 历史记录</button>
</div>

<!-- Basic Calculator -->
<div class="tab-content active" id="tab-basic">
<div class="calc-panel">
<h2>🔢 基础量子计算器</h2>
<div class="calc-display">
<div class="calc-expression" id="expression"></div>
<div class="calc-result" id="result">0</div>
</div>
<div class="btn-grid">
<button class="calc-btn clear" onclick="clearAll()">AC</button>
<button class="calc-btn clear" onclick="deleteLast()">⌫</button>
<button class="calc-btn op" onclick="appendOp('%')">%</button>
<button class="calc-btn op" onclick="appendOp('/')">÷</button>
<button class="calc-btn" onclick="appendNum('7')">7</button>
<button class="calc-btn" onclick="appendNum('8')">8</button>
<button class="calc-btn" onclick="appendNum('9')">9</button>
<button class="calc-btn op" onclick="appendOp('*')">×</button>
<button class="calc-btn" onclick="appendNum('4')">4</button>
<button class="calc-btn" onclick="appendNum('5')">5</button>
<button class="calc-btn" onclick="appendNum('6')">6</button>
<button class="calc-btn op" onclick="appendOp('-')">−</button>
<button class="calc-btn" onclick="appendNum('1')">1</button>
<button class="calc-btn" onclick="appendNum('2')">2</button>
<button class="calc-btn" onclick="appendNum('3')">3</button>
<button class="calc-btn op" onclick="appendOp('+')">+</button>
<button class="calc-btn span2" onclick="appendNum('0')">0</button>
<button class="calc-btn" onclick="appendNum('.')">.</button>
<button class="calc-btn eq" onclick="calculate()">=</button>
</div>
</div>
</div>

<!-- Quantum Calculator -->
<div class="tab-content" id="tab-quantum">
<div class="calc-panel">
<h2>⚛️ 量子态计算器</h2>
<p style="color:#7f8fa6;font-size:13px;margin-bottom:15px">计算量子态的振幅、概率幅、布洛赫球坐标和量子门矩阵乘法</p>

<!-- Amplitude Calculator -->
<div style="margin-bottom:20px">
<h3 style="color:#8a87ff;font-size:15px;margin-bottom:10px">📐 振幅与概率计算</h3>
<div class="qc-row">
<div class="qc-input-group">
<label>α (alpha) 振幅</label>
<input type="number" id="alphaIn" step="0.01" value="0.707" placeholder="例如 0.707">
</div>
<div class="qc-input-group">
<label>β (beta) 振幅</label>
<input type="number" id="betaIn" step="0.01" value="0.707" placeholder="例如 0.707">
</div>
</div>
<button class="calc-btn eq" style="width:100%;padding:10px" onclick="calcAmplitude()">计算概率幅</button>
<div class="qc-result" id="ampResult" style="display:none"></div>
</div>

<!-- Bloch Sphere Calculator -->
<div style="margin-bottom:20px">
<h3 style="color:#8a87ff;font-size:15px;margin-bottom:10px">🌐 布洛赫球坐标计算</h3>
<div class="qc-row">
<div class="qc-input-group">
<label>θ (theta) 极角 (度)</label>
<input type="number" id="thetaIn" step="1" value="90" placeholder="0-180">
</div>
<div class="qc-input-group">
<label>φ (phi) 方位角 (度)</label>
<input type="number" id="phiIn" step="1" value="0" placeholder="0-360">
</div>
</div>
<button class="calc-btn eq" style="width:100%;padding:10px" onclick="calcBloch()">计算布洛赫坐标</button>
<div class="qc-result" id="blochResult" style="display:none"></div>
</div>

<!-- Quantum Gate Matrix -->
<div>
<h3 style="color:#8a87ff;font-size:15px;margin-bottom:10px">🔧 量子门矩阵运算</h3>
<div class="qc-row">
<div class="qc-input-group">
<label>选择量子门</label>
<select id="gateSelect" onchange="updateGateInput()">
<option value="H">H (Hadamard)</option>
<option value="X">X (Pauli-X)</option>
<option value="Y">Y (Pauli-Y)</option>
<option value="Z">Z (Pauli-Z)</option>
<option value="S">S (Phase π/2)</option>
<option value="T">T (Phase π/4)</option>
<option value="I">I (Identity)</option>
<option value="Rx">Rx (旋转X)</option>
<option value="Ry">Ry (旋转Y)</option>
<option value="Rz">Rz (旋转Z)</option>
</select>
</div>
<div class="qc-input-group" id="gateAngleGroup" style="display:none">
<label>角度 θ (度)</label>
<input type="number" id="gateAngle" value="45" placeholder="旋转角度">
</div>
</div>
<div class="qc-row">
<div class="qc-input-group">
<label>输入态 α</label>
<input type="number" id="gateAlphaIn" step="0.01" value="1" placeholder="|0⟩ 的振幅">
</div>
<div class="qc-input-group">
<label>输入态 β</label>
<input type="number" id="gateBetaIn" step="0.01" value="0" placeholder="|1⟩ 的振幅">
</div>
</div>
<button class="calc-btn eq" style="width:100%;padding:10px" onclick="calcGate()">应用量子门</button>
<div class="qc-result" id="gateResult" style="display:none"></div>
</div>
</div>
</div>

<!-- Bloch Sphere Visualization -->
<div class="tab-content" id="tab-bloch">
<div class="calc-panel">
<h2>🌐 布洛赫球可视化</h2>
<p style="color:#7f8fa6;font-size:13px;margin-bottom:15px">可视化量子态在布洛赫球上的位置</p>
<div class="state-viz">
<canvas id="blochCanvas" width="400" height="400"></canvas>
<div class="state-info" id="blochInfo">
<h3 style="color:#8a87ff;margin-bottom:10px">量子态信息</h3>
<div class="row"><span class="key">态矢量</span><span class="val" id="bi-state">|ψ⟩ = |0⟩</span></div>
<div class="row"><span class="key">θ (极角)</span><span class="val" id="bi-theta">0°</span></div>
<div class="row"><span class="key">φ (方位角)</span><span class="val" id="bi-phi">0°</span></div>
<div class="row"><span class="key">P(|0⟩)</span><span class="val" id="bi-p0">100.0%</span></div>
<div class="row"><span class="key">P(|1⟩)</span><span class="val" id="bi-p1">0.0%</span></div>
<div class="row"><span class="key">x 分量</span><span class="val" id="bi-x">0.000</span></div>
<div class="row"><span class="key">y 分量</span><span class="val" id="bi-y">0.000</span></div>
<div class="row"><span class="key">z 分量</span><span class="val" id="bi-z">1.000</span></div>
</div>
</div>
<div style="margin-top:15px">
<div class="qc-row">
<div class="qc-input-group">
<label>α 振幅</label>
<input type="range" id="blochAlpha" min="0" max="1" step="0.01" value="1" oninput="drawBloch()">
<span style="font-size:12px;color:#7f8fa6" id="blochAlphaVal">1.00</span>
</div>
<div class="qc-input-group">
<label>φ 角度 (度)</label>
<input type="range" id="blochPhi" min="0" max="360" step="1" value="0" oninput="drawBloch()">
<span style="font-size:12px;color:#7f8fa6" id="blochPhiVal">0°</span>
</div>
</div>
</div>
</div>
</div>

<!-- History -->
<div class="tab-content" id="tab-history">
<div class="calc-panel">
<h2>📋 计算历史</h2>
<div class="history-list" id="historyList">
<div style="color:#576574;text-align:center;padding:40px">暂无计算历史</div>
</div>
<button class="calc-btn clear" style="width:100%;margin-top:15px;padding:10px" onclick="clearHistory()">清除历史</button>
</div>
</div>
</div>

<script>
// ===== Tab Switching =====
function switchTab(name) {
document.querySelectorAll('.tab-btn').forEach(function(b,i){
b.classList.toggle('active',['basic','quantum','bloch','history'][i]===name);
});
document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active')});
document.getElementById('tab-'+name).classList.add('active');
if(name==='bloch') drawBloch();
}

// ===== Basic Calculator =====
var expr='';
var history=[];

function appendNum(n){
expr+=n;
document.getElementById('expression').textContent=formatExpr(expr);
}
function appendOp(o){
expr+=o;
document.getElementById('expression').textContent=formatExpr(expr);
}
function clearAll(){
expr='';
document.getElementById('expression').textContent='';
document.getElementById('result').textContent='0';
}
function deleteLast(){
expr=expr.slice(0,-1);
document.getElementById('expression').textContent=formatExpr(expr);
if(!expr) document.getElementById('result').textContent='0';
}
function formatExpr(e){
return e.replace(/\*/g,'×').replace(/\//g,'÷');
}
function calculate(){
if(!expr) return;
try{
var r=Function('"use strict";return ('+expr+')')();
var display=formatExpr(expr)+' = '+Number(r).toFixed(8).replace(/\.?0+$/,'');
document.getElementById('result').textContent=Number(r).toFixed(8).replace(/\.?0+$/,'');
document.getElementById('expression').textContent=formatExpr(expr);
addHistory(display);
expr='';
}catch(e){
document.getElementById('result').textContent='Error';
}
}

// ===== History =====
function addHistory(text){
history.unshift(text);
if(history.length>50) history.pop();
renderHistory();
}
function renderHistory(){
var el=document.getElementById('historyList');
if(history.length===0){el.innerHTML='<div style="color:#576574;text-align:center;padding:40px">暂无计算历史</div>';return;}
el.innerHTML=history.map(function(h){
var parts=h.split(' = ');
return '<div class="history-item"><span class="expr">'+esc(parts[0])+'</span><span class="result">= '+esc(parts[1]||'')+'</span></div>';
}).join('');
}
function clearHistory(){history=[];renderHistory();}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ===== Quantum Amplitude Calculator =====
function calcAmplitude(){
var a=parseFloat(document.getElementById('alphaIn').value)||0;
var b=parseFloat(document.getElementById('betaIn').value)||0;
var p0=a*a, p1=b*b, total=p0+p1;
var norm0=p0/total, norm1=p1/total;
var phase=Math.atan2(b,a);
var el=document.getElementById('ampResult');
el.style.display='block';
el.innerHTML='<h3>📊 概率幅分析</h3><pre>'
+'态矢量: |ψ⟩ = <span class="highlight">'+a.toFixed(4)+'</span>|0⟩ + <span class="highlight">'+b.toFixed(4)+'</span>|1⟩<br><br>'
+'<span style="color:#4ecdc4">P(|0⟩) = α² = '+norm0.toFixed(4)+' ('+(norm0*100).toFixed(1)+'%)</span><br>'
+'<span style="color:#ffe66d">P(|1⟩) = β² = '+norm1.toFixed(4)+' ('+(norm1*100).toFixed(1)+'%)</span><br><br>'
+'归一化总和: <span class="highlight">'+total.toFixed(4)+'</span><br>'
+'相对相位: φ = '+phase.toFixed(4)+' rad ('+(phase*180/Math.PI).toFixed(1)+'°)<br>'
+'</pre>'+buildAmpBars(norm0,norm1);
addHistory('量子态: '+a.toFixed(3)+'|0⟩+'+b.toFixed(3)+'|1⟩ P0='+(norm0*100).toFixed(1)+'%');
}
function buildAmpBars(p0,p1){
return '<div class="amplitude-bars">'
+'<div class="amp-bar"><span class="label">|0⟩</span><div class="bar-bg"><div class="bar-fill" style="width:'+p0*100+'%;background:#4ecdc4"></div></div><span class="bar-val">'+(p0*100).toFixed(1)+'%</span></div>'
+'<div class="amp-bar"><span class="label">|1⟩</span><div class="bar-bg"><div class="bar-fill" style="width:'+p1*100+'%;background:#ffe66d"></div></div><span class="bar-val">'+(p1*100).toFixed(1)+'%</span></div>'
+'</div>';
}

// ===== Bloch Sphere Calculator =====
function calcBloch(){
var thetaDeg=parseFloat(document.getElementById('thetaIn').value)||0;
var phiDeg=parseFloat(document.getElementById('phiIn').value)||0;
var theta=thetaDeg*Math.PI/180, phi=phiDeg*Math.PI/180;
var alpha=Math.cos(theta/2);
var beta=Math.sin(theta/2)*Math.exp(1i*phi);
// Handle complex beta display
var betaReal=Math.sin(theta/2)*Math.cos(phi);
var betaImag=Math.sin(theta/2)*Math.sin(phi);
var el=document.getElementById('blochResult');
el.style.display='block';
var betaStr=betaReal.toFixed(4)+(betaImag>=0?'+':'')+betaImag.toFixed(4)+'i';
el.innerHTML='<h3>🌐 布洛赫球坐标</h3><pre>'
+'|ψ⟩ = <span class="highlight">'+alpha.toFixed(4)+'</span>|0⟩ + <span class="highlight">'+betaStr+'</span>|1⟩<br><br>'
+'θ = '+thetaDeg+'° ('+theta.toFixed(4)+' rad)<br>'
+'φ = '+phiDeg+'° ('+phi.toFixed(4)+' rad)<br><br>'
+'Bloch x = '+Math.sin(theta)*Math.cos(phi).toFixed(4)+'<br>'
+'Bloch y = '+Math.sin(theta)*Math.sin(phi).toFixed(4)+'<br>'
+'Bloch z = '+Math.cos(theta).toFixed(4)+'</pre>';
addHistory('布洛赫: θ='+thetaDeg+'° φ='+phiDeg+'°');
}

// ===== Quantum Gate Calculator =====
function updateGateInput(){
var g=document.getElementById('gateSelect').value;
var show=['Rx','Ry','Rz'].indexOf(g)>=0;
document.getElementById('gateAngleGroup').style.display=show?'block':'none';
}
function calcGate(){
var gate=document.getElementById('gateSelect').value;
var a=parseFloat(document.getElementById('gateAlphaIn').value)||0;
var b=parseFloat(document.getElementById('gateBetaIn').value)||0;
var theta=(parseFloat(document.getElementById('gateAngle').value)||0)*Math.PI/180;
var out;
switch(gate){
case 'H': out=[(a+b)/Math.sqrt(2),(a-b)/Math.sqrt(2)]; break;
case 'X': out=[b,a]; break;
case 'Y': out=[-b.imag||-b, a.imag||a]; break;
case 'Z': out=[a,-b]; break;
case 'S': out=[a, b*Math.exp(Math.PI*0.5i)]; break;
case 'T': out=[a, b*Math.exp(Math.PI*0.25i)]; break;
case 'I': out=[a,b]; break;
case 'Rx': out=[a*Math.cos(theta/2)-b*Math.sin(theta/2), a*Math.sin(theta/2)+b*Math.cos(theta/2)]; break;
case 'Ry': out=[a*Math.cos(theta/2)-b*Math.sin(theta/2), a*Math.sin(theta/2)+b*Math.cos(theta/2)]; break;
case 'Rz': out=[a*Math.exp(0.5i*theta), b*Math.exp(-0.5i*theta)]; break;
default: out=[a,b];
}
var el=document.getElementById('gateResult');
el.style.display='block';
var p0=out[0]*out[0], p1=out[1]*out[1];
el.innerHTML='<h3>🔧 '+gate+' 门输出</h3><pre>'
+'输入: |ψ⟩ = <span class="highlight">'+a.toFixed(4)+'</span>|0⟩ + <span class="highlight">'+b.toFixed(4)+'</span>|1⟩<br>'
+'门: <span class="highlight">'+gate+'</span><br><br>'
+'输出: |ψ\'⟩ = <span class="highlight">'+out[0].toFixed(4)+'</span>|0⟩ + <span class="highlight">'+out[1].toFixed(4)+'</span>|1⟩<br><br>'
+'P(|0⟩) = <span class="prob">'+(p0*100).toFixed(1)+'%</span><br>'
+'P(|1⟩) = <span class="prob">'+(p1*100).toFixed(1)+'%</span>'+'</pre>'+buildAmpBars(p0,p1);
addHistory(gate+'门: '+a.toFixed(2)+'|0⟩+'+b.toFixed(2)+'|1⟩→'+out[0].toFixed(2)+'|0⟩+'+out[1].toFixed(2)+'|1⟩');
}

// ===== Bloch Sphere Visualization =====
function drawBloch(){
var canvas=document.getElementById('blochCanvas');
if(!canvas) return;
var ctx=canvas.getContext('2d');
var W=canvas.width, H=canvas.height;
var cx=W/2, cy=H/2, r=Math.min(W,H)/2-40;
ctx.clearRect(0,0,W,H);

var alphaVal=parseFloat(document.getElementById('blochAlpha').value)||1;
var phiDeg=parseFloat(document.getElementById('blochPhi').value)||0;
document.getElementById('blochAlphaVal').textContent=alphaVal.toFixed(2);
document.getElementById('blochPhiVal').textContent=phiDeg+'°';

// Normalize beta
var betaVal=Math.sqrt(1-alphaVal*alphaVal);
var theta=2*Math.acos(alphaVal);
var phi=phiDeg*Math.PI/180;

// Draw sphere outline
ctx.strokeStyle='rgba(138,135,255,0.3)';
ctx.lineWidth=1;
ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();

// Equator ellipse
ctx.beginPath();ctx.ellipse(cx,cy,r,r*0.3,0,0,Math.PI*2);ctx.stroke();

// Axes
ctx.strokeStyle='rgba(255,255,255,0.4)';
ctx.beginPath();
ctx.moveTo(cx-r-20,cy);ctx.lineTo(cx+r+20,cy);
ctx.moveTo(cx,cy-r-20);ctx.lineTo(cx,cy+r+20);
ctx.stroke();

// Labels
ctx.fillStyle='#8a87ff';ctx.font='13px monospace';
ctx.fillText('|0⟩',cx-10,cy-r-25);
ctx.fillText('|1⟩',cx-10,cy+r+25);
ctx.fillText('+x',cx+r+25,cy+5);
ctx.fillText('-x',cx-r-35,cy+5);

// State vector
var px=cx+r*Math.sin(theta)*Math.cos(phi);
var py=cy-r*Math.cos(theta);
ctx.strokeStyle='#4ecdc4';ctx.lineWidth=2;
ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(px,py);ctx.stroke();

// Arrow head
var angle=Math.atan2(py-cy,px-cx);
ctx.fillStyle='#4ecdc4';
ctx.beginPath();
ctx.moveTo(px,py);
ctx.lineTo(px-10*Math.cos(angle-0.4),py-10*Math.sin(angle-0.4));
ctx.lineTo(px-10*Math.cos(angle+0.4),py-10*Math.sin(angle+0.4));
ctx.fill();

// State point glow
ctx.fillStyle='rgba(78,205,196,0.3)';
ctx.beginPath();ctx.arc(px,py,15,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#4ecdc4';
ctx.beginPath();ctx.arc(px,py,6,0,Math.PI*2);ctx.fill();

// Update info panel
var p0=alphaVal*alphaVal, p1=1-p0;
document.getElementById('bi-state').textContent='|ψ⟩ = '+alphaVal.toFixed(3)+'|0⟩ + '+Math.sqrt(p1).toFixed(3)+'|1⟩';
document.getElementById('bi-theta').textContent=(theta*180/Math.PI).toFixed(1)+'°';
document.getElementById('bi-phi').textContent=phiDeg.toFixed(1)+'°';
document.getElementById('bi-p0').textContent=(p0*100).toFixed(1)+'%';
document.getElementById('bi-p1').textContent=(p1*100).toFixed(1)+'%';
document.getElementById('bi-x').textContent=(Math.sin(theta)*Math.cos(phi)).toFixed(4);
document.getElementById('bi-y').textContent=(Math.sin(theta)*Math.sin(phi)).toFixed(4);
document.getElementById('bi-z').textContent=(Math.cos(theta)).toFixed(4);
}

// ===== Keyboard support for basic calc =====
document.addEventListener('keydown',function(e){
if(!document.getElementById('tab-basic').classList.contains('active')) return;
if(e.key>='0'&&e.key<='9') appendNum(e.key);
else if(e.key==='.') appendNum('.');
else if(e.key==='+') appendOp('+');
else if(e.key==='-') appendOp('-');
else if(e.key==='*') appendOp('*');
else if(e.key==='/'){e.preventDefault();appendOp('/');}
else if(e.key==='%') appendOp('%');
else if(e.key==='Enter'||e.key==='=') calculate();
else if(e.key==='Backspace') deleteLast();
else if(e.key==='Escape') clearAll();
});

// Init
drawBloch();
</script>
</body>
</html>
