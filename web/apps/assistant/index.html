<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>量子助手 - QEntL全栈 | QVM</title>
<style>
@font-face{font-family:'LSTY-Yi-Black';src:url('/fonts/lingyi.ttf') format('truetype');font-display:swap}
.yi-font{font-family:'LSTY-Yi-Black',sans-serif!important}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0a0a1a,#1a1a2e,#16213e);min-height:100vh;color:#fff}
.container{max-width:800px;margin:0 auto;padding:15px}
h1{text-align:center;padding:10px;color:#8a87ff;font-size:24px}
.info{background:rgba(255,255,255,0.1);padding:8px;border-radius:8px;text-align:center;margin-bottom:10px;font-size:14px;border:1px solid rgba(138,135,255,0.3)}
.chat{background:rgba(255,255,255,0.05);border-radius:12px;padding:12px;min-height:180px;max-height:50vh;overflow-y:auto;margin-bottom:10px;border:1px solid rgba(138,135,255,0.2)}
.msg{padding:8px 14px;border-radius:14px;margin:6px 0;max-width:85%;line-height:1.5;font-size:15px;white-space:pre-wrap}
.user{background:linear-gradient(135deg,#4ecdc4,#44a08d);color:#1a1a2e;margin-left:auto}
.ai{background:rgba(138,135,255,0.15);border:1px solid rgba(138,255,0.3)}
.input{display:flex;gap:8px;margin-bottom:8px}
input{flex:1;padding:12px;border:2px solid rgba(138,135,255,0.3);border-radius:20px;background:rgba(0,0,0,0.3);color:#fff;font-size:15px}
input:focus{outline:none;border-color:#8a87ff}
button{padding:12px 25px;border:none;border-radius:20px;background:linear-gradient(135deg,#8a87ff,#6c63ff);color:#fff;font-size:15px;cursor:pointer;font-weight:bold}
button:hover{opacity:0.9}
.status{text-align:center;padding:8px;color:#8a87ff;font-size:13px}
.hints{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;justify-content:center}
.hint{background:rgba(255,255,255,0.08);padding:4px 10px;border-radius:12px;font-size:0.8em;cursor:pointer;color:#8a87ff;border:1px solid rgba(138,135,255,0.2)}
.hint:hover{background:rgba(138,135,255,0.2)}
.qvm-badge{display:inline-block;padding:3px 10px;background:rgba(78,205,196,0.2);border:1px solid rgba(78,205,196,0.4);border-radius:12px;font-size:11px;color:#4ecdc4;margin-left:8px}
</style>
</head>
<body>
<div class="container">
<h1>🔮 量子助手 <span class="qvm-badge">⚛️ 运行在QVM</span></h1>
<div class="info" id="info">QEntL全栈 · QVM量子虚拟机 · 四大模型</div>
<div class="hints">
<span class="hint" onclick="tryit('你好')">你好</span>
<span class="hint" onclick="tryit('hello')">hello</span>
<span class="hint" onclick="tryit('翻译彝文')">翻译彝文</span>
<span class="hint" onclick="tryit('量子状态')">量子状态</span>
<span class="hint" onclick="tryit('bell态')">Bell态</span>
<span class="hint" onclick="tryit('ghz态')">GHZ态</span>
<span class="hint" onclick="tryit('grover搜索')">Grover搜索</span>
<span class="hint" onclick="tryit('四大模型')">四大模型</span>
<span class="hint" onclick="tryit('系统状态')">系统状态</span>
</div>
<div class="chat" id="chat">
<div class="msg ai">🐾 量子助手QEntL已上线！运行在QVM量子虚拟机上！\n\n架构: C语言启动器 → QVM → QCL编译器 → QDFS → QNS → 四大模型\n\n我可以帮你：\n• 彝文/中文/英文翻译\n• 量子计算演示\n• 量子算法运行\n• 系统信息查询</div>
</div>
<div class="input">
<input type="text" id="txt" placeholder="输入彝文/中文/英文..." onkeypress="if(event.key=='Enter')send()">
<button onclick="send()">发送</button>
</div>
<div class="status" id="status">✓ QEntL 就绪 · 运行在QVM上</div>
</div>
<script>
var API='/api/v21/';

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function tryit(t){document.getElementById('txt').value=t;send()}

function send(){
    var t=document.getElementById('txt').value.trim();
    if(!t)return;
    var chat=document.getElementById('chat');
    chat.innerHTML+='<div class="msg user">'+esc(t)+'</div>';
    document.getElementById('txt').value='';
    document.getElementById('status').textContent='⏳ QVM处理中...';
    
    fetch(API+'chat',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({message:t})
    })
    .then(r=>r.json())
    .then(d=>{
        var out=d.response||d.translated||'?';
        chat.innerHTML+='<div class="msg ai yi-font">'+esc(out)+'</div>';
        document.getElementById('status').textContent='✓ QVM完成 · '+d.model;
        chat.scrollTop=chat.scrollHeight;
    })
    .catch(e=>{
        chat.innerHTML+='<div class="msg ai" style="color:#f99">服务连接失败 - 请确保API运行在QVM上</div>';
        document.getElementById('status').textContent='✗ 连接失败';
        chat.scrollTop=chat.scrollHeight;
    });
}

// Check health on load
fetch(API+'health').then(r=>r.json()).then(d=>{
    var info='QEntL全栈 · ';
    if(d.architecture) info+=d.architecture+' · ';
    if(d.on_qvm) info+='⚛️ 运行在QVM';
    document.getElementById('info').textContent=info;
}).catch(()=>{
    document.getElementById('info').textContent='QEntL全栈 · 连接中...';
});
</script>
</body>
</html>
