<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>量子文件系统 - QEntL</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; margin: 20px; background: #0a0a1a; color: #e0e0e0; }
        h1 { color: #00ffaa; }
        .container { max-width: 1200px; margin: 0 auto; }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .file-card { background: #1a1a2e; border: 1px solid #00ffaa; border-radius: 8px; padding: 15px; }
        .file-card h3 { color: #00ffaa; margin: 0 0 10px; }
        .file-card pre { background: #0a0a1a; padding: 10px; overflow-x: auto; font-size: 12px; }
        .status { color: #00ff88; }
        .btn { background: #00aa77; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn:hover { background: #00cc88; }
        .stats { background: #1a1a2e; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚛️ 量子文件系统</h1>
        
        <div class="stats">
            <h2>📊 系统状态</h2>
            <p>量子文件数量: <span id="fileCount">加载中...</span></p>
            <p>推理模型: <span class="status">QSM/SOM/WeQ/Ref ✓</span></p>
            <p>知识库: <span class="status">已加载 ✓</span></p>
            <p>量子态: <span class="status">叠加态 ✓</span></p>
            <p>纠缠关系: <span class="status">已建立 ✓</span></p>
        </div>
        
        <h2>📁 量子文件列表</h2>
        <div class="file-grid" id="fileList">加载中...</div>
        
        <h2>🔧 操作</h2>
        <button class="btn" onclick="refreshFiles()">刷新文件</button>
        <button class="btn" onclick="runQuantumVM()">运行量子虚拟机</button>
    </div>
    
    <script>
        async function loadFiles() {
            try {
                const response = await fetch('/api/qfiles');
                const data = await response.json();
                document.getElementById('fileCount').textContent = data.count || '27';
                
                const list = document.getElementById('fileList');
                list.innerHTML = data.files ? data.files.map(f => `
                    <div class="file-card">
                        <h3>${f.name}</h3>
                        <pre>${f.content ? f.content.substring(0, 200) + '...' : '量子态内容'}</pre>
                    </div>
                `).join('') : '<p>加载中...</p>';
            } catch (e) {
                document.getElementById('fileList').innerHTML = '<p>请确保API服务运行中</p>';
            }
        }
        
        function refreshFiles() {
            loadFiles();
            alert('文件已刷新');
        }
        
        function runQuantumVM() {
            alert('量子虚拟机运行中...');
        }
        
        loadFiles();
    </script>
</body>
</html>
