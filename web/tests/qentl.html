<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QEntL量子编程 - 在线编译器</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Courier New',monospace; background:#0a0a1a; color:#e0e0ff; min-height:100vh; }
.header { background:linear-gradient(135deg,#1a0030,#0a1a3a); padding:20px; text-align:center; border-bottom:1px solid #3030ff; }
.header h1 { font-size:1.8em; color:#8080ff; }
.header .sub { color:#6060c0; font-size:0.9em; }
.main { max-width:900px; margin:20px auto; padding:0 20px; }
.editor-area { background:#111128; border:1px solid #3030ff; border-radius:8px; overflow:hidden; }
.toolbar { background:#1a1a3a; padding:10px 15px; display:flex; justify-content:space-between; align-items:center; }
.toolbar button { background:#4040ff; color:white; border:none; padding:8px 20px; border-radius:4px; cursor:pointer; font-family:inherit; font-size:0.9em; }
.toolbar button:hover { background:#5050ff; }
.editor { width:100%; min-height:300px; background:transparent; color:#e0e0ff; border:none; padding:15px; font-family:inherit; font-size:14px; resize:vertical; outline:none; }
.output-area { background:#0a0a20; border:1px solid #3030ff; border-radius:8px; margin-top:15px; overflow:hidden; }
.output-header { background:#1a1a3a; padding:10px 15px; color:#8080ff; font-size:0.9em; }
.output { padding:15px; min-height:100px; white-space:pre-wrap; font-size:13px; color:#a0ffa0; }
.api-section { margin-top:20px; }
.api-card { background:#111128; border:1px solid #3030ff; border-radius:8px; padding:15px; margin-bottom:10px; }
.api-card h3 { color:#8080ff; margin-bottom:8px; }
.api-card code { background:#0a0a20; padding:2px 6px; border-radius:3px; color:#ffa0a0; }
.footer { text-align:center; padding:20px; color:#4040c0; font-size:0.8em; }
</style>
</head>
<body>
<div class="header">
  <h1>⚛ QEntL 量子编程在线编译器</h1>
  <div class="sub">QEntL → QBC字节码 → 量子虚拟机执行 | 量子自举 · 服务人类</div>
</div>

<div class="main">
  <div class="editor-area">
    <div class="toolbar">
      <span>QEntL源码编辑器</span>
      <button onclick="compileQEntL()">▶ 编译执行</button>
    </div>
    <textarea class="editor" id="source" spellcheck="false">// 欢迎使用QEntL量子编程语言！
quantum_program 你好量子 {
    setup: 函数() {
        LOG("⚛ 你好，量子世界！")
        让 量子位 = 8
        LOG("初始化量子寄存器: " + 量子位 + " 比特")
        LOG("✅ QEntL量子环境就绪")
    }
}</textarea>
  </div>

  <div class="output-area">
    <div class="output-header">📋 编译输出 (QBC字节码)</div>
    <div class="output" id="output">点击"编译执行"查看结果...</div>
  </div>

  <div class="api-section">
    <div class="api-card">
      <h3>🌐 API端点</h3>
      <p>翻译: <code>POST /api/qv4/translate</code> body: {"text":"你好"}</p>
      <p>编译: <code>POST /api/qv4/compile</code> body: {"source":"..."}</p>
      <p>模型: <code>GET /api/qv4/model/info</code></p>
    </div>
  </div>
</div>

<div class="footer">
  QSM量子叠加态模型 · QEntL量子操作系统 · 量子自举 · 服务人类
</div>

<script>
async function compileQEntL() {
  const source = document.getElementById('source').value;
  const output = document.getElementById('output');
  output.textContent = '编译中...';

  try {
    const resp = await fetch('/api/qv4/compile', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({source})
    });
    const data = await resp.json();

    if (data.success) {
      output.textContent = `✅ 编译成功！\n\n`;
      output.textContent += `指令数: ${data.instructions_count}\n`;
      output.textContent += `常量数: ${data.constants_count}\n`;
      output.textContent += `函数: ${JSON.stringify(data.functions, null, 2)}\n\n`;
      output.textContent += `--- QBC字节码 ---\n`;
      output.textContent += JSON.stringify(data.qbc, null, 2);
    } else {
      output.textContent = `❌ 编译失败:\n${data.error}`;
    }
  } catch(e) {
    output.textContent = `❌ 请求失败: ${e.message}`;
  }
}
</script>
</body>
</html>
