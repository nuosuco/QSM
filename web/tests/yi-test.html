<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>彝文字体测试</title>
    <style>
        @font-face {
            font-family: 'YiTongyong';
            src: url('/fonts/lingyi.ttf') format('truetype');
            font-display: swap;
        }
        .yi { font-family: 'YiTongyong', sans-serif; font-size: 48px; }
        .fallback { font-size: 48px; }
    </style>
</head>
<body style="background:#1a1a2e; color:#fff; padding:20px;">
    <h1>滇川黔贵通用彝文字体测试</h1>
    <p>字体名称: YiTongyong</p>
    <p>字体文件: /fonts/lingyi.ttf</p>
    <hr>
    <h2>测试1: HTML实体方式</h2>
    <p class="yi">&#xF2737;&#xF27AE;&#xF27AD;</p>
    <p>应该显示: 心火天</p>
    
    <h2>测试2: 直接Unicode字符</h2>
    <p class="yi"></p>
    
    <h2>测试3: JavaScript插入</h2>
    <p class="yi" id="js-test"></p>
    
    <script>
    // 方法1: HTML实体
    document.getElementById('js-test').innerHTML = '&#xF2737;&#xF27AE;&#xF27AD;';
    </script>
    
    <hr>
    <h2>字体加载状态检测</h2>
    <p id="status">检测中...</p>
    
    <script>
    if (document.fonts) {
        document.fonts.ready.then(function() {
            var loaded = document.fonts.check('48px YiTongyong');
            document.getElementById('status').innerHTML = loaded ? 
                '✅ 字体已加载' : '❌ 字体未加载';
        });
    } else {
        document.getElementById('status').innerHTML = '⚠️ 浏览器不支持字体检测API';
    }
    </script>
</body>
</html>
