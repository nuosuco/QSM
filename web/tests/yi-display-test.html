<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>彝文显示测试</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #1a1a2e; color: #fff; }
.test { margin: 10px 0; padding: 15px; background: #16213e; border-radius: 8px; }
.yi { font-size: 24px; color: #4ecdc4; }
</style>
</head>
<body>
<h1>彝文字符显示测试</h1>

<div class="test">
<h3>测试1: 直接显示彝文字符</h3>
<p class="yi">󲶗 󳁽 󳛣</p>
<p>应该显示: 我 饭 吃</p>
</div>

<div class="test">
<h3>测试2: API返回的彝文</h3>
<p class="yi" id="api-result">加载中...</p>
</div>

<script>
fetch('/api/?text=%E5%90%83%E9%A5%AD')
  .then(r => r.json())
  .then(d => {
    document.getElementById('api-result').textContent = d.output;
    console.log('API返回:', d);
  });
</script>
</body>
</html>
