<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>简单测试</title></head>
<body style="padding:20px;font-family:sans-serif">
<h1>彝文翻译测试</h1>
<input id="t" style="padding:10px;width:200px" value="我吃饭">
<button onclick="test()" style="padding:10px">翻译</button>
<pre id="r" style="background:#f0f0f0;padding:10px"></pre>
<script>
async function test(){
  const text = document.getElementById('t').value;
  const url = '/api/?text=' + encodeURIComponent(text);
  const r = await fetch(url);
  const d = await r.json();
  document.getElementById('r').textContent = JSON.stringify(d, null, 2);
}
test();
</script>
</body>
</html>
