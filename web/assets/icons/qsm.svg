<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- QSM Core - Quantum Superposition -->
  <defs>
    <linearGradient id="qsmg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a87ff"/>
      <stop offset="50%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#ffe66d"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="28" fill="rgba(255,255,255,0.05)" stroke="url(#qsmg)" stroke-width="2"/>
  <!-- overlapping rings representing superposition -->
  <circle cx="28" cy="28" r="12" fill="rgba(138,135,255,0.3)" stroke="#8a87ff" stroke-width="1.5"/>
  <circle cx="36" cy="36" r="12" fill="rgba(78,205,196,0.3)" stroke="#4ecdc4" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="6" fill="rgba(255,230,109,0.4)" stroke="#ffe66d" stroke-width="2"/>
  <text x="32" y="35" text-anchor="middle" font-size="8" fill="#ffe66d" font-weight="bold">|ψ&gt;</text>
</svg>