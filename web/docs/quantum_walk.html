<h1>量子漫步</h1>
<div class="content"># 量子漫步 (Quantum Walk) - 1D 简单版本
# 量子硬币 + 位置空间
# 展示量子并行性带来的指数级加速

init 4

# 量子硬币 (qubit 0)
H 0

# 位置空间初始化
H 1
H 2
H 3

# 受控移位操作
CNOT 0 1
CNOT 0 2
CNOT 0 3

# 再次应用硬币门
H 0

# 干涉
CNOT 1 2
CNOT 2 3

# 最终测量
MEASURE 0 0
MEASURE 1 1
MEASURE 2 2
MEASURE 3 3

# 量子漫步的结果会呈现独特的分布
PRINT 0

STOP
</div>
