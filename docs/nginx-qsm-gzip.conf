# QSM Nginx 性能优化配置
# 启用 gzip / brotli 压缩，减少前端 HTTP 请求和传输体积
# 部署方式：将此文件内容添加到 /etc/nginx/nginx.conf 的 http 块中，
#           或放入 /etc/nginx/conf.d/qsm-gzip.conf

# ── gzip 压缩配置 ──
gzip on;
gzip_static on;
gzip_min_length 1024;                          # 最小压缩长度 1KB
gzip_comp_level 6;                             # 压缩级别 1-9（6 为平衡）
gzip_types text/plain text/css text/javascript application/javascript application/json application/xml text/xml application/svg+xml image/svg+xml application/vnd.ms-fontobject font/ttf font/otf font/opentype;
gzip_vary on;                                  # 响应 Vary: Accept-Encoding
gzip_proxied any;
gzip_buffers 16 8k;

# ── brotli 压缩配置（需安装 nginx-module-brotli）──
# brotli on;
# brotli_comp_level 6;
# brotli_types text/plain text/css text/javascript application/javascript application/json application/xml text/xml application/svg+xml image/svg+xml font/ttf font/otf;
# brotli_min_length 1024;
# brotli_vary on;

# ── 静态资源缓存策略 ──
# CSS / JS / 字体 / 图片缓存 30 天
location ~* \.(css|js|ttf|otf|woff|woff2|svg|png|jpg|jpeg|gif|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff";
}

# ── API 缓存策略 ──
# API 响应不缓存（实时数据）
location ^~ /api/ {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Pragma "no-cache";
}

# ── 压缩预生成（可选，部署时运行一次）──
# 在 /etc/nginx/nginx.conf 的 http 块外运行：
