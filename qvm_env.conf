# QVM Quantum Virtual Machine Environment Configuration
# QVM量子虚拟机环境配置文件
# Version: 1.0.0
# Created: 2026-07-03
# Author: QSM Team

# =============================================================================
# QVM 环境基础配置
# =============================================================================

# 项目根目录
QSM_ROOT=/root/QSM

# QVM二进制路径
QVM_BIN=${QSM_ROOT}/bin/qvm_bootstrap
QCL_BIN=${QSM_ROOT}/bin/qcl_bootstrap

# C语言启动器源码
QVM_SRC=${QSM_ROOT}/src/qvm_bootstrap.c
QCL_SRC=${QSM_ROOT}/src/qcl_bootstrap.c

# QEntL源码根目录
QENTL_ROOT=${QSM_ROOT}/QEntL

# 有效量子电路字节码文件列表（头部0x14）
# 共21个有效量子电路

# QSM模型电路（5个）
QVM_CIRCUIT_QSM_1=${QENTL_ROOT}/Models/QSM/qsm_entry.qbc
QVM_CIRCUIT_QSM_2=${QENTL_ROOT}/Models/QSM/qsm_consciousness_circuit.qbc
QVM_CIRCUIT_QSM_3=${QENTL_ROOT}/Models/QSM/qsm_entanglement_circuit.qbc
QVM_CIRCUIT_QSM_4=${QENTL_ROOT}/Models/QSM/qsm_yi_training_circuit.qbc
QVM_CIRCUIT_QSM_5=${QENTL_ROOT}/Models/QSM/yi_training_pipeline_circuit.qbc

# Ref模型电路（4个）
QVM_CIRCUIT_REF_1=${QENTL_ROOT}/Models/Ref/ref_entry.qbc
QVM_CIRCUIT_REF_2=${QENTL_ROOT}/Models/Ref/ref_healing_circuit.qbc
QVM_CIRCUIT_REF_3=${QENTL_ROOT}/Models/Ref/ref_monitoring_circuit.qbc
QVM_CIRCUIT_REF_4=${QENTL_ROOT}/Models/Ref/ref_optimization_circuit.qbc

# SOM模型电路（2个）
QVM_CIRCUIT_SOM_1=${QENTL_ROOT}/Models/SOM/som_entry.qbc
QVM_CIRCUIT_SOM_2=${QENTL_ROOT}/Models/SOM/som_transaction_circuit.qbc

# WeQ模型电路（3个）
QVM_CIRCUIT_WEQ_1=${QENTL_ROOT}/Models/WeQ/weq_entry.qbc
QVM_CIRCUIT_WEQ_2=${QENTL_ROOT}/Models/WeQ/weq_learning_circuit.qbc
QVM_CIRCUIT_WEQ_3=${QENTL_ROOT}/Models/WeQ/weq_social_interaction_circuit.qbc

# QNS量子神经叠加态电路（2个）
QVM_CIRCUIT_QNS_1=${QENTL_ROOT}/System/Kernel/neural/qns_training_circuit.qbc
QVM_CIRCUIT_QNS_2=${QENTL_ROOT}/System/Kernel/neural/qns_backprop_circuit.qbc

# QDFS量子动态文件系统电路（2个）
QVM_CIRCUIT_QDFS_1=${QENTL_ROOT}/System/Kernel/filesystem/qdfs_quantum_circuit.qbc
QVM_CIRCUIT_QDFS_2=${QENTL_ROOT}/System/Kernel/filesystem/grover_search_circuit.qbc

# 集成测试电路（2个）
QVM_CIRCUIT_INTEGRATION_1=${QENTL_ROOT}/Models/Models_QNS_Integration_Test.qbc
QVM_CIRCUIT_INTEGRATION_2=${QENTL_ROOT}/System/Kernel/qns_qdfs_dataflow.qbc
QVM_CIRCUIT_INTEGRATION_3=${QENTL_ROOT}/System/Kernel/qns_qdfs_reverse_flow_circuit.qbc

# =============================================================================
# QVM运行参数配置
# =============================================================================

# 最大量子比特数（与MAX_QUBITS_RUNTIME=32一致）
QVM_MAX_QUBITS=32

# 最大经典寄存器数
QVM_MAX_REGISTERS=16

# 量子内存大小(KB)
QVM_QUANTUM_MEM_KB=1024

# 支持的量子门操作码数量
QVM_OPCODE_COUNT=19

# 支持的量子门列表
QVM_GATES=H:X:Y:Z:T:S:CNOT:SWAP:RESET:MEASURE:BARRIER

# 部署模式（开发=QVM软件模拟器）
QVM_DEPLOY_MODE=development

# 量子运算实现方式
QVM_QUANTUM_IMPL=software_simulator

# =============================================================================
# 环境验证配置
# =============================================================================

# 验证结果输出目录
QVM_VERIFY_OUTPUT=${QSM_ROOT}/qvm_env_verify

# 验证日志文件
QVM_VERIFY_LOG=${QVM_VERIFY_OUTPUT}/verify.log

# CNOT回归测试电路
QVM_CNOT_TEST=${QSM_ROOT}/test/cnot_test.qentl

# 验证通过的电路数量（预期21）
QVM_EXPECTED_CIRCUITS=21

# 有效字节码头部标识（0x14）
QVM_BYTECODE_MAGIC=14

# 无效文本源头部标识（0x72 = ASCII 'r'）
QVM_TEXT_MAGIC=72

# =============================================================================
# 环境状态标识
# =============================================================================

# 环境版本
QVM_ENV_VERSION=1.0.0

# 环境构建日期
QVM_ENV_DATE=2026-07-03

# 环境状态标记
QVM_ENV_STATUS=initialized
