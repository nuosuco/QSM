        button {

            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        
        button:hover {

        }
        
        .char-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }
        
        .char-item {

        // 检查字体状态
        function checkFont() {
            const statusDiv = document.getElementById('font-status');
            
            // 创建测试元素
            const test = document.createElement('div');
            test.style.fontFamily = 'YiFont, Arial';
            test.style.fontSize = '20px';
            test.style.position = 'absolute';
            test.style.visibility = 'hidden';
            test.textContent = '󲜐󲜑󲜒󲜓󲜔󲜕󲜖󲜗󲜘󲜙󲜚󲜛󲜜󲜝󲜞󲜟';
            document.body.appendChild(test);
            
            const width = test.offsetWidth;
            document.body.removeChild(test);
            
            if (width > 100) {
                statusDiv.className = 'status success';
                statusDiv.textContent = '✅ 彝文字体加载成功！';
            } else {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ 彝文字体加载失败，将使用 Canvas 渲染';
            }
        }
        
        // Canvas 渲染
        function renderCanvas() {
            const canvas = document.getElementById('yiCanvas');
            const ctx = canvas.getContext('2d');
            
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 设置背景
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 设置字体
            ctx.font = '20px YiFont, Arial';
            ctx.fillStyle = '#333';
            ctx.textBaseline = 'top';
            
            // 渲染彝文
            let x = 10;
            let y = 10;
            const charsPerLine = 16;
            
            for (let i = 0; i < yiChars.length; i++) {
                if (i > 0 && i % charsPerLine === 0) {
                    x = 10;
                    y += 40;
                }
                
                ctx.fillText(yiChars[i].char, x, y);
                ctx.font = '12px Arial';
                ctx.fillText(yiChars[i].meaning, x, y + 20);
                ctx.font = '20px YiFont, Arial';
                
                x += 50;
            }
        }
        
        // 生成图片
        function generateImage() {
            const container = document.getElementById('imageOutput');
            
            // 创建临时 canvas
            const canvas = document.createElement('canvas');
            canvas.width = 800;
            canvas.height = 400;
            const ctx = canvas.getContext('2d');
            
            // 设置背景
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 设置字体
            ctx.font = '20px YiFont, Arial';
            ctx.fillStyle = '#333';
            ctx.textBaseline = 'top';
            
            // 渲染彝文
            let x = 10;
            let y = 10;
            const charsPerLine = 16;
            
            for (let i = 0; i < yiChars.length; i++) {
                if (i > 0 && i % charsPerLine === 0) {
                    x = 10;
                    y += 40;
                }
                
                ctx.fillText(yiChars[i].char, x, y);
                ctx.font = '12px Arial';
                ctx.fillText(yiChars[i].meaning, x, y + 20);
                ctx.font = '20px YiFont, Arial';
                
                x += 50;
            }
            
            // 转换为图片
            const img = document.createElement('img');
            img.src = canvas.toDataURL();
            img.style.border = '1px solid #ccc';
            img.style.margin = '10px 0';
            
            container.innerHTML = '';
            container.appendChild(img);
        }
        
        // 生成字符网格
        function generateCharGrid() {
            const grid = document.getElementById('charGrid');
            grid.innerHTML = '';
            
            yiChars.forEach(item => {
                const charDiv = document.createElement('div');
                charDiv.className = 'char-item';
                
                const charSpan = document.createElement('div');
                charSpan.className = 'char-yi';
                charSpan.textContent = item.char;
                
                const meaningSpan = document.createElement('div');
                meaningSpan.className = 'char-meaning';
                meaningSpan.textContent = item.meaning;
                
                charDiv.appendChild(charSpan);
                charDiv.appendChild(meaningSpan);
                grid.appendChild(charDiv);
            });
        }
        
        // 添加自定义彝文
        function addCustomYi() {
            const input = document.getElementById('yiInput');
            const display = document.getElementById('customYiDisplay');
            
            if (input.value.trim()) {
                display.textContent += input.value;
                input.value = '';
            }
        }
        
        // 浏览器信息
        function showBrowserInfo() {
            const infoDiv = document.getElementById('browser-info');
            const userAgent = navigator.userAgent;
            
            let browser = '未知';
            if (userAgent.includes('Chrome')) browser = 'Chrome';
            else if (userAgent.includes('Firefox')) browser = 'Firefox';
            else if (userAgent.includes('Safari')) browser = 'Safari';
            else if (userAgent.includes('Edg')) browser = 'Edge';
            
            infoDiv.innerHTML = `
                <div class="status ${browser === 'Chrome' || browser === 'Firefox' ? 'success' : 'warning'}">
                    <strong>浏览器:</strong> ${browser}<br>
                    <strong>Canvas 支持:</strong> ${!!document.createElement('canvas').getContext ? '✅' : '❌'}<br>
                    <strong>字体 API:</strong> ${!!document.fonts ? '✅' : '❌'}<br>
                    <strong>Unicode 私有区域支持:</strong> 大多数浏览器不支持，需要 Canvas 渲染
                </div>
            `;
        }

            renderCanvas();
            generateCharGrid();
            showBrowserInfo();
            
            // 监听字体加载
            if (document.fonts) {
                document.fonts.ready.then(function() {
                    checkFont();
                    renderCanvas();
                });
            }
