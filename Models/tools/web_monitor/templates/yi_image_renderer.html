        // 创建彝文字符图片
        function createYiCharImage(char, size = 60) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            canvas.className = 'yi-image';
            
            const ctx = canvas.getContext('2d');
            
            // 渐变背景
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#fff3cd');
            gradient.addColorStop(1, '#ffeaa7');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // 边框
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, size, size);
            
            // 文字
            ctx.fillStyle = '#2c3e50';
            ctx.font = `bold ${size * 0.4}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 显示彝文字符和对应的中文含义
            const meaning = yiCharMap[char] || '未知';
            ctx.fillText(char, size/2, size/2 - 8);
            ctx.font = `${size * 0.2}px Arial`;
            ctx.fillText(meaning, size/2, size/2 + 12);
            
            return canvas;
        }

        // 渲染彝文字符为图片
        function renderYiChars() {
            const container = document.getElementById('yi-images-container');
            const chars = Object.keys(yiCharMap).slice(0, 20); // 显示前20个字符
            
            chars.forEach(char => {
                const canvas = createYiCharImage(char);
                container.appendChild(canvas);
            });
        }

        // 将彝文字符转换为图片
        function convertYiTextToImages(text) {
            const images = [];
            for (let char of text) {
                if (yiCharMap[char]) {
                    const canvas = createYiCharImage(char, 40);
                    images.push(canvas);
                }
            }
            return images;
        }

        // 添加聊天消息
        function addChatMessage(message, isUser = false) {
            const chatContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${isUser ? 'user-message' : 'bot-message'}`;
            
            if (isUser) {
                messageDiv.innerHTML = `<strong>你:</strong> ${message}`;
            } else {
                // 检查是否包含彝文字符
                const hasYiChars = /[\uF0000-\uFFFFF]/.test(message);
                if (hasYiChars) {
                    // 创建图片容器
                    const imageContainer = document.createElement('div');
                    imageContainer.style.marginTop = '10px';
                    
                    // 转换彝文字符为图片
                    const images = convertYiTextToImages(message);
                    images.forEach(img => imageContainer.appendChild(img));
                    
                    messageDiv.innerHTML = `<strong>QSM:</strong> ${message}`;
                    messageDiv.appendChild(imageContainer);
                } else {
                    messageDiv.innerHTML = `<strong>QSM:</strong> ${message}`;
                }
            }
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 发送聊天消息
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 添加用户消息
            addChatMessage(message, true);
            input.value = '';
            
            try {
                const response = await fetch('/chat/qsm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                addChatMessage(data.reply, false);
            } catch (err) {
                addChatMessage(`错误: ${err.message}`, false);
            }
        }

        // 分析字符信息
        function analyzeChars() {
            const info = document.getElementById('char-info');
            let text = '';
            
            const sampleChars = ['󲜐', '󲜑', '󲜒', '你', '好', 'A', '1'];
            
            text += '字符分析:\n';
            text += '='.repeat(30) + '\n\n';
            
            sampleChars.forEach((char, i) => {
                const code = char.charCodeAt(0);
                const isYiWen = code >= 0xF0000 && code <= 0xFFFFF;
                const meaning = yiCharMap[char] || '无对应含义';
                
                text += `字符 ${i+1}: "${char}"\n`;
                text += `  Unicode: U+${code.toString(16).toUpperCase()}\n`;
                text += `  十进制: ${code}\n`;
                text += `  彝文字符: ${isYiWen ? '是' : '否'}\n`;
                text += `  含义: ${meaning}\n`;
                text += '\n';
            });
            
            info.textContent = text;
        }

        // 页面加载完成后初始化

            // 渲染彝文字符图片
            renderYiChars();
            
            // 分析字符
            analyzeChars();
            
            // 绑定发送按钮事件
            document.getElementById('send-button').addEventListener('click', sendMessage);
            document.getElementById('chat-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
        });
