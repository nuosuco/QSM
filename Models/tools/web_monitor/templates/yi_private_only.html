<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私有使用区彝文显示</title>
    <style>
        @font-face {
            font-family: 'LSTY-Yi-Black';
            src: url('/fonts/msyi.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .content {
            padding: 30px;
        }
        
        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            background: #fafafa;
        }
        
        .section h2 {
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        
        .yi-char {
            display: inline-block;
            font-size: 32px;
            margin: 10px;
            padding: 15px;
            background: #ecf0f1;
            border-radius: 8px;
            border: 2px solid #3498db;
            min-width: 80px;
            text-align: center;
            font-family: 'LSTY-Yi-Black', Arial, sans-serif;
        }
        
        .yi-char.fallback {
            background: #e74c3c;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 24px;
        }
        
        .char-info {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
        }
        
        .canvas-container {
            margin: 20px 0;
            text-align: center;
        }
        
        canvas {
            border: 2px solid #3498db;
            border-radius: 8px;
            margin: 10px;
            background: white;
        }
        
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
        
        .btn-success { background: #27ae60; }
        .btn-success:hover { background: #229954; }
        
        .char-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .char-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #e0e0e0;
        }
        
        .char-card .yi-char {
            margin: 0 0 10px 0;
            padding: 10px;
            font-size: 24px;
        }
        
        .char-card .meaning {
            font-size: 14px;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        .char-card .unicode {
            font-size: 12px;
            color: #7f8c8d;
            font-family: 'Courier New', monospace;
        }
        
        .info-box {
            background: #e8f4fd;
            border: 1px solid #bee5eb;
            border-radius: 5px;
            padding: 15px;
            margin: 15px 0;
        }
        
        .debug-info {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            overflow-x: auto;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 私有使用区彝文显示</h1>
            <p>专门显示训练数据中的私有使用区彝文字符</p>
        </div>
        
        <div class="content">
            <!-- 问题说明 -->
            <div class="section">
                <h2>📋 私有使用区彝文</h2>
                <div class="info-box">
                    <h3>训练数据中的彝文字符</h3>
                    <p>这些字符使用Unicode私有使用区（U+F0000到U+FFFFF），在大多数浏览器中显示为方框。</p>
                    <p><strong>字体设置：</strong>使用'LSTY-Yi-Black'字体</p>
                </div>
            </div>
            
            <!-- 字符显示测试 -->
            <div class="section">
                <h2>🔤 私有区彝文字符显示</h2>
                <div id="char-display-status"></div>
                
                <h3>原始私有区字符显示：</h3>
                <div id="private-chars"></div>
                
                <h3>Canvas渲染显示：</h3>
                <div class="canvas-container">
                    <canvas id="yi-canvas" width="800" height="300"></canvas>
                </div>
                
                <h3>字符网格显示：</h3>
                <div id="char-grid" class="char-grid"></div>
                
                <button class="btn" onclick="testAllMethods()">测试所有显示方法</button>
                <button class="btn btn-success" onclick="renderPrivateYiChars()">渲染私有区彝文</button>
            </div>
            
            <!-- 字体测试 -->
            <div class="section">
                <h2>🔤 字体测试</h2>
                <div id="font-test"></div>
                <button class="btn" onclick="testFonts()">测试字体</button>
            </div>
            
            <!-- 调试信息 -->
            <div class="section">
                <h2>🐛 调试信息</h2>
                <div class="debug-info" id="debug-info">
                    正在收集调试信息...
                </div>
                <button class="btn" onclick="collectDebugInfo()">刷新调试信息</button>
            </div>
        </div>
    </div>

    <script>
        // 训练数据中的私有使用区彝文字符
        const privateYiChars = [
            { char: '󲜐', meaning: '陷害', unicode: 'U+F1D10' },
            { char: '󲜑', meaning: '兔子', unicode: 'U+F1D11' },
            { char: '󲜒', meaning: '卷', unicode: 'U+F1D12' },
            { char: '󲜓', meaning: '舔', unicode: 'U+F1D13' },
            { char: '󲜔', meaning: '便宜', unicode: 'U+F1D14' },
            { char: '󲜕', meaning: '埋怨', unicode: 'U+F1D15' },
            { char: '󲜖', meaning: '裱褙', unicode: 'U+F1D16' },
            { char: '󲜗', meaning: '渣', unicode: 'U+F1D17' },
            { char: '󲜘', meaning: '尾', unicode: 'U+F1D18' },
            { char: '󲜙', meaning: '分开', unicode: 'U+F1D19' },
            { char: '󲜚', meaning: '雪', unicode: 'U+F1D1A' },
            { char: '󲜛', meaning: '绊', unicode: 'U+F1D1B' },
            { char: '󲜜', meaning: '指', unicode: 'U+F1D1C' },
            { char: '󲜝', meaning: '包', unicode: 'U+F1D1D' },
            { char: '󲜞', meaning: '锐利', unicode: 'U+F1D1E' },
            { char: '󲜟', meaning: '这里', unicode: 'U+F1D1F' },
            { char: '󲜠', meaning: '惊恐', unicode: 'U+F1D20' },
            { char: '󲜡', meaning: '爬', unicode: 'U+F1D21' },
            { char: '󲜢', meaning: '飘', unicode: 'U+F1D22' },
            { char: '󲜣', meaning: '惊', unicode: 'U+F1D23' }
        ];
        
        // 检查字符显示状态
        function checkCharDisplay() {
            const statusDiv = document.getElementById('char-display-status');
            let status = '';
            
            // 检查Canvas支持
            const canvas = document.createElement('canvas');
            const canvasSupported = !!(canvas.getContext && canvas.getContext('2d'));
            status += `<div class="status ${canvasSupported ? 'success' : 'error'}">
                Canvas支持: ${canvasSupported ? '✓ 支持' : '✗ 不支持'}
            </div>`;
            
            // 检查字体API支持
            const fontApiSupported = !!(document.fonts && document.fonts.check);
            status += `<div class="status ${fontApiSupported ? 'success' : 'warning'}">
                字体API支持: ${fontApiSupported ? '✓ 支持' : '⚠ 部分支持'}
            </div>`;
            
            // 检查私有区字符支持
            const privateCharSupported = '\uF1D10'.length === 1;
            status += `<div class="status ${privateCharSupported ? 'success' : 'error'}">
                私有区字符支持: ${privateCharSupported ? '✓ 支持' : '✗ 不支持'}
            </div>`;
            
            statusDiv.innerHTML = status;
        }
        
        // 显示私有区字符
        function displayPrivateChars() {
            const container = document.getElementById('private-chars');
            let html = '';
            
            privateYiChars.forEach(item => {
                const isDisplayed = item.char.length === 1;
                html += `<div class="yi-char ${!isDisplayed ? 'fallback' : ''}">
                    ${item.char}
                    <div class="char-info">${item.meaning} (${item.unicode})</div>
                </div>`;
            });
            
            container.innerHTML = html;
        }
        
        // Canvas渲染私有区彝文
        function renderPrivateYiChars() {
            const canvas = document.getElementById('yi-canvas');
            const ctx = canvas.getContext('2d');
            
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 设置高分辨率
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            
            // 绘制背景
            ctx.fillStyle = '#f8f9fa';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制标题
            ctx.fillStyle = '#2c3e50';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('私有使用区彝文字符Canvas渲染', canvas.width / 2, 30);
            
            // 绘制字符网格
            const cols = 5;
            const charSize = 80;
            const startX = 50;
            const startY = 60;
            
            privateYiChars.forEach((item, index) => {
                const row = Math.floor(index / cols);
                const col = index % cols;
                const x = startX + col * (charSize + 30);
                const y = startY + row * (charSize + 40);
                
                // 绘制背景框
                ctx.fillStyle = '#ecf0f1';
                ctx.fillRect(x - 5, y - 5, charSize + 10, charSize + 30);
                ctx.strokeStyle = '#3498db';
                ctx.lineWidth = 2;
                ctx.strokeRect(x - 5, y - 5, charSize + 10, charSize + 30);
                
                // 尝试使用字体渲染
                ctx.font = '24px LSTY-Yi-Black, Arial, sans-serif';
                ctx.fillStyle = '#2c3e50';
                ctx.textAlign = 'center';
                ctx.fillText(item.char, x + charSize/2, y + 25);
                
                // 如果字符不显示，绘制备用文本
                if (!ctx.measureText(item.char).width) {
                    ctx.font = '16px Arial';
                    ctx.fillStyle = '#e74c3c';
                    ctx.fillText(item.meaning, x + charSize/2, y + 25);
                }
                
                // 绘制含义
                ctx.font = '12px Arial';
                ctx.fillStyle = '#7f8c8d';
                ctx.fillText(item.meaning, x + charSize/2, y + 50);
            });
        }
        
        // 生成字符网格
        function generateCharGrid() {
            const container = document.getElementById('char-grid');
            let html = '';
            
            privateYiChars.forEach(item => {
                html += `
                    <div class="char-card">
                        <div class="yi-char">${item.char}</div>
                        <div class="meaning">${item.meaning}</div>
                        <div class="unicode">${item.unicode}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // 测试字体
        function testFonts() {
            const container = document.getElementById('font-test');
            let html = '<h3>字体测试结果：</h3>';
            
            // 测试LSTY-Yi-Black字体
            const testChar = privateYiChars[0].char;
            const testElement = document.createElement('span');
            testElement.textContent = testChar;
            testElement.style.fontFamily = 'LSTY-Yi-Black, Arial, sans-serif';
            testElement.style.fontSize = '24px';
            
            const isFontLoaded = testElement.offsetWidth > 0 && testElement.offsetHeight > 0;
            html += `<div class="status ${isFontLoaded ? 'success' : 'error'}">
                LSTY-Yi-Black字体: ${isFontLoaded ? '✓ 已加载' : '✗ 未加载'}
            </div>`;
            
            // 测试字符显示
            const isCharDisplayed = testChar.length === 1;
            html += `<div class="status ${isCharDisplayed ? 'success' : 'error'}">
                私有区字符显示: ${isCharDisplayed ? '✓ 正常' : '✗ 异常'}
            </div>`;
            
            // 显示测试字符
            html += `<div style="margin: 20px 0;">
                <h4>测试字符：</h4>
                <div class="yi-char">${testChar}</div>
                <div style="font-size: 12px; color: #7f8c8d;">${privateYiChars[0].meaning} (${privateYiChars[0].unicode})</div>
            </div>`;
            
            container.innerHTML = html;
        }
        
        // 测试所有方法
        function testAllMethods() {
            checkCharDisplay();
            displayPrivateChars();
            renderPrivateYiChars();
            generateCharGrid();
            testFonts();
        }
        
        // 收集调试信息
        function collectDebugInfo() {
            const debugInfo = document.getElementById('debug-info');
            let info = '';
            
            info += `浏览器信息:\n`;
            info += `User Agent: ${navigator.userAgent}\n`;
            info += `平台: ${navigator.platform}\n\n`;
            
            info += `字符测试:\n`;
            privateYiChars.slice(0, 5).forEach(item => {
                info += `${item.char} (${item.unicode}): ${item.char.length === 1 ? '正常' : '异常'}\n`;
            });
            
            info += `\nCanvas支持:\n`;
            const canvas = document.createElement('canvas');
            info += `Canvas: ${!!canvas.getContext}\n`;
            info += `2D Context: ${!!canvas.getContext('2d')}\n`;
            
            info += `\n字体支持:\n`;
            info += `Font Loading API: ${!!document.fonts}\n`;
            info += `Font Face API: ${!!window.FontFace}\n`;
            
            info += `\n私有区支持:\n`;
            info += `私有区字符: ${'\uF1D10'.length === 1}\n`;
            
            debugInfo.textContent = info;
        }
        
        // 页面加载时初始化
        window.onload = function() {
            testAllMethods();
            collectDebugInfo();
        };
    </script>
</body>
</html>
