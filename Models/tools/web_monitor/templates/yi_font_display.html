<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彝文字体显示 - LSTY-Yi-Black</title>
    <style>
        @font-face {
            font-family: 'LSTY-Yi-Black';
            src: url('/fonts/msyi.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        
        body {
            font-family: 'LSTY-Yi-Black', 'Microsoft YaHei', Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .section {
            background: white;
            padding: 25px;
            margin: 20px 0;
            border-radius: 10px;
            border-left: 5px solid #3498db;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .yi-char {
            display: inline-block;
            margin: 8px;
            padding: 15px;
            border: 2px solid #e74c3c;
            background: linear-gradient(45deg, #fff3cd, #ffeaa7);
            font-size: 28px;
            min-width: 60px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        
        .yi-char:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }
        
        .canvas-char {
            display: inline-block;
            margin: 8px;
            border: 2px solid #27ae60;
            background: linear-gradient(45deg, #d5f4e6, #a8e6cf);
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }
        
        .chat-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .chat-message {
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            max-width: 80%;
        }
        
        .user-message {
            background: #007bff;
            color: white;
            margin-left: auto;
        }
        
        .bot-message {
            background: #e9ecef;
            color: #333;
        }
        
        .input-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .chat-input {
            flex-grow: 1;
            padding: 12px;
            border: 2px solid #3498db;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'LSTY-Yi-Black', 'Microsoft YaHei', Arial, sans-serif;
        }
        
        .send-button {
            padding: 12px 25px;
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        
        .send-button:hover {
            background: linear-gradient(45deg, #2980b9, #1f5f8b);
        }
        
        .info-box {
            background: linear-gradient(45deg, #e3f2fd, #bbdefb);
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: pre-wrap;
        }
        
        .font-test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .font-test-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            text-align: center;
        }
        
        .font-test-item h4 {
            margin: 0 0 10px 0;
            color: #2c3e50;
        }
        
        .font-test-item .yi-sample {
            font-size: 24px;
            margin: 10px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌏 彝文字体显示 - LSTY-Yi-Black</h1>
        
        <div class="section">
            <h2>使用LSTY-Yi-Black字体显示彝文字符</h2>
            <p>这些字符应该使用正确的彝文字体显示：</p>
            <div class="yi-char">󲜐</div>
            <div class="yi-char">󲜑</div>
            <div class="yi-char">󲜒</div>
            <div class="yi-char">󲜓</div>
            <div class="yi-char">󲜔</div>
        </div>

        <div class="section">
            <h2>字体回退测试</h2>
            <div class="font-test-grid">
                <div class="font-test-item">
                    <h4>LSTY-Yi-Black (彝文字体)</h4>
                    <div class="yi-sample" style="font-family: 'LSTY-Yi-Black';">󲜐 󲜑 󲜒</div>
                </div>
                <div class="font-test-item">
                    <h4>Microsoft YaHei</h4>
                    <div class="yi-sample" style="font-family: 'Microsoft YaHei';">󲜐 󲜑 󲜒</div>
                </div>
                <div class="font-test-item">
                    <h4>Arial</h4>
                    <div class="yi-sample" style="font-family: Arial;">󲜐 󲜑 󲜒</div>
                </div>
                <div class="font-test-item">
                    <h4>SimSun</h4>
                    <div class="yi-sample" style="font-family: SimSun;">󲜐 󲜑 󲜒</div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>彝文聊天测试</h2>
            <div class="chat-container">
                <div id="chat-messages">
                    <div class="chat-message bot-message">
                        <strong>QSM:</strong> 欢迎使用彝文聊天系统！
                    </div>
                </div>
                <div class="input-container">
                    <input type="text" class="chat-input" id="chat-input" placeholder="输入消息...">
                    <button class="send-button" id="send-button">发送</button>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>字符信息</h2>
            <div class="info-box" id="char-info">
                正在分析字符...
            </div>
        </div>
    </div>

    <script>
        // 彝文字符到中文含义的映射
        const yiCharMap = {
            '󲜐': '陷害',
            '󲜑': '兔子',
            '󲜒': '卷',
            '󲜓': '舔',
            '󲜔': '便宜',
            '󲜕': '埋怨',
            '󲜖': '裱褙',
            '󲜗': '渣',
            '󲜘': '尾',
            '󲜙': '分开',
            '󲜚': '雪',
            '󲜛': '绊',
            '󲜜': '指',
            '󲜝': '包',
            '󲜞': '锐利',
            '󲜟': '这里',
            '󲜠': '惊恐',
            '󲜡': '爬',
            '󲜢': '飘',
            '󲜣': '惊'
        };

        // 分析字符信息
        function analyzeChars() {
            const info = document.getElementById('char-info');
            let text = '';
            
            const sampleChars = ['󲜐', '󲜑', '󲜒', '你', '好', 'A', '1'];
            
            text += '字符分析:\n';
            text += '='.repeat(30) + '\n\n';
            
            sampleChars.forEach((char, i) => {
                const code = char.charCodeAt(0);
                const isYiWen = code >= 0xF0000 && code <= 0xFFFFF;
                const meaning = yiCharMap[char] || '无对应含义';
                
                text += `字符 ${i+1}: "${char}"\n`;
                text += `  Unicode: U+${code.toString(16).toUpperCase()}\n`;
                text += `  十进制: ${code}\n`;
                text += `  彝文字符: ${isYiWen ? '是' : '否'}\n`;
                text += `  含义: ${meaning}\n`;
                text += '\n';
            });
            
            info.textContent = text;
        }

        // 添加聊天消息
        function addChatMessage(message, isUser = false) {
            const chatContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${isUser ? 'user-message' : 'bot-message'}`;
            
            if (isUser) {
                messageDiv.innerHTML = `<strong>你:</strong> ${message}`;
            } else {
                messageDiv.innerHTML = `<strong>QSM:</strong> ${message}`;
            }
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 发送聊天消息
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 添加用户消息
            addChatMessage(message, true);
            input.value = '';
            
            try {
                const response = await fetch('/chat/qsm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                addChatMessage(data.reply, false);
            } catch (err) {
                addChatMessage(`错误: ${err.message}`, false);
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 分析字符
            analyzeChars();
            
            // 绑定发送按钮事件
            document.getElementById('send-button').addEventListener('click', sendMessage);
            document.getElementById('chat-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
            
            // 检查字体加载状态
            if (document.fonts) {
                document.fonts.ready.then(function() {
                    console.log('所有字体已加载完成');
                });
            }
        });
    </script>
</body>
</html>
